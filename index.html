<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="AmonsPath - Ultra Archive Music Discovery Platform">
    <meta name="theme-color" content="#ec4899">
    <title>AmonsPath | Ultra Archive v2.0</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700;1,900&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">

    <style id="master-logic-styles">
        /* ROOT VARIABLES - LIGHT MODE DEFAULT */
        :root { 
            --accent: #ec4899; 
            --accent-soft: rgba(236, 72, 153, 0.08); 
            --bg: #ffffff;
            --surface: #f9f9f9;
            --text-main: #121212;
            --text-muted: #8e8e93;
            --glass: rgba(255, 255, 255, 0.85);
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1);
        }

        /* DARK MODE */
        html.dark-mode {
            --accent: #ec4899;
            --accent-soft: rgba(236, 72, 153, 0.15);
            --bg: #0f0f0f;
            --surface: #1a1a1a;
            --text-main: #f5f5f5;
            --text-muted: #a0a0a0;
            --glass: rgba(20, 20, 20, 0.90);
            --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.3);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.5);
        }

        /* RESET & BASE */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            scrollbar-width: thin;
            scrollbar-color: var(--accent-soft) var(--bg);
        }
        *::-webkit-scrollbar { width: 6px; height: 6px; }
        *::-webkit-scrollbar-track { background: var(--bg); }
        *::-webkit-scrollbar-thumb { background: var(--accent-soft); border-radius: 3px; }
        *::-webkit-scrollbar-thumb:hover { background: var(--accent); }

        html {
            scroll-behavior: smooth;
        }

        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            line-height: 1.6;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* TYPOGRAPHY */
        .font-serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        h1, h2, h3, h4, h5, h6 {
            font-weight: 700;
            line-height: 1.2;
            letter-spacing: -0.01em;
        }

        /* ENHANCED SKELETON ANIMATION */
        .skeleton {
            background: linear-gradient(90deg, var(--surface) 25%, #f0f0f0 50%, var(--surface) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 2s infinite ease-in-out;
            border-radius: 12px;
        }
        html.dark-mode .skeleton {
            background: linear-gradient(90deg, #222 25%, #333 50%, #222 75%);
        }
        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* LAYOUT COMPONENTS */
        .main-container { 
            max-width: 600px; 
            margin: 0 auto; 
            min-height: 100vh; 
            background-color: var(--bg);
        }
        
        .glass-nav {
            position: sticky; 
            top: 0; 
            z-index: 500;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 20px 24px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        /* POST CARDS - ENHANCED */
        .post-entry {
            background: var(--surface);
            margin: 16px 20px 32px 20px;
            border-radius: 32px;
            padding: 24px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: var(--shadow-md);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.8s ease backwards;
            cursor: pointer;
        }
        html.dark-mode .post-entry {
            border: 1px solid rgba(255,255,255,0.08);
        }
        .post-entry:hover { 
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
        }
        .post-entry:active { 
            transform: scale(0.97);
            box-shadow: var(--shadow-md);
        }

        .album-art-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.12);
            margin-bottom: 20px;
            background: var(--surface);
        }
        .album-art-container img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            will-change: transform;
        }
        .post-entry:hover .album-art-container img { 
            transform: scale(1.08); 
        }

        /* AUDIO VISUALIZER */
        .viz-container {
            display: flex; 
            gap: 3px; 
            align-items: flex-end; 
            height: 20px;
        }
        .viz-bar { 
            width: 3px; 
            background: var(--accent); 
            border-radius: 10px;
            transform-origin: bottom;
        }
        .viz-anim { 
            animation: viz-height 0.8s ease-in-out infinite alternate; 
        }
        @keyframes viz-height { 
            0% { height: 4px; } 
            100% { height: 20px; } 
        }

        /* LAYER SYSTEM */
        .layer {
            position: fixed; 
            inset: 0; 
            z-index: 1000;
            background: var(--bg);
            display: none; 
            flex-direction: column;
            animation: slideInUp 0.6s cubic-bezier(0.19, 1, 0.22, 1);
            overflow-y: auto;
            overflow-x: hidden;
        }
        @keyframes slideInUp { 
            from { 
                transform: translateY(100%); 
                opacity: 0;
            } 
            to { 
                transform: translateY(0); 
                opacity: 1;
            } 
        }
        @keyframes fadeInUp { 
            from { 
                opacity: 0; 
                transform: translateY(30px); 
            } 
            to { 
                opacity: 1; 
                transform: translateY(0); 
            } 
        }

        /* NOTIFICATION TOAST - IMPROVED */
        #toast-container {
            position: fixed; 
            top: 40px; 
            left: 50%; 
            transform: translateX(-50%);
            z-index: 9999; 
            display: flex; 
            flex-direction: column; 
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            background: #121212; 
            color: white; 
            padding: 12px 24px;
            border-radius: 50px; 
            font-size: 11px; 
            font-weight: 700;
            text-transform: uppercase; 
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: all;
            backdrop-filter: blur(10px);
        }
        html.dark-mode .toast {
            background: #f5f5f5;
            color: #121212;
        }
        .toast.success { background: #10b981; color: white; }
        .toast.error { background: #ef4444; color: white; }
        .toast.warning { background: #f59e0b; color: white; }
        .toast.info { background: #3b82f6; color: white; }
        @keyframes toastIn { 
            from { 
                opacity: 0; 
                transform: translateY(-20px) scale(0.9); 
            } 
            to { 
                opacity: 1; 
                transform: translateY(0) scale(1); 
            } 
        }

        /* BUTTONS - ENHANCED */
        .btn-premium {
            background: var(--accent); 
            color: white;
            padding: 14px 24px; 
            border-radius: 20px;
            font-weight: 800; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.2em;
            width: 100%; 
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.2);
            border: none;
            cursor: pointer;
            user-select: none;
            touch-action: manipulation;
            min-height: 44px;
        }
        .btn-premium:hover { 
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(236, 72, 153, 0.3);
        }
        .btn-premium:active { 
            transform: scale(0.95); 
            opacity: 0.9;
        }
        .btn-premium:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-premium {
            width: 100%; 
            background: var(--surface); 
            border: 2px solid transparent;
            padding: 14px 20px; 
            border-radius: 20px; 
            font-size: 14px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            outline: none;
            color: var(--text-main);
            min-height: 44px;
        }
        .input-premium::placeholder {
            color: var(--text-muted);
        }
        .input-premium:focus { 
            border-color: var(--accent); 
            background: var(--bg); 
            box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
        }

        /* SEARCH BAR OVERLAY - IMPROVED */
        #search-overlay {
            max-height: 0; 
            overflow: hidden; 
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #search-overlay.open { 
            max-height: 120px; 
            opacity: 1; 
            padding: 12px 20px 20px 20px; 
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        html.dark-mode #search-overlay.open {
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* PROFILE HEADER */
        .profile-header-premium {
            display: flex; 
            gap: 30px; 
            padding: 40px 24px;
            background: linear-gradient(to bottom, var(--accent-soft) 0%, transparent 100%);
            align-items: flex-start;
        }
        .profile-pfp-box {
            width: 140px; 
            height: 140px; 
            flex-shrink: 0;
            border-radius: 28px; 
            overflow: hidden;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            aspect-ratio: 1;
        }

        /* STATUS BADGE */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* LOADING SPINNER */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid var(--accent-soft);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* THEME TOGGLE BUTTON */
        .theme-toggle-btn {
            background: transparent;
            border: 2px solid var(--text-main);
            color: var(--text-main);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            hover-opacity: 0.7;
        }
        .theme-toggle-btn:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
        }

        /* RESPONSIVE */
        @media (max-width: 480px) {
            .post-entry {
                margin: 12px 16px 24px 16px;
                padding: 16px;
                border-radius: 24px;
            }
            .glass-nav {
                padding: 16px 20px;
            }
        }

        /* REDUCE MOTION */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

    </style>
    <style id="user-custom-css">/* User Custom CSS Space */</style>
</head>
<body class="pb-32 no-scrollbar">

    <div id="toast-container" role="region" aria-live="polite" aria-label="Notifications"></div>

    <div class="main-container">
        <nav class="glass-nav" role="navigation" aria-label="Main navigation">
            <div id="notif-panel" class="hidden fixed top-24 right-6 w-80 bg-white shadow-xl rounded-xl p-4 z-[4000]" role="complementary" aria-label="Notifications panel">
                <div id="notif-list" aria-live="polite"></div>
            </div>
            
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h1 class="font-serif-italic text-3xl tracking-tighter cursor-pointer hover:opacity-75 transition" onclick="location.reload()" role="heading" aria-level="1">AmonsPath.</h1>
                    <p id="system-status" class="text-[8px] font-bold text-pink-500 uppercase tracking-[0.4em] mt-1" aria-label="System status">Live Discovery Engine</p>
                </div>
                <div class="flex gap-3 items-center">
                    <button id="themeToggle" class="theme-toggle-btn" aria-label="Toggle dark/light mode" title="Switch theme">🌙</button>
                    <button onclick="toggleSearchUI()" class="text-xl hover:opacity-70 transition p-2" aria-label="Search" aria-expanded="false" aria-controls="search-overlay">🔍</button>
                    <button onclick="toggleNotif()" class="text-xl hover:opacity-70 transition p-2" aria-label="Notifications" aria-expanded="false" aria-controls="notif-panel">🔔</button>
                    <div id="nav-pfp-trigger" class="w-10 h-10 rounded-full border-2 border-pink-500 overflow-hidden transition active:scale-90 cursor-pointer hover:opacity-75" onclick="openLayer('profile-layer')" role="button" tabindex="0" aria-label="Open profile" aria-pressed="false">
                        <img id="pfp-mini" class="hidden w-full h-full object-cover" alt="User profile picture" loading="lazy">
                    </div>
                </div>
            </div>

            <div id="search-overlay" role="region" aria-label="Search section">
                <input type="text" id="global-search-input" oninput="debounceSearch(this.value)" placeholder="Search by song, lyric or user..." class="input-premium font-serif-italic" aria-label="Search songs or users">
            </div>

            <div class="flex gap-10 text-[10px] font-bold uppercase tracking-[0.2em] pb-1" role="tablist">
                <button id="tab-btn-fyp" onclick="routeTo('fyp')" class="text-pink-500 border-b-2 border-pink-500 pb-3 hover:opacity-70 transition" role="tab" aria-selected="true" aria-controls="page-fyp">Discovery</button>
                <button id="tab-btn-mine" onclick="routeTo('mine')" class="text-gray-300 pb-3 hover:opacity-70 transition" role="tab" aria-selected="false" aria-controls="page-mine">My Archive</button>
            </div>
        </nav>

        <section id="page-fyp" class="pt-8 px-2" role="main">
            <div id="fyp-feed" class="space-y-4">
                <div class="post-entry p-8"><div class="skeleton h-60 mb-6"></div><div class="skeleton h-4 w-1/2 mb-4"></div><div class="skeleton h-3 w-full"></div></div>
                <div class="post-entry p-8"><div class="skeleton h-60 mb-6"></div><div class="skeleton h-4 w-1/2 mb-4"></div><div class="skeleton h-3 w-full"></div></div>
            </div>
        </section>

        <section id="page-mine" class="hidden" role="main">
            <header class="profile-header-premium">
                <div class="profile-pfp-box">
                    <img id="header-pfp" src="" class="w-full h-full object-cover" alt="User profile picture" loading="lazy">
                </div>
                <div class="flex flex-col justify-center">
                    <h2 id="header-name" class="text-3xl font-extrabold tracking-tight">Accessing...</h2>
                    <p id="header-username" class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.3em] mt-2">@pathfinder</p>
                    <div class="flex gap-2 mt-6">
                        <span id="badge-privacy" class="status-badge bg-white border border-gray-100 text-gray-400">Public</span>
                        <span class="status-badge bg-pink-500 text-white">Active</span>
                    </div>
                </div>
            </header>
            <div id="mine-feed" class="pt-8 space-y-4"></div>
        </section>
    </div>

    <button onclick="protectedAction(() => openModal('modal-post'))" class="fixed bottom-10 right-8 w-18 h-18 bg-pink-500 hover:bg-pink-600 text-white rounded-full shadow-[0_25px_50px_-12px_rgba(236,72,153,0.5)] flex items-center justify-center transition active:scale-95 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-pink-500" aria-label="Create new post" title="Create memory">➕</button>

    <!-- PROFILE LAYER -->
    <div id="profile-layer" class="layer no-scrollbar" role="complementary" aria-label="Profile settings">
        <div class="p-10 pb-40">
            <div class="flex justify-between items-center mb-16">
                <button onclick="closeLayer('profile-layer')" class="text-[10px] font-bold text-gray-300 uppercase tracking-widest hover:text-pink-500 transition" aria-label="Close profile">← Back to discovery</button>
                <button onclick="openModal('modal-edit-profile')" class="text-xs font-bold text-pink-500 hover:opacity-70 transition" aria-label="Edit profile">Edit Path</button>
            </div>

            <div class="flex flex-col items-center mb-16">
                <div class="relative w-36 h-36 mb-8">
                    <img id="layer-pfp" class="w-full h-full rounded-[40px] object-cover shadow-2xl" alt="User profile picture" loading="lazy">
                    <div class="absolute -bottom-2 -right-2 bg-white p-3 rounded-full shadow-xl">✨</div>
                </div>
                <h3 id="layer-name" class="text-3xl font-bold">...</h3>
                <p id="layer-bio" class="text-sm text-gray-400 mt-5 italic text-center px-10">Searching for meaning in melodies.</p>
            </div>

            <div class="grid grid-cols-2 gap-6 mb-12">
                <div class="bg-gray-50 p-8 rounded-[30px] text-center border border-gray-100">
                    <span id="stat-count-posts" class="block text-3xl font-extrabold">0</span>
                    <span class="text-[9px] text-gray-300 uppercase font-bold tracking-[0.2em] mt-2 block">Archives</span>
                </div>
                <div class="bg-gray-50 p-8 rounded-[30px] text-center border border-gray-100">
                    <span id="stat-count-likes" class="block text-3xl font-extrabold">0</span>
                    <span class="text-[9px] text-gray-300 uppercase font-bold tracking-[0.2em] mt-2 block">Interactions</span>
                </div>
            </div>

            <div class="space-y-8">
                <div>
                    <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-5 block">Visual Palette (Accent)</label>
                    <div class="flex gap-4">
                        <button onclick="applyTheme('#ec4899')" class="w-12 h-12 rounded-full bg-[#ec4899] shadow-lg shadow-pink-200 hover:scale-110 transition" aria-label="Apply pink theme"></button>
                        <button onclick="applyTheme('#1a1a1a')" class="w-12 h-12 rounded-full bg-[#1a1a1a] shadow-lg shadow-gray-200 hover:scale-110 transition" aria-label="Apply dark theme"></button>
                        <button onclick="applyTheme('#3b82f6')" class="w-12 h-12 rounded-full bg-[#3b82f6] shadow-lg shadow-blue-200 hover:scale-110 transition" aria-label="Apply blue theme"></button>
                        <button onclick="applyTheme('#10b981')" class="w-12 h-12 rounded-full bg-[#10b981] shadow-lg shadow-emerald-200 hover:scale-110 transition" aria-label="Apply emerald theme"></button>
                    </div>
                </div>

                <div class="bg-gray-50 p-8 rounded-[30px] flex justify-between items-center">
                    <div>
                        <span class="block text-xs font-bold uppercase tracking-widest">Ghost Mode</span>
                        <p class="text-[10px] text-gray-400 mt-1">Hide your footprints from discovery</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="privacy-toggle" class="sr-only peer" onchange="updatePrivacy(this.checked)" aria-label="Toggle ghost mode">
                        <div class="w-14 h-8 bg-gray-200 rounded-full peer peer-checked:after:translate-x-full peer-checked:bg-pink-500 after:content-[''] after:absolute after:top-1 after:left-1 after:bg-white after:rounded-full after:h-6 after:w-6 after:transition-all"></div>
                    </label>
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-5 block" for="input-css">Mirroring Engine (Custom CSS)</label>
                    <textarea id="input-css" class="input-premium h-48 font-mono text-[11px] leading-relaxed" placeholder="/* .post-entry { border-radius: 0; } */" aria-label="Custom CSS input"></textarea>
                </div>

                <button onclick="saveGlobalConfig()" class="btn-premium mt-8" aria-label="Save profile configuration">Synchronize Profile</button>
            </div>
        </div>
    </div>

    <!-- FOCUS LAYER -->
    <div id="focus-layer" class="layer no-scrollbar" role="complementary" aria-label="Post detail view"></div>

    <!-- CREATE POST MODAL -->
    <div id="modal-post" class="hidden fixed inset-0 z-[2000] bg-white p-10 overflow-y-auto no-scrollbar" role="dialog" aria-modal="true" aria-labelledby="modal-post-title">
        <h3 id="modal-post-title" class="font-serif-italic text-5xl mb-12">New Memory.</h3>
        
        <div class="space-y-10">
            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-5 block" for="itunes-search">Select Sound</label>
                <div class="relative">
                    <input type="text" id="itunes-search" oninput="searchMusicEngine(this.value)" placeholder="Search songs or artists..." class="input-premium" aria-label="Search music">
                    <div id="itunes-loader" class="hidden absolute right-5 top-5" aria-hidden="true"><div class="spinner"></div></div>
                </div>
                <div id="itunes-results" class="hidden mt-4 max-h-60 overflow-y-auto rounded-3xl border border-gray-100 no-scrollbar" role="region" aria-live="polite" aria-label="Music search results"></div>
            </div>

            <div id="selection-preview" class="hidden p-6 bg-pink-50 rounded-[30px] flex items-center gap-6 border border-pink-100">
                <img id="sel-art" class="w-24 h-24 rounded-2xl shadow-2xl" alt="Selected track artwork" loading="lazy">
                <div class="flex-1 overflow-hidden">
                    <p id="sel-name" class="text-md font-bold truncate"></p>
                    <p id="sel-artist" class="text-[10px] text-gray-400 uppercase tracking-widest mt-2"></p>
                    <div class="flex gap-2 mt-4">
                        <div class="viz-container"><div class="viz-bar viz-anim"></div><div class="viz-bar viz-anim" style="animation-delay: 0.2s"></div><div class="viz-bar viz-anim" style="animation-delay: 0.4s"></div></div>
                        <span class="text-[8px] font-bold text-pink-500">READY TO SYNC</span>
                    </div>
                </div>
                <button onclick="clearMusicSelection()" class="text-gray-300 p-2 hover:text-gray-500 transition" aria-label="Clear selection">✕</button>
            </div>

            <div>
                <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-5 block" for="post-caption">Entry Caption</label>
                <textarea id="post-caption" class="input-premium h-44 resize-none leading-relaxed" placeholder="Write your internal monologue here..." aria-label="Post caption"></textarea>
            </div>

    <!-- AUTH MODAL -->
    <div id="modal-auth" class="hidden fixed inset-0 z-[5000] bg-white p-12 flex flex-col justify-center" role="dialog" aria-modal="true" aria-labelledby="modal-auth-title">
        <h2 id="modal-auth-title" class="font-serif-italic text-6xl mb-4">Identity.</h2>
        <p class="text-[10px] text-gray-400 uppercase tracking-[0.5em] mb-12">One-time Path Creation</p>
        
        <div class="space-y-6">
            <div class="flex flex-col gap-2">
                <label class="text-[9px] font-bold text-gray-300 uppercase ml-2" for="auth-name">Display Name</label>

    </div>

    <script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

// ================== CONFIG ==================
const supabase = createClient(
  "https://aldzhrtbrjszppseawrz.supabase.co",
  "sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp"
);

let currentUser = null;
let page = 0;
const limit = 5;
let selectedMusic = null;
let currentAudio = null;

// ================== INIT AUTH ==================
async function initApp() {
  try {
    const { data } = await supabase.auth.getUser();

    if (!data.user) {
      await supabase.auth.signInAnonymously();
    }

    const { data: userData } = await supabase.auth.getUser();
    currentUser = userData.user;

    loadFeed(true);
  } catch (error) {
    console.error('Init app error:', error);
    showToast('Connection error', 'error');
  }
}

initApp();

// ================== LOAD FEED ==================
async function loadFeed(reset = false) {
  try {
    const container = document.getElementById("fyp-feed");

    if (reset) {
      page = 0;
      container.innerHTML = `<div class="text-center py-10 flex items-center justify-center gap-2"><div class="spinner"></div><span>Loading...</span></div>`;
    }

    const { data, error } = await supabase
      .from("posts")
      .select(`
        *,
        profiles(*),
        likes(count),
        comments(count)
      `)
      .range(page * limit, page * limit + limit - 1)
      .order("created_at", { ascending: false });

    if (error) {
      container.innerHTML = `<p class="text-center text-red-400">Error loading posts</p>`;
      return;
    }

    if (reset) container.innerHTML = "";

    if (!data || data.length === 0) {
      container.innerHTML += `<p class="text-center py-10 text-gray-400">No posts yet</p>`;
      return;
    }

    container.innerHTML += data.map(renderPost).join("");
    page++;
  } catch (error) {
    console.error('Load feed error:', error);
    showToast('Failed to load posts', 'error');
  }
}

// ================== RENDER POST ==================
function renderPost(p) {
  return `
    <div class="post-entry">
      <img src="${p.music_cover}" alt="Album cover for ${p.music_title}" class="rounded-2xl mb-4 w-full object-cover" loading="lazy">

      <h3 class="text-lg font-bold">${p.music_title}</h3>
      <p class="text-sm italic text-gray-500 mb-3">${p.caption || ""}</p>

      <div class="flex gap-6 text-sm mt-3">
        <button onclick="toggleLike('${p.id}')" class="hover:opacity-70 transition" aria-label="Like post">
          ❤️ <span id="likes-${p.id}">${p.likes?.[0]?.count || 0}</span>
        </button>

        <button onclick="openComment('${p.id}')" class="hover:opacity-70 transition" aria-label="Comment on post">
          💬 <span id="comments-${p.id}">${p.comments?.[0]?.count || 0}</span>
        </button>

        <button onclick="sharePost('${p.id}')" class="hover:opacity-70 transition" aria-label="Share post">
          🔗
        </button>
      </div>
    </div>
  `;
}

// ================== LIKE ==================
window.toggleLike = async function(postId) {
  try {
    const { data } = await supabase
      .from("likes")
      .select("*")
      .eq("post_id", postId)
      .eq("user_id", currentUser.id)
      .single();

    if (data) {
      await supabase.from("likes").delete().eq("id", data.id);
    } else {
      await supabase.from("likes").insert({
        post_id: postId,
        user_id: currentUser.id
      });
    }

    loadFeed(true);
  } catch (error) {
    console.error('Toggle like error:', error);
  }
};

// ================== COMMENT UI ==================
window.openComment = async function(postId) {
  const text = prompt("Write comment:");
  if (!text) return;

  try {
    await supabase.from("comments").insert({
      post_id: postId,
      user_id: currentUser.id,
      text: text
    });

    loadFeed(true);
  } catch (error) {
    console.error('Comment error:', error);
    showToast('Failed to add comment', 'error');
  }
};

// ================== SHARE ==================
window.sharePost = function(id) {
  try {
    const link = location.origin + "?post=" + id;
    navigator.clipboard.writeText(link);
    showToast("Link copied!", "success");
  } catch (error) {
    console.error('Share error:', error);
    showToast('Failed to copy link', 'error');
  }
};

// ================== SCROLL LOAD ==================
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 200) {
    loadFeed();
  }
});

    </script>

    <script>
// ================== THEME TOGGLE ==================
function initTheme() {
    const html = document.documentElement;
    const themeToggle = document.getElementById('themeToggle');
    
    // Check localStorage for saved theme
    const savedTheme = localStorage.getItem('amonspath-theme');
    if (savedTheme === 'dark') {
        html.classList.add('dark-mode');
        themeToggle.textContent = '☀️';
    } else {
        html.classList.remove('dark-mode');
        themeToggle.textContent = '🌙';
    }
    
    themeToggle.addEventListener('click', () => {
        html.classList.toggle('dark-mode');
        const isDark = html.classList.contains('dark-mode');
        localStorage.setItem('amonspath-theme', isDark ? 'dark' : 'light');
        themeToggle.textContent = isDark ? '☀️' : '🌙';
        showToast(isDark ? 'Dark mode enabled' : 'Light mode enabled', 'success');
    });
}

initTheme();

// ================== UTILITIES ==================
function showToast(msg, type = 'default') {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    toast.innerText = msg;
    toast.setAttribute('role', 'status');
    toast.setAttribute('aria-live', 'polite');
    container.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

function triggerHaptic(style) {
    try {
        if (window.tg && window.tg.HapticFeedback) {
            if (style === 'success') tg.HapticFeedback.notificationOccurred('success');
            else if (style === 'error') tg.HapticFeedback.notificationOccurred('error');
            else tg.HapticFeedback.impactOccurred(style);
        }
    } catch(e) {}
}

function routeTo(target) {
    triggerHaptic('light');
    const fyp = document.getElementById('page-fyp');
    const mine = document.getElementById('page-mine');
    const btnFyp = document.getElementById('tab-btn-fyp');
    const btnMine = document.getElementById('tab-btn-mine');
    
    fyp.classList.add('hidden');
    mine.classList.add('hidden');
    btnFyp.setAttribute('aria-selected', 'false');
    btnMine.setAttribute('aria-selected', 'false');
    btnFyp.classList.remove('text-pink-500', 'border-b-2', 'border-pink-500');
    btnMine.classList.remove('text-pink-500', 'border-b-2', 'border-pink-500');
    btnFyp.classList.add('text-gray-300');
    btnMine.classList.add('text-gray-300');

    if (target === 'fyp') {
        fyp.classList.remove('hidden');
        btnFyp.classList.remove('text-gray-300');
        btnFyp.classList.add('text-pink-500', 'border-b-2', 'border-pink-500');
        btnFyp.setAttribute('aria-selected', 'true');
        document.getElementById('system-status').innerText = "Live Discovery Engine";
    } else {
        mine.classList.remove('hidden');
        btnMine.classList.remove('text-gray-300');
        btnMine.classList.add('text-pink-500', 'border-b-2', 'border-pink-500');
        btnMine.setAttribute('aria-selected', 'true');
        document.getElementById('system-status').innerText = "Personal Archive View";
    }
}

function toggleSearchUI() {
    document.getElementById('search-overlay').classList.toggle('open');
    const button = document.querySelector('[aria-label="Search"]');
    const isOpen = document.getElementById('search-overlay').classList.contains('open');
    button.setAttribute('aria-expanded', isOpen);
    if (isOpen) {
        document.getElementById('global-search-input').focus();
    }
}

function debounceSearch(q) {
    clearTimeout(window.searchTimer);
    window.searchTimer = setTimeout(() => {
        // searchDiscoveryFeed(q);
    }, 700);
}

function toggleNotif() {
    document.getElementById('notif-panel').classList.toggle('hidden');
}

function applyTheme(color, save = true) {
    document.documentElement.style.setProperty('--accent', color);
    document.documentElement.style.setProperty('--accent-soft', color + '15');
    if (save) {
        triggerHaptic('light');
        showToast("Palette Synchronized", 'success');
    }
}

async function updatePrivacy(val) {
    showToast(val ? "Archive Hidden" : "Archive Public", 'info');
    triggerHaptic('medium');
}

async function validateUsername(u) {
    const msg = document.getElementById('user-status-msg');
    const btn = document.getElementById('auth-submit');
    if (u.length < 3) return;

    msg.innerText = "Available";
    msg.style.color = "#10b981";
    btn.disabled = false;
    btn.style.opacity = 1;

async function saveGlobalConfig() {
    const css = document.getElementById('input-css').value;
    showToast("Syncing Mirroring Engine...", 'info');
    if (css) {
        document.getElementById('user-custom-css').innerHTML = css;
    }
    setTimeout(() => location.reload(), 500);
}

async function searchMusicEngine(val) {
    const resultsBox = document.getElementById('itunes-results');
    const loader = document.getElementById('itunes-loader');
    
    if (val.length < 3) { resultsBox.classList.add('hidden'); return; }

    try {
        loader.classList.remove('hidden');
        const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(val)}&media=music&limit=6`);
        const data = await response.json();
        loader.classList.add('hidden');

        if (data.results.length === 0) {
            resultsBox.innerHTML = `<p class="p-6 text-center text-xs text-gray-400 italic">No music matching your soul found.</p>`;
        } else {
            resultsBox.innerHTML = `<div class="bg-gray-50">` + data.results.map(track => `
                <div class="flex items-center gap-5 p-5 border-b border-gray-100 hover:bg-gray-100 active:bg-gray-200 transition cursor-pointer" onclick="selectTrack('${track.trackName}', '${track.artistName}', '${track.previewUrl}', '${track.artworkUrl100}')">
                    <img src="${track.artworkUrl60}" alt="Album art" class="w-12 h-12 rounded-xl" loading="lazy">
                    <div class="overflow-hidden flex-1">
                        <p class="text-xs font-bold truncate">${track.trackName}</p>
                        <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1">${track.artistName}</p>
                    </div>
                </div>
            `).join('') + `</div>`;
        }
        resultsBox.classList.remove('hidden');
    } catch (error) {
        console.error('Search music error:', error);
        showToast('Search failed', 'error');
        loader.classList.add('hidden');
    }
}

function selectTrack(title, artist, preview, cover) {
    selectedMusic = { title, artist, url: preview, cover: cover.replace('100x100', '800x800') };
    document.getElementById('sel-art').src = selectedMusic.cover;
    document.getElementById('sel-name').innerText = title;
    document.getElementById('sel-artist').innerText = artist;
    document.getElementById('selection-preview').classList.remove('hidden');
    document.getElementById('itunes-results').classList.add('hidden');
    document.getElementById('itunes-search').value = '';
    triggerHaptic('medium');
    showToast("Melody Captured", 'success');
}

function clearMusicSelection() {
    selectedMusic = null;
    document.getElementById('selection-preview').classList.add('hidden');
    document.getElementById('itunes-search').value = '';
    triggerHaptic('light');
}

async function processPublish() {
    if (!selectedMusic) {
        showToast('Please select a song first', 'warning');
        return;
    }
    const cap = document.getElementById('post-caption').value;
    
    showToast("Archiving Melody...", 'info');
    triggerHaptic('medium');
    setTimeout(() => {
        showToast("Memory Archived!", 'success');
        closeModal('modal-post');
        document.getElementById('post-caption').value = '';
        clearMusicSelection();
    }, 1000);
}

async function finishRegistration() {
    const name = document.getElementById('auth-name').value;
    const user = document.getElementById('auth-user').value.toLowerCase().replace(/[^a-z0-9_.]/g, '');
    const bio = document.getElementById('auth-bio').value;

    if (name.length < 2 || user.length < 3) {
        showToast('Please fill all fields correctly', 'warning');
        return;
    }

    showToast("Building Path...", 'info');
    triggerHaptic('medium');
    setTimeout(() => {
        showToast("Profile created!", 'success');
        closeModal('modal-auth');
    }, 1000);
}

function openChat(userId, username) {
    document.getElementById('chat-panel').classList.remove('hidden');
    document.getElementById('chat-username').innerText = username;
}

function closeChat() {
    document.getElementById('chat-panel').classList.add('hidden');
}

async function sendChat() {
    const text = document.getElementById('chat-input').value;
    if (!text || !text.trim()) return;

    document.getElementById('chat-input').value = "";
    showToast("Message sent!", "success");
}

// Global Helpers
function formatDate(d) { return new Date(d).toLocaleDateString('id-ID', { day: 'numeric', month: 'short' }); }
function openLayer(id) { 
    document.getElementById(id).style.display = 'flex'; 
    document.body.style.overflow = 'hidden';
}
function closeLayer(id) { 
    document.getElementById(id).style.display = 'none';
    document.body.style.overflow = 'auto';
}
function openModal(id) { 
    document.getElementById(id).classList.remove('hidden');
    document.body.style.overflow = 'hidden';
}
function closeModal(id) { 
    document.getElementById(id).classList.add('hidden');
    document.body.style.overflow = 'auto';
}
function protectedAction(cb) { 
    cb();
}

// Close modals on escape key
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        closeModal('modal-post');
        closeModal('modal-auth');
        closeLayer('profile-layer');
        closeLayer('focus-layer');
        closeChat();
    }
});
