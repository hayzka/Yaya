<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AmonsPath OS | Kernel v15.0</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700;1,900&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    
    <style>
        /* Konfigurasi CSS dari index.css & Profile.tsx */
        :root {
            --accent-color: #ec4899;
            --bg-color: #ffffff;
            --text-color: #111111;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        .dark {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
        }

        .theme-black {
            --accent-color: #ffffff;
            --bg-color: #000000;
            --text-color: #ffffff;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            outline: none !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Typography & Utility Classes */
        .font-serif-italic { font-family: var(--font-serif); font-style: italic; }
        .font-mono { font-family: var(--font-mono); }
        
        .shadow-huge {
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.25);
        }

        .archive-node {
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 3rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .dark .archive-node { border-color: rgba(255,255,255,0.05); }

        /* Navigation & Layers */
        .layer {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            overflow-y: auto;
            display: none;
            padding-bottom: 120px;
        }

        .layer.active { display: block; animation: layerSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

        @keyframes layerSlide {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* Chat Wallpaper System (from Chat.tsx) */
        .chat-container {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* Music Player Animation */
        .playing-active {
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(236, 72, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 0px; }

        /* Navbar Blur */
        .nav-blur {
            background: rgba(var(--bg-rgb), 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
    </style>
    
    <style id="user-injected-css"></style>
</head>
<body class="dark">

<div id="app-root">
    <div id="screen-auth" class="min-h-screen flex flex-col items-center justify-center p-8 bg-white dark:bg-[#0f0f0f]">
        <header class="text-center space-y-4 mb-20">
            <h1 class="font-serif-italic text-8xl tracking-tighter leading-none mb-1">AmonsPath.</h1>
            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.8em]">The Sound Archive</p>
        </header>
        <div class="w-full max-w-sm space-y-8">
            <input id="auth-username" type="text" placeholder="Your unique path..." 
                   class="w-full bg-gray-50 dark:bg-white/5 border-none rounded-[2.5rem] px-10 py-7 text-[15px] font-bold text-center shadow-huge transition-all focus:ring-4 focus:ring-pink-500/10">
            <button onclick="handleLogin()" class="w-full bg-pink-500 text-white rounded-[2.5rem] py-7 text-[11px] font-extrabold uppercase tracking-[0.4em] shadow-2xl shadow-pink-500/30 hover:scale-[1.02] active:scale-95 transition-all">
                Commence Journey
            </button>
            <div class="flex items-center gap-4 py-4">
                <div class="flex-1 h-px bg-white/5"></div>
                <span class="text-[9px] uppercase font-bold text-gray-500">or</span>
                <div class="flex-1 h-px bg-white/5"></div>
            </div>
            <button onclick="handleGuest()" class="w-full text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] hover:text-pink-500 transition-colors">
                Spectral Observation (Guest)
            </button>
        </div>
    </div>

    <div id="main-ui" style="display: none;">
        <header id="global-header" class="fixed top-0 left-0 right-0 z-[60] px-8 pt-12 pb-6 bg-transparent transition-all">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <h1 onclick="scrollToTop()" class="font-serif-italic text-5xl tracking-tighter cursor-pointer">Archives.</h1>
                <div class="flex gap-4">
                    <button onclick="openLayer('notifications')" class="p-4 bg-gray-100 dark:bg-white/5 rounded-3xl relative">
                        <div id="notif-dot" class="w-2 h-2 bg-pink-500 rounded-full absolute top-3 right-3 hidden"></div>
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <main id="feed-scroll" class="pt-40 pb-40 px-6 space-y-32 max-w-xl mx-auto">
            </main>

        <div id="layer-search" class="layer px-8 pt-24">
            <div class="max-w-xl mx-auto space-y-12">
                <h2 class="font-serif-italic text-6xl tracking-tighter">Search.</h2>
                <div class="relative">
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Filter frequencies..." 
                           class="w-full bg-gray-100 dark:bg-white/5 p-7 rounded-[2.5rem] outline-none font-bold text-lg">
                </div>
                <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                    <button class="px-8 py-3 bg-pink-500 text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest">Posts</button>
                    <button class="px-8 py-3 bg-white/5 text-gray-400 rounded-2xl text-[10px] font-bold uppercase tracking-widest">People</button>
                    <button class="px-8 py-3 bg-white/5 text-gray-400 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Music</button>
                </div>
                <div id="search-results" class="space-y-8"></div>
            </div>
        </div>

        <div id="layer-profile" class="layer">
            <div id="profile-content"></div>
        </div>

        <div id="layer-chat" class="layer pt-24">
            <div class="max-w-xl mx-auto px-8">
                <h2 class="font-serif-italic text-6xl tracking-tighter mb-12">Transmissions.</h2>
                <div id="chat-list" class="space-y-4"></div>
            </div>
        </div>
        
        <div id="chat-room" class="layer z-[150]">
            <div id="chat-room-content" class="h-full flex flex-col">
                </div>
        </div>

        <div id="global-player" class="fixed bottom-32 left-4 right-4 z-[200] max-w-lg mx-auto bg-white/10 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-5 hidden shadow-huge overflow-hidden">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-5 flex-1 min-w-0">
                    <div class="w-14 h-14 rounded-[1.8rem] overflow-hidden shadow-2xl relative">
                        <img id="player-art" src="" class="w-full h-full object-cover">
                        <div id="player-visualizer" class="absolute inset-0 bg-pink-500/20 hidden flex items-center justify-center">
                            <div class="flex gap-1">
                                <div class="w-1 h-4 bg-white animate-bounce"></div>
                                <div class="w-1 h-6 bg-white animate-bounce [animation-delay:0.2s]"></div>
                                <div class="w-1 h-3 bg-white animate-bounce [animation-delay:0.4s]"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col min-w-0">
                        <h4 id="player-title" class="text-sm font-black tracking-tight truncate">Track Name</h4>
                        <p id="player-artist" class="text-[9px] uppercase tracking-[0.2em] text-pink-500 font-bold truncate">Artist Name</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleMusic()" class="w-14 h-14 bg-pink-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                        <svg id="play-pause-icon" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button onclick="closePlayer()" class="w-10 h-10 text-gray-500 hover:text-white transition-colors">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <nav class="fixed bottom-0 left-0 right-0 h-28 nav-blur border-t border-white/5 z-[300] px-10 pb-6">
            <div class="max-w-xl mx-auto h-full flex items-center justify-between">
                <button onclick="navigate('feed')" class="nav-btn active text-pink-500 transition-all">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                </button>
                <button onclick="navigate('search')" class="nav-btn text-gray-500">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button onclick="navigate('chat')" class="nav-btn text-gray-500 relative">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </button>
                <button onclick="navigate('profile')" class="w-9 h-9 rounded-2xl overflow-hidden border-2 border-gray-500 transition-all hover:border-pink-500">
                    <img id="nav-pfp" src="" class="w-full h-full object-cover">
                </button>
            </div>
        </nav>
        
        <button id="fab-post" onclick="togglePostModal(true)" class="fixed bottom-32 right-8 z-[250] w-16 h-16 bg-pink-500 text-white rounded-[1.8rem] shadow-huge flex items-center justify-center active:scale-90 transition-all">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        </button>
    </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();

// DATABASE & STATE (From Types.ts & Contexts)
const AMONS_KERNEL = {
    currentUser: null,
    isGuest: false,
    activeScreen: 'feed',
    isPlaying: false,
    currentTrack: null,
    audio: new Audio(),
    
    // MOCK_USERS (AuthContext.tsx)
    users: [
        {
            id: 'zain_dev',
            username: 'zain',
            name: 'Zain',
            bio: 'Engineering Lead @ AMONSPATH OS. Finding beauty in digital noise.',
            pfp: 'https://picsum.photos/seed/zain/400',
            header: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe',
            themeColor: '#ec4899',
            isDarkMode: true,
            followers: 1200,
            following: 450,
            customCSS: `.archive-node:hover { border-color: #ec4899; }`,
            wallpapers: { 'adnan': 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e' }
        },
        {
            id: 'adnan_user',
            username: 'adnan',
            name: 'Adnan',
            bio: 'Archiving every rhythm. Catching echoes.',
            pfp: 'https://picsum.photos/seed/adnan/400',
            header: 'https://images.unsplash.com/photo-1557683316-973673baf926',
            themeColor: '#6366f1'
        }
    ],

    // MOCK_POSTS (PostContext.tsx)
    posts: [
        {
            id: 'p1',
            userId: 'zain_dev',
            type: 'music',
            music: {
                id: 'm1',
                name: 'Vignette',
                artist: 'Archiver',
                artwork: 'https://picsum.photos/seed/music1/600',
                url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
            },
            caption: 'Welcome to the path. Testing Kernel v15.0 @adnan',
            likes: ['adnan_user'],
            comments: [
                { 
                    id: 'c1', 
                    userId: 'adnan_user', 
                    text: 'This frequency feels right, Zain.', 
                    timestamp: '2m ago',
                    replies: [
                        { id: 'r1', userId: 'zain_dev', text: 'Steady as always.', timestamp: '1m ago' }
                    ]
                }
            ],
            timestamp: 'Just now'
        }
    ]
};

// CORE FUNCTIONS
function haptic(style = 'light') {
    tg.HapticFeedback.impactOccurred(style);
}

function handleLogin() {
    const input = document.getElementById('auth-username').value;
    if (!input) return;
    
    AMONS_KERNEL.currentUser = AMONS_KERNEL.users[0]; // Auto-login as Zain for demo
    AMONS_KERNEL.currentUser.username = input;
    startApp();
    haptic('medium');
}

function handleGuest() {
    AMONS_KERNEL.isGuest = true;
    AMONS_KERNEL.currentUser = { name: 'Guest', username: 'spectator', pfp: 'https://ui-avatars.com/api/?name=G' };
    startApp();
}

function startApp() {
    document.getElementById('screen-auth').style.display = 'none';
    document.getElementById('main-ui').style.display = 'block';
    document.getElementById('nav-pfp').src = AMONS_KERNEL.currentUser.pfp;
    
    // Inject User CSS
    if (AMONS_KERNEL.currentUser.customCSS) {
        document.getElementById('user-injected-css').innerHTML = AMONS_KERNEL.currentUser.customCSS;
    }
    
    renderFeed();
}

// NAVIGATION ENGINE
function navigate(screen) {
    haptic();
    document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-pink-500'));
    
    if (screen === 'feed') {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    } else {
        document.getElementById(`layer-${screen}`).classList.add('active');
    }
    
    // Update Nav Icons
    event?.currentTarget?.classList.add('text-pink-500');
    
    if (screen === 'profile') renderProfile(AMONS_KERNEL.currentUser.username);
    if (screen === 'chat') renderChatList();
}

// RENDER ENGINE: FEED (PostCard.tsx logic)
function renderFeed() {
    const container = document.getElementById('feed-scroll');
    container.innerHTML = AMONS_KERNEL.posts.map(post => {
        const user = AMONS_KERNEL.users.find(u => u.id === post.userId) || post.user;
        const hasLiked = post.likes.includes(AMONS_KERNEL.currentUser?.id);
        
        return `
            <div class="archive-node bg-gray-50 dark:bg-white/5 p-8 space-y-8 shadow-2xl overflow-hidden relative group">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-4 cursor-pointer" onclick="renderProfile('${user.username}')">
                        <img src="${user.pfp}" class="w-14 h-14 rounded-2xl object-cover border border-white/5">
                        <div>
                            <p class="font-extrabold text-sm tracking-tight">${user.name}</p>
                            <p class="text-[9px] uppercase tracking-[0.2em] text-gray-500">@${user.username} • ${post.timestamp}</p>
                        </div>
                    </div>
                    <button class="text-gray-400"><svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg></button>
                </div>

                <div class="relative aspect-square rounded-[2.5rem] overflow-hidden shadow-huge cursor-pointer" onclick="handleTrackAction('${post.id}')">
                    <img src="${post.music.artwork}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                    <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                        <div class="w-20 h-20 bg-white/10 backdrop-blur-2xl rounded-full flex items-center justify-center border border-white/20">
                            <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        </div>
                    </div>
                    <div class="absolute bottom-6 right-6 w-12 h-12 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10">
                         <svg width="18" height="18" class="text-pink-500 animate-spin-slow" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 14.5c-2.49 0-4.5-2.01-4.5-4.5S9.51 7.5 12 7.5s4.5 2.01 4.5 4.5-2.01 4.5-4.5 4.5zm0-5.5c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1z"/></svg>
                    </div>
                </div>

                <div class="space-y-4">
                    <h3 class="text-2xl font-black tracking-tighter">${post.music.name} <span class="text-pink-500 font-normal text-sm ml-2 italic">/ ${post.music.artist}</span></h3>
                    <p class="text-sm text-gray-500 leading-relaxed font-medium">${renderCaption(post.caption)}</p>
                </div>

                <div class="flex items-center gap-8 pt-4">
                    <button onclick="handleLike('${post.id}')" class="flex items-center gap-2 ${hasLiked ? 'text-pink-500' : 'text-gray-400'} transition-all hover:scale-110">
                        <svg width="22" height="22" fill="${hasLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/></svg>
                        <span class="text-[10px] font-black">${post.likes.length}</span>
                    </button>
                    <button onclick="openComments('${post.id}')" class="flex items-center gap-2 text-gray-400">
                        <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        <span class="text-[10px] font-black">${post.comments.length}</span>
                    </button>
                    <button class="ml-auto text-gray-400"><svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/></svg></button>
                </div>
            </div>
        `;
    }).join('');
}

function renderCaption(text) {
    return text.replace(/@(\w+)/g, '<span class="text-pink-500 font-bold cursor-pointer hover:underline">@$1</span>');
}

// Lanjut ke Bagian 3: Komentar, Chat Room, & Profile (Sangat Detail)...


// --- INTERACTION & COMMENT SYSTEM (PostDetail.tsx & PostContext.tsx Logic) ---

function openComments(postId) {
    haptic('medium');
    const post = AMONS_KERNEL.posts.find(p => p.id === postId);
    const commentLayer = document.createElement('div');
    commentLayer.id = 'comment-overlay';
    commentLayer.className = 'layer active z-[400] bg-white dark:bg-[#0f0f0f]';
    
    commentLayer.innerHTML = `
        <div class="max-w-xl mx-auto p-8 pb-40">
            <div class="flex items-center gap-6 mb-12">
                <button onclick="closeComments()" class="p-4 bg-gray-100 dark:bg-white/5 rounded-2xl">
                    <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                </button>
                <h2 class="font-serif-italic text-4xl tracking-tighter">Echoes.</h2>
            </div>
            
            <div id="comment-list" class="space-y-10">
                ${renderComments(post.comments)}
            </div>
        </div>
        
        <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 dark:bg-black/80 backdrop-blur-2xl border-t border-white/5 z-[410]">
            <div class="max-w-xl mx-auto relative">
                <input type="text" id="comment-input" placeholder="Add to the frequency..." 
                       class="w-full bg-gray-100 dark:bg-white/5 p-6 rounded-[2rem] outline-none font-bold">
                <button onclick="submitComment('${postId}')" class="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 bg-pink-500 text-white rounded-2xl flex items-center justify-center">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    `;
    document.body.appendChild(commentLayer);
}

function renderComments(comments) {
    return comments.map(c => {
        const user = AMONS_KERNEL.users.find(u => u.id === c.userId);
        return `
            <div class="space-y-6">
                <div class="flex gap-4">
                    <img src="${user?.pfp}" class="w-10 h-10 rounded-xl object-cover">
                    <div class="flex-1">
                        <div class="bg-gray-100 dark:bg-white/5 p-5 rounded-[1.5rem] rounded-tl-none">
                            <p class="text-[10px] font-black uppercase tracking-widest text-pink-500 mb-1">${user?.name}</p>
                            <p class="text-sm font-medium leading-relaxed">${c.text}</p>
                        </div>
                        <div class="flex gap-4 mt-2 px-2">
                            <span class="text-[9px] font-bold text-gray-500 uppercase">${c.timestamp}</span>
                            <button class="text-[9px] font-black text-pink-500 uppercase tracking-widest">Reply</button>
                        </div>
                    </div>
                </div>
                ${c.replies ? `<div class="ml-12 border-l-2 border-white/5 pl-6 space-y-6">${renderComments(c.replies)}</div>` : ''}
            </div>
        `;
    }).join('');
}

function closeComments() {
    const el = document.getElementById('comment-overlay');
    if (el) el.remove();
}

// --- CHAT SYSTEM (Chat.tsx Logic) ---

function renderChatList() {
    const container = document.getElementById('chat-list');
    const contacts = AMONS_KERNEL.users.filter(u => u.id !== AMONS_KERNEL.currentUser.id);
    
    container.innerHTML = contacts.map(contact => `
        <div onclick="openChatRoom('${contact.username}')" class="flex items-center justify-between p-6 bg-gray-50 dark:bg-white/5 rounded-[2.5rem] cursor-pointer hover:scale-[1.02] transition-all">
            <div class="flex items-center gap-5">

// --- MUSIC PLAYER ENGINE (MusicContext.tsx Logic) ---

function handleTrackAction(postId) {
    const post = AMONS_KERNEL.posts.find(p => p.id === postId);
    const track = post.music;
    
    if (AMONS_KERNEL.currentTrack?.id === track.id) {
        toggleMusic();
    } else {
        playTrack(track);
    }
}

function playTrack(track) {
    haptic('heavy');
    AMONS_KERNEL.currentTrack = track;
    AMONS_KERNEL.audio.src = track.url;
    AMONS_KERNEL.audio.play();
    AMONS_KERNEL.isPlaying = true;
    
    updatePlayerUI();
}

function toggleMusic() {
    if (!AMONS_KERNEL.currentTrack) return;
    
    if (AMONS_KERNEL.isPlaying) {
        AMONS_KERNEL.audio.pause();
        AMONS_KERNEL.isPlaying = false;
    } else {
        AMONS_KERNEL.audio.play();
        AMONS_KERNEL.isPlaying = true;
    }
    updatePlayerUI();
}

function updatePlayerUI() {
    const player = document.getElementById('global-player');
    const track = AMONS_KERNEL.currentTrack;
    
    if (!track) {
        player.style.display = 'none';
        return;
    }
    
    player.style.display = 'block';
    document.getElementById('player-art').src = track.artwork;
    document.getElementById('player-title').innerText = track.name;
    document.getElementById('player-artist').innerText = track.artist;
    
    const icon = document.getElementById('play-pause-icon');
    if (AMONS_KERNEL.isPlaying) {
        icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
        document.getElementById('player-visualizer').classList.remove('hidden');
    } else {
        icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
        document.getElementById('player-visualizer').classList.add('hidden');
    }
}

function applyCustomTheme(user) {
    if (!user) return;
    
    // Inject Custom CSS jika ada
    if (user.customCSS) {
        let styleTag = document.getElementById('user-custom-css');
        if (!styleTag) {
            styleTag = document.createElement('style');
            styleTag.id = 'user-custom-css';
            document.head.appendChild(styleTag);
        }
        styleTag.innerHTML = user.customCSS;
    }

    // Apply Theme Colors
    document.documentElement.style.setProperty('--accent-color', user.themeColor || '#ec4899');
    document.documentElement.classList.toggle('dark', user.isDarkMode);
}

            haptic('light');
        }
    });

// Global Haptic Helper
function haptic(intensity) {
    if (window.navigator.vibrate) {
        const ms = intensity === 'heavy' ? 50 : intensity === 'medium' ? 20 : 10;
        window.navigator.vibrate(ms);
    }
}

// --- DATABASE SYNC LOGIC ---

const AMONS_STORAGE_KEY = 'AMONSPATH_DATA_V15';

// Fungsi untuk menyimpan seluruh state kernel ke storage
function persistSystemState() {
    const stateToSave = {
        currentUser: AMONS_KERNEL.currentUser,
        users: AMONS_KERNEL.users,
        posts: AMONS_KERNEL.posts,
        lastSync: new Date().toISOString()
    };
    localStorage.setItem(AMONS_STORAGE_KEY, JSON.stringify(stateToSave));
    console.log("Kernel: State persisted to local archive.");
}

// Fungsi untuk memuat data saat startup
function loadSystemState() {
    const savedData = localStorage.getItem(AMONS_STORAGE_KEY);
    if (savedData) {
        const parsed = JSON.parse(savedData);
        AMONS_KERNEL.users = parsed.users;
        AMONS_KERNEL.posts = parsed.posts;
        AMONS_KERNEL.currentUser = parsed.currentUser;
        return true;
    }
    return false;
}

// --- IDENTITY PERSISTENCE (Update Profile Logic) ---

function updateIdentity(newData) {
    if (!AMONS_KERNEL.currentUser) return;

    // Update current user state
    AMONS_KERNEL.currentUser = { ...AMONS_KERNEL.currentUser, ...newData };

    // Update in global users list
    const userIndex = AMONS_KERNEL.users.findIndex(u => u.id === AMONS_KERNEL.currentUser.id);
    if (userIndex !== -1) {
        AMONS_KERNEL.users[userIndex] = AMONS_KERNEL.currentUser;
    }

    // Re-apply visual changes
    applyCustomTheme(AMONS_KERNEL.currentUser);
    
    // Save to storage
    persistSystemState();
    
    console.log("Identity Stabilized: Changes applied successfully.");
}

        },

    };

}
