<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AmonsPath - Music & Social Platform</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: #0a0e27;
        color: #e4e6eb;
        overflow-x: hidden;
      }

      .container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 20px;
      }

      header {
        background: rgba(15, 23, 42, 0.9);
        border-bottom: 1px solid rgba(100, 116, 255, 0.1);
        padding: 20px 0;
        margin-bottom: 40px;
        backdrop-filter: blur(10px);
      }

      nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }

      .logo {
        font-size: 28px;
        font-weight: bold;
        background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .nav-links {
        display: flex;
        gap: 30px;
        list-style: none;
      }

      .nav-links a {
        color: #e4e6eb;
        text-decoration: none;
        transition: color 0.3s;
      }

      .nav-links a:hover {
        color: #6366f1;
      }

      .auth-buttons {
        display: flex;
        gap: 10px;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 600;
        transition: all 0.3s;
      }

      .btn-primary {
        background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        color: white;
      }

      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
      }

      .btn-secondary {
        background: transparent;
        color: #6366f1;
        border: 1px solid #6366f1;
      }

      .btn-secondary:hover {
        background: rgba(99, 102, 241, 0.1);
      }

      .hero {
        text-align: center;
        margin-bottom: 60px;
        padding: 60px 20px;
      }

      .hero h1 {
        font-size: 48px;
        margin-bottom: 20px;
        background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .hero p {
        font-size: 18px;
        color: #a0aec0;
        margin-bottom: 30px;
      }

      .features {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 30px;
        margin-bottom: 60px;
      }

      .feature-card {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        border: 1px solid rgba(100, 116, 255, 0.2);
        border-radius: 12px;
        padding: 30px;
        transition: all 0.3s;
      }

      .feature-card:hover {
        transform: translateY(-5px);
        border-color: rgba(100, 116, 255, 0.5);
      }

      .feature-card h3 {
        font-size: 20px;
        margin-bottom: 10px;
        color: #6366f1;
      }

      .feature-card p {
        color: #cbd5e1;
        font-size: 14px;
      }

      .users-section {
        margin-bottom: 60px;
      }

      .users-section h2 {
        font-size: 32px;
        margin-bottom: 30px;
        text-align: center;
      }

      .users-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
      }

      .user-card {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        border: 1px solid rgba(100, 116, 255, 0.2);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s;
      }

      .user-card:hover {
        transform: translateY(-5px);
      }

      .user-header {
        height: 150px;
        background: linear-gradient(135deg, #6366f1 0%, #ec4899 100%);
        position: relative;
      }

      .user-pfp {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        border: 4px solid #0a0e27;
        position: absolute;
        bottom: -40px;
        left: 20px;
        object-fit: cover;
      }

      .user-info {
        padding: 50px 20px 20px;
      }

      .user-info h3 {
        margin-bottom: 5px;
      }

      .user-info p {
        color: #a0aec0;
        font-size: 12px;
        margin-bottom: 15px;
      }

      .user-actions {
        display: flex;
        gap: 10px;
      }

      .user-actions button {
        flex: 1;
        padding: 8px;
        font-size: 12px;
      }

      .tracks-section {
        margin-bottom: 60px;
      }

      .tracks-section h2 {
        font-size: 32px;
        margin-bottom: 30px;
        text-align: center;
      }

      .tracks-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
      }

      .track-card {
        background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(236, 72, 153, 0.1) 100%);
        border: 1px solid rgba(100, 116, 255, 0.2);
        border-radius: 12px;
        overflow: hidden;
        transition: all 0.3s;
        cursor: pointer;
      }

      .track-card:hover {
        transform: translateY(-5px);
      }

      .track-artwork {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
      }

      .track-info {
        padding: 15px;
      }

      .track-info h4 {
        font-size: 14px;
        margin-bottom: 5px;
      }

      .track-info p {
        color: #a0aec0;
        font-size: 12px;
      }

      footer {
        border-top: 1px solid rgba(100, 116, 255, 0.1);
        padding: 40px 0;
        text-align: center;
        color: #a0aec0;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(5px);
      }

      .modal.active {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .modal-content {
        background: #0f172a;
        border: 1px solid rgba(100, 116, 255, 0.2);
        border-radius: 16px;
        padding: 40px;
        max-width: 500px;
        width: 90%;
      }

      .modal-content h2 {
        margin-bottom: 20px;
        font-size: 24px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #a0aec0;
        font-size: 14px;
      }

      .form-group input {
        width: 100%;
        padding: 12px;
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid rgba(100, 116, 255, 0.2);
        border-radius: 8px;
        color: #e4e6eb;
        font-size: 14px;
      }

      .close {
        color: #a0aec0;
        float: right;
        font-size: 28px;
        font-weight: bold;
        cursor: pointer;
      }

      .close:hover {
        color: #e4e6eb;
      }

      @media (max-width: 768px) {
        .hero h1 {
          font-size: 32px;
        }

        .nav-links {
          gap: 15px;
        }

        .features,
        .users-grid,
        .tracks-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useContext, createContext } = React;

      // Context
      const AuthContext = createContext(null);
      const MusicContext = createContext(null);

      // Sample Data
      const USERS = [
        {
          id: 'zain_dev',
          username: 'zain',
          name: 'Zain',
          bio: 'The Architect of AmonsPath',
          pfp: 'https://picsum.photos/seed/zain/400',
          following: ['adnan_user'],
          followers: []
        },
        {
          id: 'adnan_user',
          username: 'adnan',
          name: 'Adnan',
          bio: 'Archiving every rhythm',
          pfp: 'https://picsum.photos/seed/adnan/400',
          following: [],
          followers: ['zain_dev']
        }
      ];

      const TRACKS = [
        {
          id: 't1',
          name: 'Evergreen',
          artist: 'Rhythms',
          artwork: 'https://picsum.photos/seed/music1/400'
        },
        {
          id: 't2',
          name: 'Neon Dreams',
          artist: 'Cyber',
          artwork: 'https://picsum.photos/seed/music2/400'
        },
        {
          id: 't3',
          name: 'Solace',
          artist: 'Luna',
          artwork: 'https://picsum.photos/seed/music3/400'
        },
        {
          id: 't4',
          name: 'Vantage',
          artist: 'Aria',
          artwork: 'https://picsum.photos/seed/music4/400'
        },
        {
          id: 't5',
          name: 'Midnight',
          artist: 'Echo',
          artwork: 'https://picsum.photos/seed/music5/400'
        },
        {
          id: 't6',
          name: 'Vignette',
          artist: 'Archiver',
          artwork: 'https://picsum.photos/seed/music6/400'
        },
        {
          id: 't7',
          name: 'Phase Shift',
          artist: 'Spectrum',
          artwork: 'https://picsum.photos/seed/music7/400'
        },
        {
          id: 't8',
          name: 'Afterlight',
          artist: 'Bloom',
          artwork: 'https://picsum.photos/seed/music8/400'
        }
      ];

      // Auth Provider
      function AuthProvider({ children }) {
        const [user, setUser] = useState(null);
        const [isGuest, setIsGuest] = useState(false);
        const [allUsers, setAllUsers] = useState(USERS);

        useEffect(() => {
          const savedUser = localStorage.getItem('amons_user');
          if (savedUser) {
            setUser(JSON.parse(savedUser));
          }
        }, []);

        const signIn = (username) => {
          const lowerUsername = username.toLowerCase();
          let foundUser = allUsers.find(u => u.username === lowerUsername);

          if (!foundUser) {
            foundUser = {
              id: `user_${Date.now()}`,
              username: lowerUsername,
              name: username,
              bio: 'Searching for meaning in melodies.',
              pfp: `https://picsum.photos/seed/${lowerUsername}/400`,
              following: [],
              followers: []
            };
            setAllUsers([...allUsers, foundUser]);
          }

          setUser(foundUser);
          setIsGuest(false);
          localStorage.setItem('amons_user', JSON.stringify(foundUser));
        };

        const signOut = () => {
          setUser(null);
          setIsGuest(false);
          localStorage.removeItem('amons_user');
        };

        const continueAsGuest = () => {
          setUser(null);
          setIsGuest(true);
        };

        const followUser = (targetId) => {
          if (!user) return;
          const targetUser = allUsers.find(u => u.id === targetId);
          if (!targetUser) return;

          const updatedUser = {
            ...user,
            following: [...user.following, targetId]
          };
          const updatedTarget = {
            ...targetUser,
            followers: [...targetUser.followers, user.id]
          };

          setUser(updatedUser);
          const updated = allUsers.map(u =>
            u.id === user.id ? updatedUser : u.id === targetId ? updatedTarget : u
          );
          setAllUsers(updated);
          localStorage.setItem('amons_user', JSON.stringify(updatedUser));
        };

        const unfollowUser = (targetId) => {
          if (!user) return;
          const targetUser = allUsers.find(u => u.id === targetId);
          if (!targetUser) return;

          const updatedUser = {
            ...user,
            following: user.following.filter(id => id !== targetId)
          };
          const updatedTarget = {
            ...targetUser,
            followers: targetUser.followers.filter(id => id !== user.id)
          };

          setUser(updatedUser);
          const updated = allUsers.map(u =>
            u.id === user.id ? updatedUser : u.id === targetId ? updatedTarget : u
          );
          setAllUsers(updated);
          localStorage.setItem('amons_user', JSON.stringify(updatedUser));
        };

        return (
          <AuthContext.Provider value={{ user, isGuest, allUsers, signIn, signOut, continueAsGuest, followUser, unfollowUser }}>
            {children}
          </AuthContext.Provider>
        );
      }

      // Music Provider
      function MusicProvider({ children }) {
        const [currentTrack, setCurrentTrack] = useState(null);
        const [isPlaying, setIsPlaying] = useState(false);

        const playTrack = (track) => {
          setCurrentTrack(track);
          setIsPlaying(true);
        };

        const pauseTrack = () => {
          setIsPlaying(false);
        };

        const stopTrack = () => {
          setCurrentTrack(null);
          setIsPlaying(false);
        };

        return (
          <MusicContext.Provider value={{ currentTrack, isPlaying, playTrack, pauseTrack, stopTrack }}>
            {children}
          </MusicContext.Provider>
        );
      }

      // Hooks
      const useAuth = () => useContext(AuthContext);
      const useMusic = () => useContext(MusicContext);

      // Modal Component
      function AuthModal({ isOpen, onClose }) {
        const [username, setUsername] = useState('');
        const { signIn, continueAsGuest } = useAuth();

        const handleSignIn = () => {
          if (username.trim()) {
            signIn(username);
            onClose();
            setUsername('');
          }
        };

        const handleGuest = () => {
          continueAsGuest();
          onClose();
        };

        return (
          <div className={`modal ${isOpen ? 'active' : ''}`}>
            <div className="modal-content">
              <span className="close" onClick={onClose}>&times;</span>
              <h2>Welcome to AmonsPath</h2>
              <div className="form-group">
                <label>Username</label>
                <input
                  type="text"
                  placeholder="Enter your username"
                  value={username}
                  onChange={(e) => setUsername(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleSignIn()}
                />
              </div>
              <button className="btn-primary" style={{ width: '100%', marginBottom: '10px' }} onClick={handleSignIn}>
                Sign In
              </button>
              <button className="btn-secondary" style={{ width: '100%' }} onClick={handleGuest}>
                Continue as Guest
              </button>
            </div>
          </div>
        );
      }

      // Header Component
      function Header({ onAuthClick }) {
        const { user } = useAuth();

        return (
          <header>
            <div className="container">
              <nav>
                <div className="logo">AmonsPath 🎵</div>
                <ul className="nav-links">
                  <li><a href="#features">Features</a></li>
                  <li><a href="#users">Users</a></li>
                  <li><a href="#tracks">Music</a></li>
                </ul>
                <div className="auth-buttons">
                  {user ? (
                    <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
                      <span>{user.name}</span>
                      <button className="btn-secondary" onClick={onAuthClick}>Sign Out</button>
                    </div>
                  ) : (
                    <button className="btn-primary" onClick={onAuthClick}>
                      Sign In
                    </button>
                  )}
                </div>
              </nav>
            </div>
          </header>
        );
      }

      // Hero Component
      function Hero() {
        return (
          <div className="hero">
            <h1>Welcome to AmonsPath</h1>
            <p>Discover music, connect with artists, and share your rhythm with the world.</p>
            <button className="btn-primary">Explore Now</button>
          </div>
        );
      }

      // Features Component
      function Features() {
        const features = [
          { title: 'Discover Music', description: 'Find new tracks and artists from around the world' },
          { title: 'Connect', description: 'Follow your favorite artists and create your network' },
          { title: 'Share', description: 'Share your music and thoughts with the community' },
          { title: 'Explore', description: 'Browse curated playlists and recommendations' }
        ];

        return (
          <div id="features" className="container">
            <div className="features">
              {features.map((feature, idx) => (
                <div key={idx} className="feature-card">
                  <h3>{feature.title}</h3>
                  <p>{feature.description}</p>
                </div>
              ))}
            </div>
          </div>
        );
      }

      // User Card Component
      function UserCard({ user }) {
        const { user: currentUser, followUser, unfollowUser } = useAuth();
        const isFollowing = currentUser?.following.includes(user.id);

        return (
          <div className="user-card">
            <div className="user-header" style={{
              background: `linear-gradient(135deg, ${user.themeColor || '#6366f1'} 0%, #ec4899 100%)`
            }}>
              <img src={user.pfp} alt={user.name} className="user-pfp" />
            </div>
            <div className="user-info">
              <h3>{user.name}</h3>
              <p>@{user.username}</p>
              <p>{user.bio}</p>
              <div className="user-actions">
                {currentUser && currentUser.id !== user.id && (
                  <button
                    className={isFollowing ? 'btn-secondary' : 'btn-primary'}
                    onClick={() => isFollowing ? unfollowUser(user.id) : followUser(user.id)}
                  >
                    {isFollowing ? 'Following' : 'Follow'}
                  </button>
                )}
              </div>
            </div>
          </div>
        );
      }

      // Users Section Component
      function UsersSection() {
        const { allUsers } = useAuth();

        return (
          <div id="users" className="container users-section">
            <h2>Discover Artists</h2>
            <div className="users-grid">
              {allUsers.map(user => (
                <UserCard key={user.id} user={user} />
              ))}
            </div>
          </div>
        );
      }

      // Track Card Component
      function TrackCard({ track }) {
        const { playTrack } = useMusic();

        return (
          <div className="track-card" onClick={() => playTrack(track)}>
            <img src={track.artwork} alt={track.name} className="track-artwork" />
            <div className="track-info">
              <h4>{track.name}</h4>
              <p>{track.artist}</p>
            </div>
          </div>
        );
      }

      // Tracks Section Component
      function TracksSection() {
        return (
          <div id="tracks" className="container tracks-section">
            <h2>Featured Tracks</h2>
            <div className="tracks-grid">
              {TRACKS.map(track => (
                <TrackCard key={track.id} track={track} />
              ))}
            </div>
          </div>
        );
      }

      // Footer Component
      function Footer() {
        return (
          <footer className="container">
            <p>&copy; 2024 AmonsPath. Created with 🎵 and passion.</p>
            <p>Connecting music lovers worldwide</p>
          </footer>
        );
      }

      // Main App Component
      function App() {
        const [authModalOpen, setAuthModalOpen] = useState(false);
        const { user, signOut } = useAuth();

        const handleAuthClick = () => {
          if (user) {
            signOut();
          } else {
            setAuthModalOpen(true);
          }
        };

        return (
          <>
            <Header onAuthClick={handleAuthClick} />
            <Hero />
            <Features />
            <UsersSection />
            <TracksSection />
            <Footer />
            <AuthModal isOpen={authModalOpen} onClose={() => setAuthModalOpen(false)} />
          </>
        );
      }

      // Render App
      ReactDOM.render(
        <AuthProvider>
          <MusicProvider>
            <App />
          </MusicProvider>
        </AuthProvider>,
        document.getElementById('root')
      );
    </script>
  </body>
</html>
