<!-- Updated index.html Content -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My App</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Welcome to My App</h1>
        <button id="toggleTheme">Toggle Dark/Light Mode</button>
    </header>
    <main>
        <section id="features">
            <h2>Features</h2>
            <p>Explore the enhanced user interface with improved accessibility.</p>
            <div id="featureList">
                <div class="feature">
                    <h3>Feature 1</h3>
                    <p>Description of feature 1.</p>
                </div>
                <!-- More features can be added here -->
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 My App. All Rights Reserved.</p>
    </footer>
    <script src="script.js"></script>
    <script>
        const toggleThemeButton = document.getElementById('toggleTheme');
        const body = document.body;
        toggleThemeButton.addEventListener('click', () => {
            body.classList.toggle('dark-mode');
            if (body.classList.contains('dark-mode')) {
                toggleThemeButton.textContent = 'Switch to Light Mode';
            } else {
                toggleThemeButton.textContent = 'Switch to Dark Mode';
            }
        });
    </script>
</body>
</html>
