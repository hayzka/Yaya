<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#007aff">
    <title>AmonsPath OS v15.0</title>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #007aff;
            --accent-glow: rgba(0, 122, 255, 0.4);
            --accent-soft: rgba(0, 122, 255, 0.1);
            --bg-deep: #050505;
            --bg-card: #0f0f0f;
            --bg-elevated: #1a1a1a;
            --text-main: #ffffff;
            --text-dim: #8e8e93;
            --border: 1px solid rgba(255, 255, 255, 0.08);
            --glass: blur(25px) saturate(180%);
            --radius-l: 32px;
            --radius-m: 18px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg-deep); color: var(--text-main); overflow-x: hidden; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        .weight-800 { font-weight: 800; letter-spacing: -1px; }

        /* CORE LAYOUT */
        .app-shell { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; border-left: var(--border); border-right: var(--border); background: var(--bg-deep); display: flex; flex-direction: column; }

        .sys-header { position: sticky; top: 0; z-index: 1000; padding: 20px; background: rgba(5, 5, 5, 0.8); backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass); border-bottom: var(--border); display: flex; justify-content: space-between; align-items: center; }
        
        .pfp-node { width: 45px; height: 45px; border-radius: 15px; border: var(--border); object-fit: cover; background: var(--bg-elevated); transition: 0.3s; }

        /* NAVIGATION */
        .nav-tabs { display: flex; padding: 15px 20px; gap: 10px; }
        .tab-item { flex: 1; padding: 12px; border-radius: 14px; border: var(--border); background: var(--bg-card); color: var(--text-dim); font-size: 11px; font-weight: 800; text-transform: uppercase; cursor: pointer; transition: 0.4s; }
        .tab-item.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 10px 25px var(--accent-glow); }

        /* MUSIC NODES (APPLE STYLE) */
        .feed-node { background: var(--bg-card); border-radius: var(--radius-l); margin: 0 20px 25px; border: var(--border); overflow: hidden; position: relative; }
        .node-header { padding: 18px; display: flex; align-items: center; justify-content: space-between; }
        .node-meta { display: flex; align-items: center; gap: 12px; }
        
        .artwork-container { width: 100%; aspect-ratio: 1; background: #000; position: relative; }
        .artwork-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }
        .play-btn { position: absolute; bottom: 20px; right: 20px; width: 60px; height: 60px; border-radius: 50%; background: var(--accent); border: none; color: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .node-body { padding: 22px; }
        .node-body h3 { font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 5px; }
        .node-body p { font-size: 13px; color: #ccc; line-height: 1.6; }

        /* INTERACTION LAYERS */
        .sys-layer { position: fixed; inset: 0; background: var(--bg-deep); z-index: 2000; display: none; flex-direction: column; animation: layerUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes layerUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .layer-head { padding: 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: var(--border); }
        .form-content { padding: 20px; flex: 1; overflow-y: auto; }
        .input-sys { width: 100%; padding: 18px; border-radius: 18px; background: var(--bg-elevated); border: var(--border); color: white; font-family: inherit; margin-bottom: 25px; }
        .input-sys:focus { border-color: var(--accent); }

        .btn-main { width: 100%; padding: 18px; border-radius: 18px; border: none; font-weight: 800; font-size: 12px; text-transform: uppercase; cursor: pointer; transition: 0.3s; }
        .btn-accent { background: var(--accent); color: white; box-shadow: 0 15px 35px var(--accent-glow); }

        .fab { position: fixed; bottom: 40px; right: 25px; width: 65px; height: 65px; border-radius: 22px; background: var(--accent); color: white; border: none; font-size: 32px; z-index: 1100; box-shadow: 0 15px 40px var(--accent-glow); display: flex; align-items: center; justify-content: center; }

        /* NOTIFICATION POPUP */
        #notifier { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 12px 25px; background: var(--accent); color: white; border-radius: 30px; font-size: 11px; font-weight: 800; z-index: 9999; display: none; box-shadow: 0 10px 30px var(--accent-glow); }
    </style>
</head>
<body>

    <div id="notifier">SYSTEM_NOTIFICATION</div>

    <div class="app-shell">
        <header class="sys-header">
            <div id="header-ident" style="display: flex; align-items: center; gap: 14px;">
                <img src="https://api.dicebear.com/7.x/identicon/svg?seed=ghost" class="pfp-node" id="sys-pfp">
                <div>
                    <h2 class="weight-800" style="font-size: 16px;" id="sys-name">GHOST_NODE</h2>
                    <p class="mono" style="font-size: 9px; color: var(--accent);" id="sys-user">@anonymous</p>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button onclick="View.open('lyr-stats')" style="background:none; border:none; font-size:22px;">📊</button>
                <button onclick="View.open('lyr-cfg')" style="background:none; border:none; font-size:22px;">⚙️</button>
            </div>
        </header>

        <nav class="nav-tabs">
            <button id="t-pub" class="tab-item active" onclick="Kernel.tab('global')">Public Index</button>
            <button id="t-own" class="tab-item" onclick="Kernel.tab('mine')">My Archive</button>
        </nav>

        <main id="viewport" style="flex:1; padding-top: 10px;">
            </main>
    </div>

    <button class="fab" onclick="Gatekeeper.verifyAccess('lyr-new')">+</button>

    <div id="lyr-new" class="sys-layer">
        <div class="layer-head"><h2 class="weight-800">NEW_ARCHIVE</h2><button onclick="View.close('lyr-new')" class="mono">✕</button></div>
        <div class="form-content">
            <label class="mono" style="font-size:10px; color:var(--accent); margin-bottom:10px; display:block;">// DATABASE_QUERY</label>
            <input type="text" id="m-search" oninput="MusicProcessor.search(this.value)" class="input-sys" placeholder="Search track or artist...">
            <div id="m-results" style="margin-top:-20px; margin-bottom:20px; border-radius:18px; overflow:hidden; border:var(--border); display:none;"></div>
            <div id="m-preview" style="margin-bottom:25px; display:none;"></div>
            <label class="mono" style="font-size:10px; color:var(--accent); margin-bottom:10px; display:block;">// ANNOTATION</label>
            <textarea id="m-cap" class="input-sys" style="height:120px; resize:none;"></textarea>
            <button id="btn-push" onclick="Kernel.push()" class="btn-main btn-accent">PUSH_TO_NODE</button>
        </div>
    </div>

    <div id="lyr-cfg" class="sys-layer">
        <div class="layer-head"><h2 class="weight-800">SYS_CONFIG</h2><button onclick="View.close('lyr-cfg')" class="mono">✕</button></div>
        <div class="form-content">
            <div id="cfg-ghost" style="text-align:center; padding:50px 0;">
                <p class="mono text-dim">// NO_PROFILE_DETECTED</p>
                <button onclick="View.open('lyr-auth')" class="btn-main btn-accent" style="margin-top:20px;">INIT_IDENTITY</button>
            </div>
            <div id="cfg-user" style="display:none;">
                <div style="text-align:center; margin-bottom:30px;">
                    <img id="cfg-pfp" class="pfp-node" style="width:100px; height:100px; border-radius:30px;">
                    <h3 id="cfg-name" class="weight-800" style="margin-top:15px;"></h3>
                </div>
                <label class="mono" style="font-size:10px; color:var(--accent);">CHAMELEON_THEME_COLOR</label>
                <input type="color" id="theme-color" class="input-sys" style="height:70px; padding:5px;">
                <p id="hex-view" class="mono" style="text-align:center; margin-top:-15px; margin-bottom:25px; font-size:12px;"></p>
                <button onclick="Kernel.saveTheme()" class="btn-main btn-accent">SAVE_PREFERENCES</button>
                <button onclick="Kernel.exportData()" class="btn-main" style="margin-top:15px; background:var(--bg-elevated); color:white;">EXPORT_DB_JSON</button>
            </div>
        </div>
    </div>

    <div id="lyr-auth" class="sys-layer">
        <div class="layer-head"><h2 class="weight-800">IDENTITY_INIT</h2><button onclick="View.close('lyr-auth')" class="mono">✕</button></div>
        <div class="form-content">
            <input type="text" id="reg-name" class="input-sys" placeholder="Full Display Name">
            <input type="text" id="reg-user" class="input-sys mono" placeholder="Handle_Name" oninput="Kernel.checkUN(this.value)">
            <p id="un-status" class="mono" style="font-size:10px; margin-top:-15px; margin-bottom:25px;"></p>
            <button id="btn-reg" onclick="Kernel.register()" class="btn-main btn-accent" disabled>ESTABLISH_LINK</button>
        </div>
    </div>

    <div id="lyr-stats" class="sys-layer">
        <div class="layer-head"><h2 class="weight-800">ANALYTICS</h2><button onclick="View.close('lyr-stats')" class="mono">✕</button></div>
        <div class="form-content">
            <div style="background:var(--bg-card); padding:20px; border-radius:25px; border:var(--border);">
                <canvas id="statChart"></canvas>
            </div>
            <div style="margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <div style="background:var(--bg-card); padding:20px; border-radius:20px; border:var(--border); text-align:center;">
                    <p class="mono" style="font-size:10px; color:var(--accent);">TOTAL_RECORDS</p>
                    <h2 id="st-total" class="weight-800">0</h2>
                </div>
                <div style="background:var(--bg-card); padding:20px; border-radius:20px; border:var(--border); text-align:center;">
                    <p class="mono" style="font-size:10px; color:var(--accent);">NODE_STATUS</p>
                    <h2 class="weight-800" style="color:#4cd964;">ACTIVE</h2>
                </div>
            </div>
        </div>
    </div>

    <script>
        const Core = {
            tg: window.Telegram.WebApp,
            // REPLACE WITH YOUR ACTUAL KEYS
            db: window.supabase.createClient('https://aldzhrtbrjszppseawrz.supabase.co', 'sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp'),
            state: {
                user: window.Telegram.WebApp.initDataUnsafe.user || { id: 888, first_name: 'Ghost' },
                profile: null,
                view: 'global',
                selected: null,
                audio: null
            }
        };

        const View = {
            open(id) { document.getElementById(id).style.display = 'flex'; if(id==='lyr-stats') this.drawChart(); this.vibrate(); },
            close(id) { document.getElementById(id).style.display = 'none'; this.vibrate(); },
            vibrate() { try { Core.tg.HapticFeedback.impactOccurred('medium'); } catch(e){} },
            notify(msg) { 
                const n = document.getElementById('notifier');
                n.innerText = msg; n.style.display = 'block';
                setTimeout(() => n.style.display = 'none', 3000);
            },
            drawChart() {
                const ctx = document.getElementById('statChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: { labels: ['M','T','W','T','F','S','S'], datasets: [{ data: [5, 8, 12, 7, 10, 15, 9], borderColor: getComputedStyle(document.documentElement).getPropertyValue('--accent'), tension: 0.4, borderWeight: 3 }] },
                    options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { display: false } } }
                });
            }
        };

        const Chameleon = {
            inject(hex) {
                if(!hex) return;
                const r = document.documentElement;
                r.style.setProperty('--accent', hex);
                r.style.setProperty('--accent-glow', hex + '66');
                document.getElementById('hex-view').innerText = hex.toUpperCase();
                document.getElementById('theme-color').value = hex;
                document.querySelector('meta[name="theme-color"]').setAttribute('content', hex);
            },
            watch() {
                document.getElementById('theme-color').addEventListener('input', (e) => this.inject(e.target.value));
            }
        };

        const Gatekeeper = {
            async verifyAccess(lyr) {
                if(!Core.state.profile) {
                    View.notify("IDENT_REQUIRED_FOR_WRITE");
                    View.open('lyr-auth');
                    return;
                }
                View.open(lyr);
            }
        };

        const MusicProcessor = {
            search(q) {
                if(q.length < 3) return;
                fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&limit=5`)
                .then(r => r.json()).then(d => {
                    const res = document.getElementById('m-results');
                    res.innerHTML = d.results.map(i => `
                        <div onclick="MusicProcessor.pick('${i.trackName}','${i.artistName}','${i.previewUrl}','${i.artworkUrl100}')" style="padding:15px; background:var(--bg-elevated); border-bottom:1px solid rgba(255,255,255,0.05); display:flex; gap:12px;">
                            <img src="${i.artworkUrl60}" style="width:40px; border-radius:10px;">
                            <div style="overflow:hidden"><p class="weight-800" style="font-size:14px;">${i.trackName}</p><p class="mono text-dim" style="font-size:10px;">${i.artistName}</p></div>
                        </div>
                    `).join('');
                    res.style.display = 'block';
                });
            },
            pick(t, a, u, c) {
                Core.state.selected = { t, a, u, c: c.replace('100x100','1000x1000') };
                document.getElementById('m-preview').innerHTML = `<div class="feed-node" style="margin:0; border:2px solid var(--accent);"><div class="node-header"><h4>${t}</h4></div></div>`;
                document.getElementById('m-preview').style.display = 'block';
                document.getElementById('m-results').style.display = 'none';
            },
            toggle(url, btn) {
                if(Core.state.audio && Core.state.audio.src === url) {
                    if(Core.state.audio.paused) { Core.state.audio.play(); btn.innerText = '⏸'; }
                    else { Core.state.audio.pause(); btn.innerText = '▶'; }
                } else {
                    if(Core.state.audio) Core.state.audio.pause();
                    Core.state.audio = new Audio(url); Core.state.audio.play(); btn.innerText = '⏸';
                }
            }
        };

        const Observer = {
            subscribe() {
                Core.db.channel('public:music_posts')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'music_posts' }, () => Kernel.fetchNodes())
                .subscribe();
            }
        };

        const Kernel = {
            async boot() {
                this.fetchNodes();
                const { data: p } = await Core.db.from('profiles').select('*').eq('telegram_id', Core.state.user.id).single();
                if(p) {
                    Core.state.profile = p;
                    this.syncUI(p);
                    Chameleon.inject(p.theme_color);
                }
                Chameleon.watch();
                Observer.subscribe();
                Core.tg.expand();
            },
            async fetchNodes() {
                const f = document.getElementById('viewport');
                f.innerHTML = `<div style="padding:50px; text-align:center;" class="mono text-dim">// SYNCING_STREAMS...</div>`;
                
                let q = Core.db.from('music_posts').select('*, profiles(*)').order('created_at', {ascending:false});
                if(Core.state.view === 'mine') q = q.eq('sender_id', Core.state.user.id);
                
                const { data } = await q;
                document.getElementById('st-total').innerText = data.length;
                f.innerHTML = data.map(n => `
                    <div class="feed-node">
                        <div class="node-header">
                            <div class="node-meta">
                                <img src="${n.profiles.photo_url}" class="pfp-node" style="width:30px; height:30px;">
                                <div><h4 style="font-size:13px;">${n.profiles.display_name}</h4><p class="mono text-dim" style="font-size:8px;">@${n.profiles.username}</p></div>
                            </div>
                        </div>
                        <div class="artwork-container">
                            <img src="${n.music_cover}">
                            <button class="play-btn" onclick="MusicProcessor.toggle('${n.music_url}', this)">▶</button>
                        </div>
                        <div class="node-body">
                            <h3>${n.music_title}</h3>
                            <p>${n.caption || ''}</p>
                        </div>
                        ${Core.state.view === 'mine' ? `<div style="padding:0 22px 22px;"><button onclick="Kernel.erase('${n.id}')" style="color:#ff3b30; background:none; border:none;" class="mono text-xs">ERASE_DATA</button></div>` : ''}
                    </div>
                `).join('');
            },
            tab(v) { Core.state.view = v; document.getElementById('t-pub').classList.toggle('active', v==='global'); document.getElementById('t-own').classList.toggle('active', v==='mine'); this.fetchNodes(); },
            async checkUN(u) {
                const { data } = await Core.db.from('profiles').select('username').eq('username', u.toLowerCase()).single();
                const s = document.getElementById('un-status'), b = document.getElementById('btn-reg');
                if(data) { s.innerText = "UNAVAILABLE"; s.style.color="red"; b.disabled=true; }
                else { s.innerText = "AVAILABLE"; s.style.color="var(--accent)"; b.disabled=false; }
            },
            async register() {
                await Core.db.from('profiles').insert({
                    telegram_id: Core.state.user.id,
                    username: document.getElementById('reg-user').value.toLowerCase(),
                    display_name: document.getElementById('reg-name').value,
                    photo_url: `https://api.dicebear.com/7.x/identicon/svg?seed=${Date.now()}`
                });
                location.reload();
            },
            syncUI(p) {
                document.getElementById('sys-pfp').src = p.photo_url;
                document.getElementById('sys-name').innerText = p.display_name.toUpperCase();
                document.getElementById('sys-user').innerText = `@${p.username}`;
                document.getElementById('cfg-ghost').style.display = 'none';
                document.getElementById('cfg-user').style.display = 'block';
                document.getElementById('cfg-pfp').src = p.photo_url;
                document.getElementById('cfg-name').innerText = p.display_name;
            },
            async saveTheme() {
                await Core.db.from('profiles').update({ theme_color: document.getElementById('theme-color').value }).eq('telegram_id', Core.state.user.id);
                View.notify("THEME_COMMITTED");
                setTimeout(() => location.reload(), 1000);
            },
            async push() {
                const b = document.getElementById('btn-push'); b.innerText = "PUSHING..."; b.disabled = true;
                await Core.db.from('music_posts').insert({
                    sender_id: Core.state.user.id,
                    music_title: Core.state.selected.t + " - " + Core.state.selected.a,
                    music_url: Core.state.selected.u,
                    music_cover: Core.state.selected.c,
                    caption: document.getElementById('m-cap').value
                });
                location.reload();
            },
            async erase(id) { if(confirm("Erase Node?")) { await Core.db.from('music_posts').delete().eq('id', id); this.fetchNodes(); } },
            exportData() {
                const blob = new Blob([JSON.stringify(Core.state.profile)], {type: 'application/json'});
                const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = "amons_profile.json"; a.click();
            }
        };

        window.onload = () => Kernel.boot();
    </script>
</body>
</html>
