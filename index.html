<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:italic&display=swap" rel="stylesheet">
    
    <style id="base-style">
        :root { --theme-color: #ec4899; }
        body { background-color: #fcfcfc; font-family: 'Inter', sans-serif; color: #1a1a1a; -webkit-tap-highlight-color: transparent; }
        
        /* Truncate Logic: Memotong caption panjang di timeline */
        .caption-excent { 
            display: -webkit-box; 
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical; 
            overflow: hidden; 
            cursor: pointer; 
        }

        .elegant-card { background: white; border-radius: 20px; margin: 15px; border: 1px solid #f0f0f0; box-shadow: 0 4px 20px rgba(0,0,0,0.01); transition: 0.3s; }
        .input-elegant { background: #f9f9f9; border: 1px solid #eee; border-radius: 12px; padding: 12px 16px; outline: none; font-size: 14px; width: 100%; }
        .btn-main { background: var(--theme-color); color: white; border-radius: 12px; padding: 14px; font-weight: 600; width: 100%; transition: 0.2s; }
        
        /* Focus View Typography */
        .focus-title { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-style: italic; line-height: 1.1; }
        .focus-body { font-weight: 300; line-height: 1.8; color: #444; font-style: italic; font-size: 1.1rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-focus { animation: fadeIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
    <style id="user-custom-css"></style>
</head>
<body class="pb-24 no-scrollbar">

    <div id="header-nav" class="sticky top-0 z-50 bg-white/80 backdrop-blur-md p-5 flex justify-between items-center border-b border-gray-50">
        <div id="user-display" class="flex items-center gap-3 cursor-pointer" onclick="toggleModal('settings-modal')">
            <div class="w-10 h-10 rounded-full bg-gray-100 overflow-hidden border border-pink-100">
                <img id="my-photo" src="" class="w-full h-full object-cover hidden">
            </div>
            <div>
                <h1 id="my-name" class="font-serif italic text-lg leading-none text-gray-400">Loading...</h1>
                <p id="my-username" class="text-[9px] text-gray-300 mt-1 uppercase tracking-widest font-bold">@guest</p>
            </div>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="toggleModal('notif-modal')" class="text-xl relative">
                🔔 <span id="notif-dot" class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full hidden border-2 border-white"></span>
            </button>
            <button onclick="toggleModal('settings-modal')" class="text-xl">⚙️</button>
        </div>
    </div>

    <div class="px-5 py-3">
        <input type="text" id="search-input" oninput="searchMusic(this.value)" placeholder="Search songs, users, or moments..." class="input-elegant italic">
    </div>

    <div id="timeline"></div>

    <div id="focus-layer" class="hidden fixed inset-0 z-[100] bg-white/98 backdrop-blur-3xl p-8 overflow-y-auto no-scrollbar animate-focus">
        <div class="flex justify-between items-center mb-12">
            <button onclick="closeFocus()" class="text-[10px] font-bold tracking-[0.3em] text-gray-400 uppercase">Dismiss</button>
            <div class="w-2 h-2 rounded-full" style="background: var(--theme-color)"></div>
        </div>
        <div id="focus-content" class="flex flex-col gap-10"></div>
    </div>

    <div id="history-modal" class="hidden fixed inset-0 z-[115] bg-white p-6 overflow-y-auto no-scrollbar animate-focus">
    <div class="flex justify-between items-center mb-8">
        <h2 class="font-serif italic text-2xl">My Activity</h2>
        <button onclick="toggleModal('history-modal')" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Close</button>
    </div>
    <div id="history-list" class="space-y-4">
        </div>
</div>

<button onclick="viewMyHistory()" class="w-full bg-gray-50 py-4 rounded-xl text-[11px] font-bold uppercase tracking-widest text-gray-500 hover:bg-gray-100 transition">
    View My Activity (Likes)
</button>

    <div id="auth-modal" class="hidden fixed inset-0 z-[120] bg-white p-10 flex flex-col justify-center animate-focus overflow-y-auto no-scrollbar">

        <p class="text-gray-400 text-sm mb-10">Setup your username, bio, and photo.</p>
        <div class="space-y-4">
            <input id="reg-name" type="text" placeholder="Full Name" class="input-elegant">
            <input id="reg-user" type="text" placeholder="Username (e.g. zakia_w)" class="input-elegant">
            <textarea id="reg-bio" placeholder="Your Bio / Status..." class="input-elegant h-24"></textarea>

    <div id="notif-modal" class="hidden fixed inset-0 z-[105] bg-white p-6 overflow-y-auto no-scrollbar animate-focus">

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const SUPABASE_URL = 'https://aldzhrtbrjszppseawrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let telegramUser = tg.initDataUnsafe.user || { id: 1234, first_name: 'Dev' };
        let profile = null;

        async function init() {
            const { data } = await supabase.from('profiles').select('*').eq('telegram_id', telegramUser.id).single();
            if (!data) {
                document.getElementById('auth-modal').classList.remove('hidden');
            } else {
                profile = data;
                updateUI();
                loadPosts();
                loadNotifs();
                document.getElementById('fab-post').classList.remove('hidden');
                if(profile.custom_css) document.getElementById('user-custom-css').innerHTML = profile.custom_css;
            }
        }

        function updateUI() {
            document.getElementById('my-name').innerText = profile.display_name;
            document.getElementById('my-name').classList.remove('text-gray-400');
            document.getElementById('my-username').innerText = '@' + profile.username;
            if(profile.photo_url) {
                const img = document.getElementById('my-photo');
                img.src = profile.photo_url;
                img.classList.remove('hidden');
            }
            document.getElementById('privacy-toggle').checked = profile.is_private;
            applyTheme(profile.theme_color || '#ec4899');
        }

        async function createAccount() {
            const name = document.getElementById('reg-name').value;
            const user = document.getElementById('reg-user').value;
            const bio = document.getElementById('reg-bio').value;
            const photo = document.getElementById('reg-photo').value;
            if(!name || !user) return;
            await supabase.from('profiles').insert({
                telegram_id: telegramUser.id, display_name: name, username: user, photo_url: photo, bio: bio
            });
            location.reload();
        }

        
        async function loadPosts(query = '') {
            let db = supabase.from('music_posts').select('*, profiles(*), likes(id)');
            if(query) db = db.or(`caption.ilike.%${query}%,profiles(display_name.ilike.%${query}%)`);
            const { data } = await db.order('created_at', {ascending: false});
            
            document.getElementById('timeline').innerHTML = data.map(post => `
                <div class="elegant-card animate-focus">
                    <div class="p-5 flex justify-between items-start">
                        <div class="flex gap-4">
                            <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=150" class="w-16 h-16 rounded-xl object-cover grayscale">
                            <div class="flex flex-col justify-center">
                                <p class="text-[9px] font-bold text-gray-300 uppercase tracking-widest">${post.profiles.display_name}</p>
                                <h3 class="font-serif italic text-lg leading-tight">${post.caption.split(' ')[0]}</h3>
                            </div>
                        </div>
                        <button onclick="showMenu('${post.id}', '${post.sender_id}')" class="text-gray-300 text-xl font-bold">⋮</button>
                    </div>
                    <div class="px-5 pb-5">
                        <div class="caption-excent text-sm text-gray-500 italic" onclick="openFocus('${post.id}')">
                            ${post.caption}
                        </div>
                    </div>
                    <div class="px-5 py-3 border-t border-gray-50 flex gap-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                        <button onclick="handleLike('${post.id}', '${post.sender_id}')">❤️ ${post.likes.length} Like</button>
                        <button onclick="openFocus('${post.id}')">💬 Comment</button>
                    </div>
                </div>
            `).join('');
        }

        async function searchMusic(val) {
    const container = document.getElementById('timeline');
    
    // Jika kolom search kosong, tampilkan timeline normal
    if (!val || val.trim() === "") {
        loadPosts();
        return;
    }

    // Melakukan pencarian di Postingan (Caption) DAN Profil (Username/Name)
    const { data, error } = await supabase
        .from('music_posts')
        .select('*, profiles(*), likes(id)')
        .or(`caption.ilike.%${val}%, profiles(display_name.ilike.%${val}%), profiles(username.ilike.%${val}%)`)
        .order('created_at', { ascending: false });

    if (data.length === 0) {
        container.innerHTML = `
            <div class="flex flex-col items-center justify-center py-20 opacity-30">
                <span class="text-4xl mb-4">🔍</span>
                <p class="italic text-sm">No results found for "${val}"</p>
            </div>`;
        return;
    }

    // Render hasil pencarian
    container.innerHTML = data.map(post => `
        <div class="elegant-card animate-focus">
            <div class="p-5 flex justify-between items-start">
                <div class="flex gap-4">
                    <img src="${post.profiles.photo_url || 'https://ui-avatars.com/api/?name='+post.profiles.display_name}" class="w-14 h-14 rounded-xl object-cover grayscale">
                    <div class="flex flex-col justify-center">
                        <p class="text-[9px] font-bold text-pink-400 uppercase tracking-widest">@${post.profiles.username}</p>
                        <h3 class="font-serif italic text-lg leading-tight">${post.caption.split(' ')[0]}</h3>
                    </div>
                </div>
                <button onclick="showMenu('${post.id}', '${post.sender_id}')" class="text-gray-200">⋮</button>
            </div>
            <div class="px-5 pb-5">
                <div class="caption-excent text-sm text-gray-500 italic" onclick="openFocus('${post.id}')">
                    ${post.caption}
                </div>
            </div>
            <div class="px-5 py-3 border-t border-gray-50 flex gap-6 text-[9px] font-bold text-gray-400 uppercase tracking-widest">
                <button onclick="handleLike('${post.id}', '${post.sender_id}')">❤️ ${post.likes.length} Like</button>
                <button onclick="openFocus('${post.id}')">💬 Comment</button>
            </div>
        </div>
    `).join('');
                                }

        let replyingTo = null; // Variable untuk menyimpan ID komentar yang sedang dibalas

async function openFocus(postId) {
    const { data: post } = await supabase.from('music_posts').select('*, profiles(*)').eq('id', postId).single();
    const layer = document.getElementById('focus-layer');
    const content = document.getElementById('focus-content');
    
    // Render Konten Postingan
    content.innerHTML = `
        <div class="animate-focus">
            <p class="text-[10px] font-bold text-gray-300 tracking-[0.4em] uppercase mb-4">Moment by ${post.profiles.display_name}</p>
            <h1 class="focus-title mb-6">${post.caption.split(' ')[0]}</h1>
            <div class="w-full aspect-square bg-gray-50 rounded-3xl overflow-hidden shadow-2xl mb-8">
                <img src="https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?w=600" class="w-full h-full object-cover grayscale-[0.2]">
            </div>
            <div class="focus-body mb-10">"${post.caption}"</div>
            
            <div class="border-t border-gray-100 pt-8">
                <h4 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-6">Thoughts</h4>
                <div id="comments-container" class="space-y-6 mb-20"></div>
            </div>
        </div>

        <div class="fixed bottom-0 left-0 w-full bg-white p-5 border-t border-gray-50 flex flex-col gap-2">
            <div id="reply-indicator" class="hidden text-[9px] text-pink-400 font-bold uppercase italic">Replying... <button onclick="cancelReply()" class="text-gray-300 ml-2">Cancel</button></div>
            <div class="flex gap-3">
                <input id="comment-input" type="text" placeholder="Add a comment..." class="flex-1 bg-gray-50 p-3 rounded-xl text-sm outline-none">
                <button onclick="postComment('${post.id}')" class="bg-black text-white px-5 rounded-xl text-xs font-bold">SEND</button>
            </div>
        </div>
    `;
    
    layer.classList.remove('hidden');
    loadComments(postId);
    tg.HapticFeedback.impactOccurred('medium');
}

async function loadComments(postId) {
    const { data: comments } = await supabase
        .from('comments')
        .select('*, profiles(*)')
        .eq('post_id', postId)
        .order('created_at', { ascending: true });

    const container = document.getElementById('comments-container');
    const parentComments = comments.filter(c => !c.parent_id);
    
    container.innerHTML = parentComments.map(parent => {
        const replies = comments.filter(r => r.parent_id === parent.id);
        return `
            <div class="space-y-4">
                <div class="flex gap-3">
                    <img src="${parent.profiles.photo_url || ''}" class="w-7 h-7 rounded-full bg-gray-100">
                    <div class="flex-1">
                        <p class="text-[10px] font-bold">@${parent.profiles.username}</p>
                        <p class="text-sm text-gray-600 mt-1">${parent.content}</p>
                        <button onclick="prepareReply('${parent.id}', '${parent.profiles.username}')" class="text-[9px] font-bold text-gray-300 uppercase mt-2">Reply</button>
                    </div>
                </div>
                ${replies.map(reply => `
                    <div class="flex gap-3 ml-8 border-l-2 border-gray-50 pl-4">
                        <img src="${reply.profiles.photo_url || ''}" class="w-5 h-5 rounded-full bg-gray-100">
                        <div class="flex-1">
                            <p class="text-[9px] font-bold">@${reply.profiles.username}</p>
                            <p class="text-xs text-gray-500 mt-1">${reply.content}</p>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;
    }).join('');
}

        let viewedUserId = null; // ID orang yang profilnya sedang kita liat

async function init() {
    // Cek apakah ada ID user di link (startapp parameter)
    const startParam = tg.initDataUnsafe.start_param;
    viewedUserId = startParam ? startParam : telegramUser.id;

    // Ambil data profil orang yang sedang dilihat
    const { data: viewedProfile } = await supabase
        .from('profiles')
        .select('*')
        .eq('telegram_id', viewedUserId)
        .single();

    if (viewedProfile) {
        // TERAPKAN TAMPILAN PEMILIK PROFIL
        applyViewedTheme(viewedProfile);
        loadPostsOfUser(viewedUserId);
    }
}

function applyViewedTheme(profileData) {
    // Terapkan warna tema si pemilik profil
    document.documentElement.style.setProperty('--theme-color', profileData.theme_color || '#ec4899');
    
    // Terapkan Custom CSS milik si pemilik profil (Ini kuncinya!)
    const customStyleTag = document.getElementById('user-custom-css');
    if(profileData.custom_css) {
        customStyleTag.innerHTML = profileData.custom_css;
    } else {
        customStyleTag.innerHTML = ''; // Kosongkan jika dia tidak pakai CSS
    }

    // Ubah header agar menampilkan nama orang yang dikunjungi
    document.getElementById('my-name').innerText = profileData.display_name;
    document.getElementById('my-username').innerText = '@' + profileData.username;
    
    // Sembunyikan tombol Edit/Post jika kita cuma "tamu"
    if (viewedUserId != telegramUser.id) {
        document.getElementById('fab').classList.add('hidden');
        document.getElementById('settings-btn').classList.add('hidden'); 
    }
}
        
function prepareReply(commentId, username) {
    replyingTo = commentId;
    const indicator = document.getElementById('reply-indicator');
    indicator.innerText = `Replying to @${username}...`;
    indicator.classList.remove('hidden');
    document.getElementById('comment-input').focus();
}

function cancelReply() {
    replyingTo = null;
    document.getElementById('reply-indicator').classList.add('hidden');
}

async function postComment(postId) {
    const content = document.getElementById('comment-input').value;
    if(!content) return;

    await supabase.from('comments').insert({
        post_id: postId,
        user_id: telegramUser.id,
        content: content,
        parent_id: replyingTo
    });

    document.getElementById('comment-input').value = '';
    cancelReply();
    loadComments(postId);
    tg.HapticFeedback.notificationOccurred('success');
}

            await supabase.from('likes').insert({ post_id: postId, user_id: telegramUser.id });
            await supabase.from('notifications').insert({ receiver_id: receiverId, sender_id: telegramUser.id, type: 'loved' });
            loadPosts();
            tg.HapticFeedback.impactOccurred('light');
        }

    const container = document.getElementById('history-list');

        function showMenu(postId, senderId) {
            tg.showActionSheet({
                title: 'Post Options',
                buttons: [
                    {id: 'share', title: 'Share Profile Link'},
                    {id: 'block', title: 'Block User', type: 'destructive'}
                ]
            }, (id) => {
                if(id === 'block') tg.showAlert('User has been blocked.');
                if(id === 'share') {
                    const link = `https://t.me/USER_BOT_KAMU/app?startapp=${telegramUser.id}`;
                    tg.switchInlineQuery(`Liat profile estetikku! 🩰\n${link}`);
                }
            });
        }

        
        async function loadNotifs() {
            const { data } = await supabase.from('notifications').select('*, sender:profiles!sender_id(*)').eq('receiver_id', telegramUser.id).order('created_at', {ascending: false}).limit(10);
            if(data.length > 0) document.getElementById('notif-dot').classList.remove('hidden');
            document.getElementById('notif-list').innerHTML = data.map(n => `
                <div class="flex items-center gap-4 border-b border-gray-50 pb-4">
                    <img src="${n.sender.photo_url || ''}" class="w-10 h-10 rounded-full bg-gray-100 object-cover">
                    <p class="text-sm"><span class="font-bold">${n.sender.display_name}</span> ${n.type === 'loved' ? 'loved your moment' : 'visited your profile'}</p>
                </div>
            `).join('');
        }

        function setTheme(color) {
            document.documentElement.style.setProperty('--theme-color', color);
            supabase.from('profiles').update({ theme_color: color }).eq('telegram_id', telegramUser.id);
        }


        

    container.innerHTML = data.map(item => `
        <div class="p-4 bg-gray-50 rounded-2xl flex justify-between items-center group cursor-pointer" onclick="openFocus('${item.music_posts.id}')">
            <div class="flex flex-col">
                <span class="text-[9px] font-bold text-pink-400 uppercase tracking-tighter">You Liked</span>
                <span class="font-serif italic text-sm text-gray-600">"${item.music_posts.caption.substring(0, 30)}..."</span>
                <span class="text-[8px] text-gray-300 mt-1 uppercase">By ${item.music_posts.profiles.display_name}</span>
            </div>
            <span class="text-xl opacity-0 group-hover:opacity-100 transition">❤️</span>
        </div>
    `).join('');
        }

        function applyTheme(color) { document.documentElement.style.setProperty('--theme-color', color); }
        async function updatePrivacy(val) { await supabase.from('profiles').update({ is_private: val }).eq('telegram_id', telegramUser.id); }
        function saveCSS() { const css = document.getElementById('css-input').value; supabase.from('profiles').update({ custom_css: css }).eq('telegram_id', telegramUser.id).then(() => location.reload()); }
        function searchMusic(val) { loadPosts(val); }
        function closeFocus() { document.getElementById('focus-layer').classList.add('hidden'); }
        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        async function submitPost() {
            const url = document.getElementById('post-url').value, cap = document.getElementById('post-cap').value;
            if(!url || !cap) return;
            await supabase.from('music_posts').insert({ sender_id: telegramUser.id, music_url: url, caption: cap });
            toggleModal('post-modal'); loadPosts();
        }

        init();
    </script>
</body>
</html>
