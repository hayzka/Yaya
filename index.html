<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmonsPath OS v6.0 | Enterprise Archive System</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        /**
         * SECTION 1: SYSTEM VARIABLES & THEME ENGINE
         * (Baris 20 - 150)
         */
        :root {
            --sys-blue: #007aff;
            --sys-blue-rgb: 0, 122, 255;
            --sys-green: #34c759;
            --sys-red: #ff3b30;
            --sys-gray: #8e8e93;
            --sys-bg: #f2f2f7;
            --sys-card: #ffffff;
            --sys-text: #000000;
            --sys-text-sec: #3a3a3c;
            --sys-border: #d1d1d6;
            --safe-area-top: env(safe-area-inset-top);
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--sys-bg);
            color: var(--sys-text);
            overflow-x: hidden;
            line-height: 1.5;
            -webkit-user-select: none;
            user-select: none;
        }

        /* TYPOGRAPHY */
        .mono { font-family: 'JetBrains Mono', monospace; }
        .bold { font-weight: 700; }
        .extra-bold { font-weight: 800; }
        .text-xs { font-size: 10px; }
        .text-sm { font-size: 13px; }

        /**
         * SECTION 2: LAYOUT ARCHITECTURE
         * (Baris 150 - 450)
         */
        .app-shell {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--sys-card);
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
        }

        .main-header {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 64px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 0.5px solid var(--sys-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .sys-tabs {
            display: flex;
            padding: 10px 20px;
            gap: 10px;
            background: var(--sys-card);
        }

        .tab-trigger {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            background: var(--sys-bg);
            color: var(--sys-gray);
            font-size: 12px;
            font-weight: 600;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-trigger.active {
            background: var(--sys-blue);
            color: #ffffff;
            box-shadow: 0 4px 12px rgba(var(--sys-blue-rgb), 0.3);
        }

        /* CARD ENGINE */
        .content-scroll {
            flex: 1;
            padding: 15px;
        }

        .archive-node {
            background: var(--sys-card);
            border: 1px solid var(--sys-border);
            border-radius: 18px;
            margin-bottom: 20px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .archive-node:active {
            transform: scale(0.98);
        }

        .node-head {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .node-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--sys-bg);
        }

        .node-media {
            width: 100%;
            aspect-ratio: 1;
            background: #f8f8f8;
            position: relative;
        }

        .node-media img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .node-body {
            padding: 15px;
        }

        .node-actions {
            padding: 10px 15px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /**
         * SECTION 3: INTERACTIVE COMPONENTS
         * (Baris 450 - 750)
         */
        .btn-action {
            padding: 10px 18px;
            border-radius: 12px;
            border: none;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-primary { background: var(--sys-blue); color: #fff; }
        .btn-ghost { background: var(--sys-bg); color: var(--sys-text-sec); }

        /* FLOATING INTERFACE */
        .fab-container {
            position: fixed;
            bottom: 30px;
            right: 20px;
            z-index: 1100;
        }

        .fab-main {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            background: var(--sys-blue);
            color: #fff;
            border: none;
            box-shadow: 0 8px 24px rgba(var(--sys-blue-rgb), 0.4);
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SYSTEM LAYERS (MODALS) */
        .overlay-layer {
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 2000;
            display: none;
            flex-direction: column;
            animation: layer-up 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes layer-up {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .layer-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 0.5px solid var(--sys-border);
        }

        .form-section { padding: 20px; }
        .form-label { font-size: 11px; font-weight: 800; color: var(--sys-gray); text-transform: uppercase; margin-bottom: 8px; display: block; }
        .sys-input { width: 100%; padding: 14px; border-radius: 12px; border: 1.5px solid var(--sys-bg); background: var(--sys-bg); font-size: 14px; transition: 0.2s; }
        .sys-input:focus { background: #fff; border-color: var(--sys-blue); outline: none; }

        /**
         * SECTION 4: CHART & ANALYTICS UI
         * (Baris 750 - 950)
         */
        .analytics-card {
            margin: 20px;
            padding: 20px;
            border-radius: 20px;
            background: var(--sys-bg);
        }

        .stat-grid {
            display: grid;
            grid-template-cols: 1fr 1fr;
            gap: 15px;
            padding: 0 20px;
        }

        .stat-item {
            padding: 15px;
            background: #fff;
            border-radius: 15px;
            border: 1px solid var(--sys-border);
        }

        /* LOADING ANIMATIONS */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer-run 1.5s infinite linear;
        }
        @keyframes shimmer-run { to { background-position: -200% 0; } }
    </style>
</head>
<body>

    <div class="app-shell">
        <header class="main-header">
            <div>
                <h1 class="extra-bold">AMONSPATH</h1>
                <p id="clock" class="mono text-xs text-gray-400"></p>
            </div>
            <div style="display: flex; gap: 15px;">
                <button onclick="Layers.open('layer-stats')">📊</button>
                <button onclick="Layers.open('layer-config')">⚙️</button>
            </div>
        </header>

        <nav class="sys-tabs">
            <button id="t-global" class="tab-trigger active" onclick="Core.setTab('global')">PUBLIC INDEX</button>
            <button id="t-local" class="tab-trigger" onclick="Core.setTab('local')">MY ARCHIVE</button>
        </nav>

        <main id="view-port" class="content-scroll">
            </main>
    </div>

    <div class="fab-container">
        <button class="fab-main" onclick="Layers.open('layer-editor')">+</button>
    </div>

    <div id="layer-editor" class="overlay-layer">
        <div class="layer-header">
            <h2 class="bold">New Entry</h2>
            <button onclick="Layers.close('layer-editor')" class="bold">✕</button>
        </div>
        <div class="form-section">
            <label class="form-label">Search Music Engine</label>
            <input type="text" id="api-search" oninput="MusicEngine.search(this.value)" class="sys-input" placeholder="Track name or artist...">
            <div id="api-results" style="margin-top:10px; border-radius:12px; overflow:hidden;"></div>
        </div>
        <div id="draft-preview" class="form-section" style="display:none;">
            </div>
        <div class="form-section">
            <label class="form-label">Data Annotation</label>
            <textarea id="entry-cap" class="sys-input" style="height:120px; resize:none;" placeholder="Write technical context..."></textarea>
        </div>
        <div class="form-section">
            <button onclick="Core.commit()" id="btn-commit" class="btn-action btn-primary" style="width:100%; justify-content:center; padding:18px;">PROCESS COMMIT</button>
        </div>
    </div>

    <div id="layer-stats" class="overlay-layer">
        <div class="layer-header">
            <h2 class="bold">Systems Data</h2>
            <button onclick="Layers.close('layer-stats')">✕</button>
        </div>
        <div class="analytics-card">
            <canvas id="growthChart" height="200"></canvas>
        </div>
        <div class="stat-grid">
            <div class="stat-item"><span class="text-xs bold text-gray-400">TOTAL RECORDS</span><h3 id="st-total" class="extra-bold">0</h3></div>
            <div class="stat-item"><span class="text-xs bold text-gray-400">INDEX FREQ</span><h3 id="st-freq" class="extra-bold">0</h3></div>
        </div>
        <div class="form-section" style="margin-top:20px;">
            <button onclick="Core.exportData()" class="btn-action btn-ghost" style="width:100%; justify-content:center;">EXPORT DATABASE (JSON)</button>
        </div>
    </div>

    <div id="layer-config" class="overlay-layer">
        <div class="layer-header">
            <h2 class="bold">Configuration</h2>
            <button onclick="Layers.close('layer-config')">✕</button>
        </div>
        <div class="form-section" style="text-align:center;">
            <img id="cfg-pfp" class="node-avatar" style="width:80px; height:80px; margin-bottom:15px;">
            <h3 id="cfg-name" class="bold"></h3>
            <p id="cfg-user" class="mono text-sm text-blue-500"></p>
        </div>
        <div class="form-section">
            <label class="form-label">Privacy Protocol</label>
            <div style="display:flex; justify-content:space-between; align-items:center; background:var(--sys-bg); padding:15px; border-radius:15px;">
                <span class="text-sm bold">Ghost Mode (Private Archive)</span>
                <input type="checkbox" id="cfg-private" onchange="Core.togglePrivacy(this.checked)">
            </div>
        </div>
        <div class="form-section">
            <label class="form-label">Custom System CSS</label>
            <textarea id="cfg-css" class="sys-input mono text-xs" style="height:150px;" placeholder="/* Override CSS logic */"></textarea>
            <button onclick="Core.applyCSS()" class="btn-action btn-primary" style="width:100%; margin-top:15px; justify-content:center;">SAVE CONFIG</button>
        </div>
    </div>

    <div id="layer-auth" class="overlay-layer" style="display:none; justify-content:center;">
        <div class="form-section">
            <h2 class="extra-bold" style="font-size:32px; letter-spacing:-1px;">IDENTITY PROTOCOL</h2>
            <p class="text-sm text-gray-400" style="margin-bottom:30px;">Initialize your digital node to start archiving.</p>
            
            <label class="form-label">Full Name</label>
            <input type="text" id="reg-name" class="sys-input" style="margin-bottom:15px;">
            
            <label class="form-label">Username</label>
            <input type="text" id="reg-user" class="sys-input mono" oninput="Core.checkUsername(this.value)" style="margin-bottom:15px;">
            <p id="reg-feedback" class="text-xs bold" style="margin-bottom:20px;"></p>
            
            <label class="form-label">Biography</label>
            <textarea id="reg-bio" class="sys-input" style="height:100px; margin-bottom:30px;"></textarea>
            
            <button onclick="Core.register()" id="reg-btn" class="btn-action btn-primary" style="width:100%; justify-content:center; padding:20px;" disabled>CONNECT TO MAINNET</button>
        </div>
    </div>

    <script>
        /**
         * AMONSPATH KERNEL v6.0
         * Logic-Heavy Architecture for Zakia Wardhani
         */

        // 1. CONSTANTS & ENVIRONMENT
        const TG_APP = window.Telegram.WebApp;
        const SB_URL = 'https://aldzhrtbrjszppseawrz.supabase.co';
        const SB_KEY = 'sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp';
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        // 2. STATE CONTROLLER (Detailed State Management)
        const State = {
            raw: {
                user: TG_APP.initDataUnsafe.user || { id: 10001, first_name: 'DebugNode' },
                profile: null,
                activeTab: 'global',
                data: [],
                selection: null,
                audioInstance: null,
                chart: null
            },
            
            set(key, val) {
                this.raw[key] = val;
                this.notify(key);
            },
            
            notify(key) {
                console.log(`[STATE_UPDATE]: ${key} synchronized.`);
            }
        };

        // 3. UI LAYERS MANAGER
        const Layers = {
            open(id) {
                const el = document.getElementById(id);
                el.style.display = 'flex';
                if (id === 'layer-stats') this.initChart();
                this.haptic('impactLight');
            },
            close(id) {
                const el = document.getElementById(id);
                el.style.display = 'none';
            },
            haptic(type) {
                try {
                    if (type === 'impactLight') TG_APP.HapticFeedback.impactOccurred('light');
                    if (type === 'notifSuccess') TG_APP.HapticFeedback.notificationOccurred('success');
                } catch(e) {}
            },
            initChart() {
                const ctx = document.getElementById('growthChart').getContext('2d');
                if (State.raw.chart) State.raw.chart.destroy();
                State.raw.chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['M','T','W','T','F','S','S'],
                        datasets: [{
                            data: [3, 7, 4, 12, 8, 15, 9],
                            borderColor: '#007aff',
                            borderWidth: 3,
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(0,122,255,0.05)'
                        }]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { display: false } }
                    }
                });
            }
        };

        // 4. MUSIC SEARCH ENGINE (Logic Terurai)
        const MusicEngine = {
            timeout: null,
            search(q) {
                clearTimeout(this.timeout);
                const resEl = document.getElementById('api-results');
                if (q.length < 3) { resEl.style.display = 'none'; return; }
                
                this.timeout = setTimeout(async () => {
                    console.log("[ENGINE]: Fetching iTunes data index...");
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=5`);
                    const data = await res.json();
                    
                    if (data.results) {
                        resEl.innerHTML = data.results.map(t => `
                            <div onclick="MusicEngine.select('${t.trackName}', '${t.artistName}', '${t.previewUrl}', '${t.artworkUrl100}')" 
                                 style="padding:15px; background:var(--sys-bg); margin-bottom:2px; display:flex; align-items:center; gap:12px;">
                                <img src="${t.artworkUrl60}" style="width:30px; border-radius:6px;">
                                <div style="overflow:hidden">
                                    <p class="bold text-sm truncate">${t.trackName}</p>
                                    <p class="text-xs text-gray-500">${t.artistName}</p>
                                </div>
                            </div>
                        `).join('');
                        resEl.style.display = 'block';
                    }
                }, 500);
            },
            select(t, a, u, c) {
                State.set('selection', { t, a, u, c: c.replace('100x100','600x600') });
                const prev = document.getElementById('draft-preview');
                prev.innerHTML = `
                    <div class="archive-node" style="margin-bottom:0; border-color:var(--sys-blue);">
                        <div class="node-head">
                            <img src="${State.raw.selection.c}" class="node-avatar">
                            <div><p class="bold text-sm">${t}</p><p class="text-xs text-blue-500">${a}</p></div>
                        </div>
                    </div>
                `;
                prev.style.display = 'block';
                document.getElementById('api-results').style.display = 'none';
                Layers.haptic('impactLight');
            },
            togglePlay(id, url) {
                if (State.raw.audioInstance && State.raw.audioInstance.src === url) {
                    if (State.raw.audioInstance.paused) {
                        State.raw.audioInstance.play();
                        document.getElementById(`lbl-${id}`).innerText = 'STOP_STREAM';
                    } else {
                        State.raw.audioInstance.pause();
                        document.getElementById(`lbl-${id}`).innerText = 'PLAY_STREAM';
                    }
                } else {
                    if (State.raw.audioInstance) {
                        State.raw.audioInstance.pause();
                        const oldId = State.raw.audioInstance.dataset.id;
                        if (document.getElementById(`lbl-${oldId}`)) document.getElementById(`lbl-${oldId}`).innerText = 'PLAY_STREAM';
                    }
                    const audio = new Audio(url);
                    audio.dataset.id = id;
                    audio.onended = () => document.getElementById(`lbl-${id}`).innerText = 'PLAY_STREAM';
                    audio.play();
                    State.set('audioInstance', audio);
                    document.getElementById(`lbl-${id}`).innerText = 'STOP_STREAM';
                }
                Layers.haptic('impactLight');
            }
        };

        // 5. CORE SYSTEM CONTROLLER
        const Core = {
            async init() {
                console.log("[SYSTEM]: Bootstrap sequence started.");
                this.updateTime();
                setInterval(() => this.updateTime(), 1000);

                const { data: profile, error } = await supabase.from('profiles').select('*').eq('telegram_id', State.raw.user.id).single();
                
                if (profile) {
                    State.set('profile', profile);
                    this.syncProfileUI(profile);
                    this.fetch();
                } else {
                    document.getElementById('layer-auth').style.display = 'flex';
                }
                
                TG_APP.expand();
            },

            async fetch() {
                const port = document.getElementById('view-port');
                port.innerHTML = `<div class="shimmer" style="height:200px; border-radius:20px; margin-bottom:20px;"></div>`;
                
                let query = supabase.from('music_posts').select('*, profiles(*)');
                
                if (State.raw.activeTab === 'global') {
                    query = query.eq('profiles.is_private', false);
                } else {
                    query = query.eq('sender_id', State.raw.user.id);
                }

                const { data, error } = await query.order('created_at', { ascending: false });
                
                if (data) {
                    State.set('data', data);
                    this.render(data);
                    this.refreshStats();
                }
            },

            render(items) {
                const port = document.getElementById('view-port');
                if (items.length === 0) {
                    port.innerHTML = `<div style="text-align:center; padding:100px 0; color:var(--sys-gray); font-size:12px;" class="mono">INDEX_NULL: NO_RECORDS_FOUND</div>`;
                    return;
                }

                port.innerHTML = items.map(p => `
                    <article class="archive-node">
                        <div class="node-head">
                            <img src="${p.profiles.photo_url}" class="node-avatar">
                            <div class="node-info">
                                <p class="bold text-sm">@${p.profiles.username}</p>
                                <p class="text-xs text-gray-400">${new Date(p.created_at).toLocaleDateString('id-ID')}</p>
                            </div>
                        </div>
                        <div class="node-media">
                            <img src="${p.music_cover}" loading="lazy">
                        </div>
                        <div class="node-body">
                            <h3 class="bold text-sm" style="margin-bottom:8px;">${p.music_title}</h3>
                            <p class="text-sm text-gray-600">${p.caption}</p>
                        </div>
                        <div class="node-actions">
                            <button class="btn-action btn-ghost" onclick="MusicEngine.togglePlay('${p.id}', '${p.music_url}')">
                                <span>▶</span> <span id="lbl-${p.id}" class="mono">PLAY_STREAM</span>
                            </button>
                            ${State.raw.activeTab === 'local' ? `<button onclick="Core.erase('${p.id}')" style="color:var(--sys-red); font-size:10px;" class="bold">ERASE</button>` : ''}
                        </div>
                    </article>
                `).join('');
            },

            async commit() {
                if (!State.raw.selection) return alert("Select track first!");
                const cap = document.getElementById('entry-cap').value;
                const btn = document.getElementById('btn-commit');
                
                btn.disabled = true;
                btn.innerText = "PROCESSING...";

                const { error } = await supabase.from('music_posts').insert({
                    sender_id: State.raw.user.id,
                    music_title: `${State.raw.selection.t} - ${State.raw.selection.a}`,
                    music_url: State.raw.selection.u,
                    music_cover: State.raw.selection.c,
                    caption: cap
                });

                if (!error) {
                    Layers.haptic('notifSuccess');
                    location.reload();
                }
            },

            async register() {
                const name = document.getElementById('reg-name').value;
                const user = document.getElementById('reg-user').value.toLowerCase();
                const bio = document.getElementById('reg-bio').value;

                const { error } = await supabase.from('profiles').insert({
                    telegram_id: State.raw.user.id,
                    username: user,
                    display_name: name,
                    bio: bio,
                    photo_url: `https://api.dicebear.com/7.x/identicon/svg?seed=${user}`
                });

                if (!error) location.reload();
            },

            async checkUsername(u) {
                const feedback = document.getElementById('reg-feedback');
                const btn = document.getElementById('reg-btn');
                if (u.length < 4) { btn.disabled = true; feedback.innerText = ""; return; }
                
                const { data } = await supabase.from('profiles').select('username').eq('username', u.toLowerCase()).single();
                if (data) {
                    feedback.innerText = "UNAVAILABLE"; feedback.style.color = "var(--sys-red)";
                    btn.disabled = true;
                } else {
                    feedback.innerText = "AVAILABLE"; feedback.style.color = "var(--sys-green)";
                    btn.disabled = false;
                }
            },

            setTab(tab) {
                State.set('activeTab', tab);
                document.getElementById('t-global').classList.toggle('active', tab === 'global');
                document.getElementById('t-local').classList.toggle('active', tab === 'local');
                this.fetch();
                Layers.haptic('impactLight');
            },

            syncProfileUI(p) {
                document.getElementById('cfg-pfp').src = p.photo_url;
                document.getElementById('cfg-name').innerText = p.display_name;
                document.getElementById('cfg-user').innerText = `@${p.username}`;
                document.getElementById('cfg-private').checked = p.is_private;
                document.getElementById('cfg-css').value = p.custom_css || "";
                
                if (p.custom_css) {
                    const style = document.createElement('style');
                    style.innerHTML = p.custom_css;
                    document.head.appendChild(style);
                }
            },

            refreshStats() {
                document.getElementById('st-total').innerText = State.raw.data.length;
                const unique = new Set(State.raw.data.map(i => i.music_title.split('-')[1]));
                document.getElementById('st-freq').innerText = unique.size;
            },

            updateTime() {
                const now = new Date();
                document.getElementById('clock').innerText = now.toLocaleTimeString('en-GB') + " | NODE_ACTIVE";
            },

            exportData() {
                const blob = new Blob([JSON.stringify(State.raw.data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `amons_backup_${Date.now()}.json`;
                a.click();
            },

            async erase(id) {
                if (confirm("Confirm record erasure?")) {
                    await supabase.from('music_posts').delete().eq('id', id);
                    this.fetch();
                }
            }
        };

        // 6. INITIALIZE BOOT SEQUENCE
        window.addEventListener('DOMContentLoaded', () => Core.init());

    </script>
</body>
</html>
