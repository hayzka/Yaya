<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AmonsPath OS | Kernel v15.0</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@1,400;1,700;1,900&family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
    
    <style>
        /* ===== ROOT CONFIGURATION ===== */
        :root {
            --accent-color: #ec4899;
            --bg-color: #ffffff;
            --text-color: #111111;
            --bg-rgb: 255, 255, 255;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --safe-area-inset-bottom: env(safe-area-inset-bottom);
        }

        .dark {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --bg-rgb: 15, 15, 15;
        }

        .theme-black {
            --accent-color: #ffffff;
            --bg-color: #000000;
            --text-color: #ffffff;
            --bg-rgb: 0, 0, 0;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            outline: none !important;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-sans);
            transition: background-color 0.4s cubic-bezier(0.16, 1, 0.3, 1), color 0.4s;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== TYPOGRAPHY & UTILITIES ===== */
        .font-serif-italic { 
            font-family: var(--font-serif); 
            font-style: italic; 
        }
        
        .font-mono { 
            font-family: var(--font-mono); 
        }
        
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        
        .shadow-huge {
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.25);
        }

        .archive-node {
            border: 1px solid rgba(0,0,0,0.05);
            border-radius: 3rem;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .dark .archive-node { 
            border-color: rgba(255,255,255,0.05); 
        }

        /* ===== LAYERS & NAVIGATION ===== */
        .layer {
            position: fixed;
            inset: 0;
            background: var(--bg-color);
            z-index: 100;
            overflow-y: auto;
            display: none;
            padding-bottom: 120px;
        }

        .layer.active { 
            display: block; 
            animation: layerSlide 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }

        @keyframes layerSlide {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        /* ===== CHAT WALLPAPER ===== */
        .chat-container {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* ===== MUSIC ANIMATIONS ===== */
        .playing-active {
            animation: pulse-border 2s infinite;
        }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.4); }
            70% { box-shadow: 0 0 0 20px rgba(236, 72, 153, 0); }
            100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
        }
        
        @keyframes spin-slow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .animate-spin-slow {
            animation: spin-slow 3s linear infinite;
        }

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar { 
            width: 0px; 
        }

        /* ===== NAVBAR ===== */
        .nav-blur {
            background: rgba(var(--bg-rgb), 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
        }
    </style>
    
    <style id="user-injected-css"></style>
</head>
<body class="dark">

<div id="app-root">
    <!-- ===== AUTH SCREEN ===== -->
    <div id="screen-auth" class="min-h-screen flex flex-col items-center justify-center p-8 bg-white dark:bg-[#0f0f0f]">
        <header class="text-center space-y-4 mb-20">
            <h1 class="font-serif-italic text-8xl tracking-tighter leading-none mb-1">AmonsPath.</h1>
            <p class="text-[11px] font-bold text-gray-400 uppercase tracking-[0.8em]">The Sound Archive</p>
        </header>
        <div class="w-full max-w-sm space-y-8">
            <input id="auth-username" type="text" placeholder="Your unique path..." 
                   class="w-full bg-gray-50 dark:bg-white/5 border-none rounded-[2.5rem] px-10 py-7 text-[15px] font-bold text-center shadow-huge transition-all focus:ring-4 focus:ring-pink-500/30" />
            <button onclick="handleLogin()" class="w-full bg-pink-500 text-white rounded-[2.5rem] py-7 text-[11px] font-extrabold uppercase tracking-[0.4em] shadow-2xl shadow-pink-500/30 hover:scale-105 transition-transform">
                Commence Journey
            </button>
            <div class="flex items-center gap-4 py-4">
                <div class="flex-1 h-px bg-white/5"></div>
                <span class="text-[9px] uppercase font-bold text-gray-500">or</span>
                <div class="flex-1 h-px bg-white/5"></div>
            </div>
            <button onclick="handleGuest()" class="w-full text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] hover:text-pink-500 transition-colors">
                Spectral Observation (Guest)
            </button>
        </div>
    </div>

    <!-- ===== MAIN APPLICATION ===== -->
    <div id="main-ui" style="display: none;">
        <!-- HEADER -->
        <header id="global-header" class="fixed top-0 left-0 right-0 z-[60] px-8 pt-12 pb-6 bg-transparent transition-all">
            <div class="flex justify-between items-center max-w-xl mx-auto">
                <h1 onclick="scrollToTop()" class="font-serif-italic text-5xl tracking-tighter cursor-pointer hover:text-pink-500 transition-colors">Archives.</h1>
                <div class="flex gap-4">
                    <button onclick="openLayer('notifications')" class="p-4 bg-gray-100 dark:bg-white/5 rounded-3xl relative hover:bg-gray-200 dark:hover:bg-white/10 transition-colors">
                        <div id="notif-dot" class="w-2 h-2 bg-pink-500 rounded-full absolute top-3 right-3 hidden"></div>
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- MAIN FEED -->
        <main id="feed-scroll" class="pt-40 pb-40 px-6 space-y-32 max-w-xl mx-auto"></main>

        <!-- SEARCH LAYER -->
        <div id="layer-search" class="layer px-8 pt-24">
            <div class="max-w-xl mx-auto space-y-12">
                <h2 class="font-serif-italic text-6xl tracking-tighter">Search.</h2>
                <div class="relative">
                    <input type="text" id="search-input" oninput="handleSearch(this.value)" placeholder="Filter frequencies..." 
                           class="w-full bg-gray-100 dark:bg-white/5 p-7 rounded-[2.5rem] outline-none font-bold text-lg" />
                </div>
                <div class="flex gap-4 overflow-x-auto pb-4 no-scrollbar">
                    <button class="px-8 py-3 bg-pink-500 text-white rounded-2xl text-[10px] font-bold uppercase tracking-widest">Posts</button>
                    <button class="px-8 py-3 bg-white/5 text-gray-400 rounded-2xl text-[10px] font-bold uppercase tracking-widest">People</button>
                    <button class="px-8 py-3 bg-white/5 text-gray-400 rounded-2xl text-[10px] font-bold uppercase tracking-widest">Music</button>
                </div>
                <div id="search-results" class="space-y-8"></div>
            </div>
        </div>

        <!-- PROFILE LAYER -->
        <div id="layer-profile" class="layer">
            <div id="profile-content"></div>
        </div>

        <!-- CHAT LIST LAYER -->
        <div id="layer-chat" class="layer pt-24">
            <div class="max-w-xl mx-auto px-8">
                <h2 class="font-serif-italic text-6xl tracking-tighter mb-12">Transmissions.</h2>
                <div id="chat-list" class="space-y-4"></div>
            </div>
        </div>

        <!-- NOTIFICATIONS LAYER -->
        <div id="layer-notifications" class="layer pt-24">
            <div class="max-w-xl mx-auto px-8">
                <h2 class="font-serif-italic text-6xl tracking-tighter mb-12">Notifications.</h2>
                <div id="notif-list" class="space-y-4"></div>
            </div>
        </div>
        
        <!-- CHAT ROOM -->
        <div id="chat-room" class="layer z-[150]">
            <div id="chat-room-content" class="h-full flex flex-col"></div>
        </div>

        <!-- MUSIC PLAYER -->
        <div id="global-player" class="fixed bottom-32 left-4 right-4 z-[200] max-w-lg mx-auto bg-white/10 backdrop-blur-3xl border border-white/10 rounded-[3rem] p-5 hidden shadow-huge overflow-hidden">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-5 flex-1 min-w-0">
                    <div class="w-14 h-14 rounded-[1.8rem] overflow-hidden shadow-2xl relative">
                        <img id="player-art" src="https://picsum.photos/56/56?random=1" class="w-full h-full object-cover" alt="Album art">
                        <div id="player-visualizer" class="absolute inset-0 bg-pink-500/20 hidden flex items-center justify-center">
                            <div class="flex gap-1">
                                <div class="w-1 h-4 bg-white animate-bounce"></div>
                                <div class="w-1 h-6 bg-white animate-bounce [animation-delay:0.2s]"></div>
                                <div class="w-1 h-3 bg-white animate-bounce [animation-delay:0.4s]"></div>
                            </div>
                        </div>
                    </div>
                    <div class="flex flex-col min-w-0">
                        <h4 id="player-title" class="text-sm font-black tracking-tight truncate">Track Name</h4>
                        <p id="player-artist" class="text-[9px] uppercase tracking-[0.2em] text-pink-500 font-bold truncate">Artist Name</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="toggleMusic()" class="w-14 h-14 bg-pink-500 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                        <svg id="play-pause-icon" width="24" height="24" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button onclick="closePlayer()" class="w-10 h-10 text-gray-500 hover:text-white transition-colors">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAVIGATION -->
        <nav class="fixed bottom-0 left-0 right-0 h-28 nav-blur border-t border-white/5 z-[300] px-10 pb-6">
            <div class="max-w-xl mx-auto h-full flex items-center justify-between">
                <button onclick="navigate('feed')" class="nav-btn active text-pink-500 transition-all hover:scale-110">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg>
                </button>
                <button onclick="navigate('search')" class="nav-btn text-gray-500 transition-all hover:scale-110">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
                </button>
                <button onclick="navigate('chat')" class="nav-btn text-gray-500 relative transition-all hover:scale-110">
                    <svg width="26" height="26" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                </button>
                <button onclick="navigate('profile')" class="w-9 h-9 rounded-2xl overflow-hidden border-2 border-gray-500 transition-all hover:border-pink-500">
                    <img id="nav-pfp" src="https://ui-avatars.com/api/?name=User" class="w-full h-full object-cover" alt="Profile">
                </button>
            </div>
        </nav>
        
        <!-- FAB POST BUTTON -->
        <button id="fab-post" onclick="togglePostModal(true)" class="fixed bottom-32 right-8 z-[250] w-16 h-16 bg-pink-500 text-white rounded-[1.8rem] shadow-huge flex items-center justify-center hover:scale-110 transition-transform">
            <svg width="32" height="32" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 5v14M5 12h14"/></svg>
        </button>
    </div>
</div>

<script>
    // ===== TELEGRAM INTEGRATION =====
    const tg = window.Telegram?.WebApp || {};
    if (tg.expand) tg.expand();

    // ===== CORE STATE MANAGEMENT =====
    const AMONS_KERNEL = {
        currentUser: null,
        isGuest: false,
        activeScreen: 'feed',
        isPlaying: false,
        currentTrack: null,
        audio: new Audio(),
        messages: {},
        
        users: [
            {
                id: 'zain_dev',
                username: 'zain',
                name: 'Zain',
                bio: 'Engineering Lead @ AMONSPATH OS. Finding beauty in digital noise.',
                pfp: 'https://picsum.photos/seed/zain/400',
                header: 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe',
                themeColor: '#ec4899',
                isDarkMode: true,
                followers: 1200,
                following: 450,
                customCSS: `.archive-node:hover { border-color: #ec4899; }`,
                wallpapers: { 'adnan': 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e' }
            },
            {
                id: 'adnan_user',
                username: 'adnan',
                name: 'Adnan',
                bio: 'Archiving every rhythm. Catching echoes.',
                pfp: 'https://picsum.photos/seed/adnan/400',
                header: 'https://images.unsplash.com/photo-1557683316-973673baf926',
                themeColor: '#6366f1',
                isDarkMode: true,
                followers: 850,
                following: 320,
                wallpapers: {}
            }
        ],

        posts: [
            {
                id: 'p1',
                userId: 'zain_dev',
                type: 'music',
                music: {
                    id: 'm1',
                    name: 'Vignette',
                    artist: 'Archiver',
                    artwork: 'https://picsum.photos/seed/music1/600',
                    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'
                },
                caption: 'Welcome to the path. Testing Kernel v15.0 @adnan',
                likes: ['adnan_user'],
                comments: [
                    { 
                        id: 'c1', 
                        userId: 'adnan_user', 
                        text: 'This frequency feels right, Zain.', 
                        timestamp: '2m ago',
                        replies: [
                            { id: 'r1', userId: 'zain_dev', text: 'Steady as always.', timestamp: '1m ago' }
                        ]
                    }
                ],
                timestamp: 'Just now'
            },
            {
                id: 'p2',
                userId: 'adnan_user',
                type: 'music',
                music: {
                    id: 'm2',
                    name: 'Neon Static',
                    artist: 'Signal Flow',
                    artwork: 'https://picsum.photos/seed/music2/600',
                    url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
                },
                caption: 'New frequencies unlocked. Join the archive.',
                likes: ['zain_dev'],
                comments: [],
                timestamp: '1h ago'
            }
        ]
    };

    // ===== UTILITY FUNCTIONS =====
    function haptic(style = 'light') {
        if (tg.HapticFeedback?.impactOccurred) {
            tg.HapticFeedback.impactOccurred(style);
        }
        if (window.navigator.vibrate) {
            const ms = style === 'heavy' ? 50 : style === 'medium' ? 20 : 10;
            window.navigator.vibrate(ms);
        }
    }

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function saveToLocalStorage(key, value) {
        try {
            localStorage.setItem(key, JSON.stringify(value));
        } catch (e) {
            console.warn('LocalStorage failed:', e);
        }
    }

    function getFromLocalStorage(key) {
        try {
            const item = localStorage.getItem(key);
            return item ? JSON.parse(item) : null;
        } catch (e) {
            console.warn('LocalStorage read failed:', e);
            return null;
        }
    }

    // ===== AUTHENTICATION =====
    function handleLogin() {
        const input = document.getElementById('auth-username').value?.trim();
        if (!input || input.length < 3) {
            alert('Please enter a valid username (minimum 3 characters)');
            return;
        }
        
        AMONS_KERNEL.currentUser = { ...AMONS_KERNEL.users[0] };
        AMONS_KERNEL.currentUser.username = input.toLowerCase();
        saveToLocalStorage('amons_user', AMONS_KERNEL.currentUser);
        startApp();
        haptic('medium');
    }

    function handleGuest() {
        AMONS_KERNEL.isGuest = true;
        AMONS_KERNEL.currentUser = { 
            id: 'guest',
            name: 'Guest', 
            username: 'spectator', 
            pfp: 'https://ui-avatars.com/api/?name=Guest',
            isDarkMode: true,
            followers: 0,
            following: 0
        };
        startApp();
        haptic('light');
    }

    function startApp() {
        document.getElementById('screen-auth').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('nav-pfp').src = AMONS_KERNEL.currentUser.pfp || 'https://ui-avatars.com/api/?name=User';
        
        if (AMONS_KERNEL.currentUser.customCSS) {
            document.getElementById('user-injected-css').innerHTML = AMONS_KERNEL.currentUser.customCSS;
        }
        
        renderFeed();
    }

    // ===== NAVIGATION ENGINE =====
    function navigate(screen) {
        haptic('light');
        document.querySelectorAll('.layer').forEach(l => l.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('text-pink-500', 'text-gray-400'));
        
        if (screen === 'feed') {
            scrollToTop();
        } else if (screen === 'notifications') {
            openLayer('notifications');
            renderNotifications();
        } else {
            const layerId = `layer-${screen}`;
            const layer = document.getElementById(layerId);
            if (layer) layer.classList.add('active');
        }
        
        if (screen !== 'feed') {
            event?.currentTarget?.classList.add('text-pink-500');
        }
        
        if (screen === 'profile') renderProfile(AMONS_KERNEL.currentUser.username);
        if (screen === 'chat') renderChatList();
    }

    function openLayer(layerName) {
        const layer = document.getElementById(`layer-${layerName}`);
        if (layer) {
            layer.classList.add('active');
        }
    }

    // ===== FEED RENDERING =====
    function renderFeed() {
        const container = document.getElementById('feed-scroll');
        
        if (!container) return;
        
        container.innerHTML = AMONS_KERNEL.posts.map(post => {
            const user = AMONS_KERNEL.users.find(u => u.id === post.userId);
            if (!user) return '';
            
            const hasLiked = post.likes.includes(AMONS_KERNEL.currentUser?.id);
            
            return `
                <div class="archive-node bg-gray-50 dark:bg-white/5 p-8 space-y-8 shadow-2xl overflow-hidden relative group">
                    <div class="flex justify-between items-center">
                        <div class="flex items-center gap-4 cursor-pointer" onclick="renderProfile('${user.username}')">
                            <img src="${user.pfp}" class="w-14 h-14 rounded-2xl object-cover border border-white/5" alt="${user.name}">
                            <div>
                                <p class="font-extrabold text-sm tracking-tight">${user.name}</p>
                                <p class="text-[9px] uppercase tracking-[0.2em] text-gray-500">@${user.username} • ${post.timestamp}</p>
                            </div>
                        </div>
                        <button class="text-gray-400 hover:text-pink-500 transition-colors">
                            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                            </svg>
                        </button>
                    </div>

                    <div class="relative aspect-square rounded-[2.5rem] overflow-hidden shadow-huge cursor-pointer" onclick="handleTrackAction('${post.id}')">
                        <img src="${post.music.artwork}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110" alt="${post.music.name}">
                        <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all">
                            <div class="w-20 h-20 bg-white/10 backdrop-blur-2xl rounded-full flex items-center justify-center border border-white/20">
                                <svg width="32" height="32" fill="white" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                            </div>
                        </div>
                        <div class="absolute bottom-6 right-6 w-12 h-12 bg-black/40 backdrop-blur-md rounded-full flex items-center justify-center border border-white/10">
                            <svg width="18" height="18" class="text-pink-500 animate-spin-slow" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                            </svg>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <h3 class="text-2xl font-black tracking-tighter">${post.music.name} <span class="text-pink-500 font-normal text-sm ml-2 italic">/ ${post.music.artist}</span></h3>
                        <p class="text-sm text-gray-500 leading-relaxed font-medium">${renderCaption(post.caption)}</p>
                    </div>

                    <div class="flex items-center gap-8 pt-4">
                        <button onclick="handleLike('${post.id}')" class="flex items-center gap-2 ${hasLiked ? 'text-pink-500' : 'text-gray-400'} transition-all hover:scale-110">
                            <svg width="22" height="22" fill="${hasLiked ? 'currentColor' : 'none'}" stroke="currentColor" stroke-width="2.5">
                                <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
                            </svg>
                            <span class="text-[10px] font-black">${post.likes.length}</span>
                        </button>
                        <button onclick="openComments('${post.id}')" class="flex items-center gap-2 text-gray-400 hover:text-pink-500 transition-all hover:scale-110">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
                            </svg>
                            <span class="text-[10px] font-black">${post.comments.length}</span>
                        </button>
                        <button class="ml-auto text-gray-400 hover:text-pink-500 transition-all hover:scale-110">
                            <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2v16z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderCaption(text) {
        if (!text) return '';
        return text.replace(/@(\w+)/g, '<span class="text-pink-500 font-bold cursor-pointer hover:underline">@$1</span>');
    }

    function handleLike(postId) {
        const post = AMONS_KERNEL.posts.find(p => p.id === postId);
        if (!post) return;
        
        const userIndex = post.likes.indexOf(AMONS_KERNEL.currentUser.id);
        if (userIndex > -1) {
            post.likes.splice(userIndex, 1);
        } else {
            post.likes.push(AMONS_KERNEL.currentUser.id);
            haptic('light');
        }
        
        renderFeed();
    }

    // ===== COMMENTS SYSTEM =====
    function openComments(postId) {
        haptic('medium');
        const post = AMONS_KERNEL.posts.find(p => p.id === postId);
        if (!post) return;
        
        const commentLayer = document.createElement('div');
        commentLayer.id = 'comment-overlay';
        commentLayer.className = 'layer active z-[400] bg-white dark:bg-[#0f0f0f]';
        
        commentLayer.innerHTML = `
            <div class="max-w-xl mx-auto p-8 pb-40">
                <div class="flex items-center gap-6 mb-12">
                    <button onclick="closeComments()" class="p-4 bg-gray-100 dark:bg-white/5 rounded-2xl hover:bg-gray-200 dark:hover:bg-white/10 transition-colors">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <h2 class="font-serif-italic text-4xl tracking-tighter">Echoes.</h2>
                </div>
                
                <div id="comment-list" class="space-y-10">
                    ${renderComments(post.comments)}
                </div>
            </div>
            
            <div class="fixed bottom-0 left-0 right-0 p-6 bg-white/80 dark:bg-black/80 backdrop-blur-2xl border-t border-white/5 z-[410]">
                <div class="max-w-xl mx-auto relative">
                    <input type="text" id="comment-input" placeholder="Add to the frequency..." 
                           class="w-full bg-gray-100 dark:bg-white/5 p-6 rounded-[2rem] outline-none font-bold" />
                    <button onclick="submitComment('${postId}')" class="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 bg-pink-500 text-white rounded-2xl flex items-center justify-center hover:scale-110 transition-transform">
                        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(commentLayer);
    }

    function renderComments(comments) {
        if (!comments || comments.length === 0) return '<p class="text-gray-500 text-center py-10">No echoes yet...</p>';
        
        return comments.map(c => {
            const user = AMONS_KERNEL.users.find(u => u.id === c.userId);
            if (!user) return '';
            
            return `
                <div class="space-y-6">
                    <div class="flex gap-4">
                        <img src="${user.pfp}" class="w-10 h-10 rounded-xl object-cover" alt="${user.name}">
                        <div class="flex-1">
                            <div class="bg-gray-100 dark:bg-white/5 p-5 rounded-[1.5rem] rounded-tl-none">
                                <p class="text-[10px] font-black uppercase tracking-widest text-pink-500 mb-1">${user.name}</p>
                                <p class="text-sm font-medium leading-relaxed">${c.text}</p>
                            </div>
                            <div class="flex gap-4 mt-2 px-2">
                                <span class="text-[9px] font-bold text-gray-500 uppercase">${c.timestamp}</span>
                                <button class="text-[9px] font-black text-pink-500 uppercase tracking-widest hover:underline">Reply</button>
                            </div>
                        </div>
                    </div>
                    ${c.replies ? `<div class="ml-12 border-l-2 border-white/5 pl-6 space-y-6">${renderComments(c.replies)}</div>` : ''}
                </div>
            `;
        }).join('');
    }

    function submitComment(postId) {
        const input = document.getElementById('comment-input');
        const text = input?.value?.trim();
        
        if (!text) return;
        
        const post = AMONS_KERNEL.posts.find(p => p.id === postId);
        if (post) {
            post.comments.push({
                id: 'c' + Date.now(),
                userId: AMONS_KERNEL.currentUser.id,
                text: text,
                timestamp: 'now',
                replies: []
            });
            closeComments();
            haptic('medium');
            openComments(postId);
        }
    }

    function closeComments() {
        const el = document.getElementById('comment-overlay');
        if (el) el.remove();
    }

    // ===== CHAT SYSTEM =====
    function renderChatList() {
        const container = document.getElementById('chat-list');
        if (!container) return;
        
        const contacts = AMONS_KERNEL.users.filter(u => u.id !== AMONS_KERNEL.currentUser.id);
        
        container.innerHTML = contacts.map(contact => `
            <div onclick="openChatRoom('${contact.username}')" class="flex items-center justify-between p-6 bg-gray-50 dark:bg-white/5 rounded-[2.5rem] cursor-pointer hover:scale-[1.02] transition-all border border-transparent hover:border-pink-500/30">
                <div class="flex items-center gap-5">
                    <div class="w-16 h-16 rounded-[1.8rem] overflow-hidden border-2 border-white/10">
                        <img src="${contact.pfp}" class="w-full h-full object-cover" alt="${contact.name}">
                    </div>
                    <div>
                        <p class="font-black text-lg tracking-tight">${contact.name}</p>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Active Frequency</p>
                    </div>
                </div>
                <div class="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center">
                    <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 5l7 7-7 7"/>
                    </svg>
                </div>
            </div>
        `).join('');
    }

    function openChatRoom(username) {
        const targetUser = AMONS_KERNEL.users.find(u => u.username === username);
        if (!targetUser) return;
        
        const wallpaper = AMONS_KERNEL.currentUser.wallpapers?.[username] || 'https://images.unsplash.com/photo-1614850523459-c2f4c699c52e';
        
        const room = document.getElementById('chat-room');
        room.classList.add('active');
        
        document.getElementById('chat-room-content').innerHTML = `
            <div class="chat-container h-full flex flex-col" style="background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('${wallpaper}')">
                <div class="p-8 pt-16 flex items-center gap-6 nav-blur border-b border-white/5">
                    <button onclick="closeChatRoom()" class="text-white hover:text-pink-500 transition-colors">
                        <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
                            <path d="M19 12H5M12 19l-7-7 7-7"/>
                        </svg>
                    </button>
                    <div class="flex items-center gap-4">
                        <img src="${targetUser.pfp}" class="w-12 h-12 rounded-2xl object-cover" alt="${targetUser.name}">
                        <div>
                            <p class="text-white font-black tracking-tight">${targetUser.name}</p>
                            <p class="text-[9px] text-pink-500 font-bold uppercase tracking-[0.3em]">Encrypted Path</p>
                        </div>
                    </div>
                </div>
                
                <div id="message-flow" class="flex-1 overflow-y-auto p-8 space-y-6">
                    <div class="flex justify-center my-10">
                        <span class="px-6 py-2 bg-black/40 backdrop-blur-md rounded-full text-[9px] font-bold text-gray-400 uppercase tracking-widest">Beginning of Archive</span>
                    </div>
                    ${renderChatMessages(username)}
                </div>

                <div class="p-8 pb-12 bg-black/20 backdrop-blur-3xl border-t border-white/5">
                    <div class="flex gap-4">
                        <input type="text" id="msg-input" placeholder="Transmit..." 
                               class="flex-1 bg-white/10 border border-white/10 rounded-[2rem] px-8 py-5 text-white outline-none focus:border-pink-500/50 transition-colors" />
                        <button onclick="sendMessage('${username}')" class="w-16 h-16 bg-pink-500 text-white rounded-full flex items-center justify-center shadow-huge hover:scale-110 transition-transform">
                            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderChatMessages(username) {
        const messages = AMONS_KERNEL.messages[username] || [];
        if (messages.length === 0) return '';
        
        return messages.map((msg, i) => `
            <div class="flex ${msg.sent ? 'justify-end' : 'justify-start'}">
                <div class="max-w-xs ${msg.sent ? 'bg-pink-500' : 'bg-white/10'} rounded-3xl px-6 py-3">
                    <p class="text-white text-sm break-words">${msg.text}</p>
                </div>
            </div>
        `).join('');
    }

    function sendMessage(username) {
        const input = document.getElementById('msg-input');
        const text = input?.value?.trim();
        
        if (!text) return;
        
        if (!AMONS_KERNEL.messages[username]) {
            AMONS_KERNEL.messages[username] = [];
        }
        
        AMONS_KERNEL.messages[username].push({
            text: text,
            sent: true,
            timestamp: new Date().toLocaleTimeString()
        });
        
        input.value = '';
        openChatRoom(username);
        haptic('light');
    }

    function closeChatRoom() {
        document.getElementById('chat-room').classList.remove('active');
    }

    // ===== PROFILE ENGINE =====
    function renderProfile(username) {
        const user = AMONS_KERNEL.users.find(u => u.username === username);
        if (!user) return;
        
        const isOwn = user.id === AMONS_KERNEL.currentUser.id;
        const container = document.getElementById('profile-content');
        
        container.innerHTML = `
            <div class="relative">
                <div class="h-[40vh] relative overflow-hidden">
                    <img src="${user.header || 'https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe'}" class="w-full h-full object-cover" alt="Header">
                    <div class="absolute inset-0 bg-gradient-to-b from-transparent to-[var(--bg-color)]"></div>
                </div>
                
                <div class="px-8 -mt-32 relative z-10 space-y-8">
                    <div class="flex justify-between items-end">
                        <div class="w-32 h-32 rounded-[2.5rem] border-8 border-[var(--bg-color)] overflow-hidden shadow-huge">
                            <img src="${user.pfp}" class="w-full h-full object-cover" alt="${user.name}">
                        </div>
                        ${isOwn ? 
                            `<button onclick="openSettings()" class="bg-white/10 backdrop-blur-md border border-white/10 px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest hover:bg-white/20 transition-colors">Settings</button>`
                            : `<button class="bg-pink-500 text-white px-10 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest shadow-huge hover:scale-105 transition-transform">Follow</button>`
                        }
                    </div>
                    
                    <div class="space-y-2">
                        <h2 class="font-serif-italic text-6xl tracking-tighter">${user.name}.</h2>
                        <p class="text-pink-500 font-bold text-xs uppercase tracking-[0.4em]">@${user.username}</p>
                    </div>
                    
                    <p class="text-gray-500 font-medium leading-relaxed max-w-md">${user.bio}</p>
                    
                    <div class="flex gap-12 pt-4">
                        <div>
                            <p class="text-2xl font-black">${user.followers}</p>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Followers</p>
                        </div>
                        <div>
                            <p class="text-2xl font-black">${user.following}</p>
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Following</p>
                        </div>
                    </div>

                    <div class="flex border-b border-white/5 gap-10 overflow-x-auto no-scrollbar pt-10">
                        <button class="pb-6 border-b-2 border-pink-500 text-[10px] font-black uppercase tracking-widest whitespace-nowrap">Music</button>
                        <button class="pb-6 border-transparent text-gray-500 text-[10px] font-black uppercase tracking-widest whitespace-nowrap hover:text-gray-400 transition-colors">Notes</button>
                        <button class="pb-6 border-transparent text-gray-500 text-[10px] font-black uppercase tracking-widest whitespace-nowrap hover:text-gray-400 transition-colors">Archive</button>
                    </div>

                    <div id="profile-grid" class="grid grid-cols-2 gap-6 pb-20">
                        ${renderProfileGrid(user.id)}
                    </div>
                </div>
            </div>
        `;
    }

    function renderProfileGrid(userId) {
        const userPosts = AMONS_KERNEL.posts.filter(p => p.userId === userId);
        if (userPosts.length === 0) return `<div class="col-span-2 py-20 text-center text-gray-600 text-[10px] uppercase font-bold tracking-[0.5em]">No Echoes Found</div>`;
        
        return userPosts.map(p => `
            <div onclick="handleTrackAction('${p.id}')" class="aspect-square rounded-[2rem] overflow-hidden relative group cursor-pointer shadow-lg hover:shadow-2xl transition-shadow">
                <img src="${p.music.artwork}" class="w-full h-full object-cover transition-transform group-hover:scale-110" alt="${p.music.name}">
                <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-all flex items-center justify-center">
                    <svg width="24" height="24" fill="white" viewBox="0 0 24 24">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </div>
            </div>
        `).join('');
    }

    // ===== MUSIC PLAYER ENGINE =====
    function handleTrackAction(postId) {
        const post = AMONS_KERNEL.posts.find(p => p.id === postId);
        if (!post) return;
        
        const track = post.music;
        
        if (AMONS_KERNEL.currentTrack?.id === track.id) {
            toggleMusic();
        } else {
            playTrack(track);
        }
    }

    function playTrack(track) {
        if (!track || !track.url) return;
        
        haptic('heavy');
        AMONS_KERNEL.currentTrack = track;
        AMONS_KERNEL.audio.src = track.url;
        AMONS_KERNEL.audio.play().catch(e => console.warn('Playback failed:', e));
        AMONS_KERNEL.isPlaying = true;
        
        updatePlayerUI();
    }

    function toggleMusic() {
        if (!AMONS_KERNEL.currentTrack) return;
        
        if (AMONS_KERNEL.isPlaying) {
            AMONS_KERNEL.audio.pause();
            AMONS_KERNEL.isPlaying = false;
        } else {
            AMONS_KERNEL.audio.play().catch(e => console.warn('Playback failed:', e));
            AMONS_KERNEL.isPlaying = true;
        }
        updatePlayerUI();
    }

    function updatePlayerUI() {
        const player = document.getElementById('global-player');
        const track = AMONS_KERNEL.currentTrack;
        
        if (!track) {
            player.style.display = 'none';
            return;
        }
        
        player.style.display = 'block';
        document.getElementById('player-art').src = track.artwork;
        document.getElementById('player-title').innerText = track.name || 'Unknown Track';
        document.getElementById('player-artist').innerText = track.artist || 'Unknown Artist';
        
        const icon = document.getElementById('play-pause-icon');
        const visualizer = document.getElementById('player-visualizer');
        
        if (AMONS_KERNEL.isPlaying) {
            icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
            visualizer?.classList.remove('hidden');
            player.classList.add('playing-active');
        } else {
            icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
            visualizer?.classList.add('hidden');
            player.classList.remove('playing-active');
        }
    }

    function closePlayer() {
        document.getElementById('global-player').style.display = 'none';
        AMONS_KERNEL.audio.pause();
        AMONS_KERNEL.isPlaying = false;
        AMONS_KERNEL.currentTrack = null;
        updatePlayerUI();
    }

    // ===== NOTIFICATIONS =====
    function renderNotifications() {
        const container = document.getElementById('notif-list');
        if (!container) return;
        
        const NOTIFS = [
            { id: '1', type: 'like', user: 'Adnan', action: 'bookmarked your archive', timestamp: '2m' },
            { id: '2', type: 'follow', user: 'Archiver', action: 'started following your path', timestamp: '1h' },
            { id: '3', type: 'comment', user: 'Karlee', action: 'echoed in your journal', timestamp: '3h' }
        ];

        container.innerHTML = NOTIFS.map(n => `
            <div class="flex items-center gap-6 p-6 bg-gray-50 dark:bg-[#1a1a1a] rounded-[2rem] border border-black/5 dark:border-white/5 transition-transform hover:scale-[1.01]">
                <div class="w-14 h-14 rounded-[1.5rem] bg-white dark:bg-black/20 flex items-center justify-center text-pink-500 shadow-sm flex-shrink-0">
                    ${n.type === 'like' ? '<svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>' : ''}
                    ${n.type === 'follow' ? '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2M8.5 7a4 4 0 110-8 4 4 0 010 8z"/></svg>' : ''}
                    ${n.type === 'comment' ? '<svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>' : ''}
                </div>
                <div class="flex flex-col flex-1 min-w-0">
                    <span class="text-[14px] font-bold tracking-tight">
                        ${n.user} <span class="font-normal text-gray-400">${n.action}</span>
                    </span>
                    <span class="text-[9px] text-gray-400 uppercase tracking-widest mt-1">${n.timestamp} ago</span>
                </div>
            </div>
        `).join('');
    }

    // ===== SEARCH =====
    function handleSearch(query) {
        const q = query.toLowerCase();
        const filteredUsers = AMONS_KERNEL.users.filter(u => 
            u.name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q)
        );
        
        const resultsContainer = document.getElementById('search-results');
        if (!resultsContainer) return;
        
        if (q === '') {
            resultsContainer.innerHTML = `<p class="text-center text-[11px] font-black text-gray-300 uppercase tracking-[0.8em] py-20">Spectral Silence</p>`;
            return;
        }

        resultsContainer.innerHTML = filteredUsers.map(u => `
            <div onclick="renderProfile('${u.username}')" class="flex items-center justify-between p-6 bg-gray-50 dark:bg-white/5 rounded-[2rem] border border-black/5 dark:border-white/5 group cursor-pointer hover:scale-[1.01] transition-all">
                <div class="flex items-center gap-4">
                    <img src="${u.pfp}" class="w-12 h-12 rounded-2xl object-cover" alt="${u.name}">
                    <span class="text-[13px] font-bold">${u.name}</span>
                </div>
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 5l7 7-7 7"/>
                </svg>
            </div>
        `).join('');
    }

    // ===== SETTINGS =====
    function openSettings() {
        alert('Settings panel - coming soon!');
    }

    function togglePostModal(open) {
        haptic('light');
        if (open) {
            alert('Post creation modal - coming soon!');
        }
    }

    // ===== SYSTEM BOOT =====
    function bootSystem() {
        console.log("🎵 AMONSPATH OS KERNEL v15.0: Initializing...");
        
        const savedUser = getFromLocalStorage('amons_user');
        if (savedUser) {
            AMONS_KERNEL.currentUser = savedUser;
            startApp();
        }
        
        // Global keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeComments();
                closeChatRoom();
            }
        });
    }

    // ===== INITIALIZATION =====
    window.addEventListener('load', bootSystem);
</script>

</body>
</html>
