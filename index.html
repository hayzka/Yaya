<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AmonsPath Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#fafafa; font-family: Inter, sans-serif; }
.card { background:white; border-radius:20px; padding:16px; margin-bottom:16px; box-shadow:0 10px 30px rgba(0,0,0,0.05); }
</style>
</head>

<body class="max-w-xl mx-auto p-4">

<!-- HEADER -->
<div class="flex justify-between items-center mb-6">
  <h1 class="text-2xl font-bold">AmonsPath</h1>
  <button onclick="createPost()" class="bg-black text-white px-4 py-2 rounded-xl">+</button>
</div>

<!-- FEED -->
<div id="feed"></div>

<!-- COMMENT MODAL -->
<div id="commentModal" class="hidden fixed inset-0 bg-black/40 flex items-end">
  <div class="bg-white w-full p-4 rounded-t-2xl">
    <div id="commentList" class="mb-4 max-h-60 overflow-y-auto"></div>
    <input id="commentInput" class="border w-full p-2 rounded-lg" placeholder="Write comment...">
    <button onclick="sendComment()" class="mt-2 w-full bg-black text-white p-2 rounded-lg">Send</button>
  </div>
</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://aldzhrtbrjszppseawrz.supabase.co",
  "sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp"
);

let user = null;
let page = 0;
let activePost = null;

// ================= AUTH =================
async function init() {
  let { data } = await supabase.auth.getUser();

  if (!data.user) {
    await supabase.auth.signInAnonymously();
  }

  const res = await supabase.auth.getUser();
  user = res.data.user;

  loadFeed(true);
}

init();

// ================= LOAD FEED =================
async function loadFeed(reset=false) {
  if (reset) {
    page = 0;
    document.getElementById("feed").innerHTML = "";
  }

  const { data } = await supabase
    .from("posts")
    .select(`
      *,
      likes(count),
      comments(count)
    `)
    .range(page*5, page*5+4)
    .order("created_at", { ascending:false });

  data.forEach(p => {
    document.getElementById("feed").innerHTML += renderPost(p);
  });

  page++;
}

// ================= RENDER =================
function renderPost(p) {
  return `
  <div class="card">
    <img src="${p.music_cover}" class="rounded-xl mb-3 w-full">
    <h2 class="font-bold">${p.music_title}</h2>
    <p class="text-sm text-gray-500">${p.caption || ""}</p>

    <div class="flex gap-4 mt-3 text-sm">
      <button onclick="like('${p.id}')">
        ❤️ ${p.likes?.[0]?.count || 0}
      </button>

      <button onclick="openComments('${p.id}')">
        💬 ${p.comments?.[0]?.count || 0}
      </button>

      <button onclick="share('${p.id}')">🔗</button>
    </div>
  </div>
  `;
}

// ================= LIKE =================
window.like = async (id) => {
  const { data } = await supabase
    .from("likes")
    .select("*")
    .eq("post_id", id)
    .eq("user_id", user.id)
    .single();

  if (data) {
    await supabase.from("likes").delete().eq("id", data.id);
  } else {
    await supabase.from("likes").insert({ post_id:id, user_id:user.id });
  }

  loadFeed(true);
};

// ================= POST =================
window.createPost = async () => {
  const title = prompt("Title:");
  const img = prompt("Image URL:");
  const cap = prompt("Caption:");

  if (!title || !img) return;

  await supabase.from("posts").insert({
    user_id:user.id,
    music_title:title,
    music_cover:img,
    caption:cap
  });

  loadFeed(true);
};

// ================= COMMENTS =================
window.openComments = async (id) => {
  activePost = id;
  document.getElementById("commentModal").classList.remove("hidden");

  const { data } = await supabase
    .from("comments")
    .select("*")
    .eq("post_id", id)
    .order("created_at");

  const list = document.getElementById("commentList");
  list.innerHTML = data.map(c => `<p class="text-sm mb-2">💬 ${c.text}</p>`).join("");
};

window.sendComment = async () => {
  const text = document.getElementById("commentInput").value;

  await supabase.from("comments").insert({
    post_id:activePost,
    user_id:user.id,
    text
  });

  document.getElementById("commentInput").value = "";
  openComments(activePost);
};

// ================= SHARE =================
window.share = (id) => {
  navigator.clipboard.writeText(location.href + "?post=" + id);
  alert("Copied!");
};

// ================= SCROLL =================
window.addEventListener("scroll", () => {
  if (window.innerHeight + scrollY >= document.body.offsetHeight - 100) {
    loadFeed();
  }
});

// ================= REALTIME =================
supabase.channel("posts")
.on("postgres_changes",{event:"*",schema:"public",table:"posts"},()=>{
  loadFeed(true);
})
.subscribe();

</script>
</body>
</html>
