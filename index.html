<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet">

    <style>
        /* Base Variables - Unisex & Elegant */
        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #fcfcfc;
            --accent: #000000;
            --text-main: #1a1a1a;
            --text-muted: #8e8e8e;
            --border-light: #f1f1f1;
            --border-heavy: #e5e5e5;
            --shadow-soft: 0 4px 20px -10px rgba(0,0,0,0.05);
            --shadow-heavy: 0 20px 40px -15px rgba(0,0,0,0.1);
        }

        /* Reset & Global */
        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        /* Elegant Card Architecture */
        .card-container {
            padding: 0 20px;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        .elegant-card {
            background: white;
            border: 1px solid var(--border-light);
            border-radius: 20px;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: var(--shadow-soft);
        }

        .elegant-card:hover {
            box-shadow: var(--shadow-heavy);
            transform: translateY(-2px);
            border-color: var(--border-heavy);
        }

        /* Skeleton Loading States */
        .skeleton {
            background: linear-gradient(90deg, #f6f7f8 0%, #edeef1 50%, #f6f7f8 100%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom Input System */
        .input-group { margin-bottom: 20px; }
        .input-label {
            display: block;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: var(--text-muted);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        .input-field {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-heavy);
            border-radius: 12px;
            padding: 16px 20px;
            font-size: 14px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            background: white;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0,0,0,0.02);
        }

        /* Buttons */
        .btn-action {
            width: 100%;
            background: var(--accent);
            color: white;
            border-radius: 14px;
            padding: 18px;
            font-weight: 600;
            font-size: 13px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .btn-action:active { transform: scale(0.97); }

        /* Audio & Animation Components */
        .vinyl-container {
            width: 60px;
            height: 60px;
            position: relative;
            border-radius: 50%;
            overflow: hidden;
            background: #f0f0f0;
        }

        .spinning { animation: spin 6s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        /* Notification Badge */
        .notif-dot {
            width: 6px;
            height: 6px;
            background: #ef4444;
            border-radius: 50%;
            position: absolute;
            top: 0;
            right: 0;
        }

        /* Utility */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .focus-layer-anim { animation: focusIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes focusIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
    
    <style id="user-custom-css"></style>
</head>
<body class="pb-32 no-scrollbar">

    <div class="px-6 py-4 sticky top-[85px] z-[400] bg-white">

    <button id="fab-post" onclick="openPostModal()" class="fixed bottom-10 right-8 w-16 h-16 rounded-full bg-black shadow-2xl flex items-center justify-center text-white text-3xl z-[600] hidden transition-all hover:scale-105 active:scale-95">

    <div id="post-modal" class="hidden fixed inset-0 z-[1000] bg-black/10 backdrop-blur-md flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-10 focus-layer-anim max-h-[92vh] overflow-y-auto no-scrollbar shadow-2xl">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-10"></div>

            <div class="space-y-8">

                <div id="selected-track-box" class="hidden flex items-center gap-6 p-6 bg-gray-50 rounded-[24px] border border-dashed border-gray-200">

            <div class="space-y-10">

                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                </div>

                <div class="flex justify-between items-center px-2">
                    <div>
                        <p class="text-sm font-semibold">Private Identity</p>
                        <p class="text-[9px] text-gray-400 uppercase tracking-widest mt-1">Restrict archive visibility</p>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">

    <div id="focus-layer" class="hidden fixed inset-0 z-[1200] bg-white overflow-y-auto no-scrollbar focus-layer-anim">

    <script>
        // Core Variables & Bridge
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        const DB_URL = 'https://aldzhrtbrjszppseawrz.supabase.co';
        const DB_KEY = 'sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp';
        const client = supabase.createClient(DB_URL, DB_KEY);

        let userSession = tg.initDataUnsafe.user || { id: 123456, first_name: 'Developer' };
        let currentTargetId = null;
        let itunesDebounce;
        let activeAudio = null;
        let currentPostData = { url: '', title: '', cover: '' };
        let activeReplyTo = null;

        // --- PHASE 1: Initialization & Auth Logic ---
        async function initializeApp() {
            const params = new URLSearchParams(window.location.search);
            const startParam = tg.initDataUnsafe.start_param;
            currentTargetId = startParam ? parseInt(startParam) : userSession.id;

            // Fetch Profile Data
            const { data: profile, error } = await client.from('profiles').select('*').eq('telegram_id', currentTargetId).single();

            if (!profile && currentTargetId === userSession.id) {
                document.getElementById('auth-modal').classList.remove('hidden');
            } else if (profile) {
                setupProfileUI(profile);
                loadTimeline();
                if (currentTargetId === userSession.id) {
                    document.getElementById('fab-post').classList.remove('hidden');
                    checkNotifications();
                }
            } else if (!profile && currentTargetId !== userSession.id) {
                renderError("Profile not found in the protocol.");
            }
        }

        function setupProfileUI(profile) {
            document.getElementById('header-display-name').innerText = profile.display_name;
            document.getElementById('header-username').innerText = '@' + profile.username;
            if(profile.custom_css) document.getElementById('user-custom-css').innerHTML = profile.custom_css;
            if(profile.photo_url) {
                const img = document.getElementById('header-photo');
                img.src = profile.photo_url;
                img.classList.remove('hidden');
                document.getElementById('header-initial').classList.add('hidden');
            }
            if(currentTargetId === userSession.id) {
                document.getElementById('privacy-mode').checked = profile.is_private;
                document.getElementById('custom-css-input').value = profile.custom_css || '';
            }
        }

        // --- PHASE 2: Timeline & Search Logic ---
        async function loadTimeline(query = '') {
            const container = document.getElementById('main-timeline');
            let dbQuery = client.from('music_posts').select('*, profiles(*), likes(id)').eq('sender_id', currentTargetId);
            
            if(query) {
                dbQuery = dbQuery.or(`caption.ilike.%${query}%, music_title.ilike.%${query}%`);
            }

            const { data: posts, error } = await dbQuery.order('created_at', { ascending: false });

            if (posts && posts.length > 0) {
                container.innerHTML = posts.map(post => renderPostCard(post)).join('');
            } else {
                container.innerHTML = `<div class="py-40 text-center"><p class="font-serif italic text-gray-300">The archive is empty.</p></div>`;
            }
        }

        function renderPostCard(post) {
            return `
                <div class="card-container">
                    <div class="elegant-card">
                        <div class="p-7">
                            <div class="flex justify-between items-start mb-8">
                                <div class="flex items-center gap-5">
                                    <div class="vinyl-container shadow-xl">
                                        <img id="disk-${post.id}" src="${post.music_cover}" class="w-full h-full object-cover rounded-full border border-white/20">
                                        <div class="absolute inset-0 flex items-center justify-center">
                                            <div class="w-3 h-3 bg-white rounded-full shadow-inner"></div>
                                        </div>
                                    </div>
                                    <div>
                                        <p class="text-[8px] font-bold text-gray-400 uppercase tracking-[0.4em] mb-1">Archived by ${post.profiles.display_name}</p>
                                        <h2 class="font-serif italic text-lg leading-tight text-gray-900">${post.music_title}</h2>
                                    </div>
                                </div>
                                <button class="text-gray-200">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg>
                                </button>
                            </div>

                            <div class="mb-10 text-[13px] text-gray-500 italic leading-relaxed px-1" onclick="openFocusMode('${post.id}')">
                                "${post.caption}"
                            </div>

                            <div class="bg-gray-50 rounded-[22px] p-4 flex items-center gap-5 border border-gray-100/50 mb-7">
                                <button onclick="toggleMusicPlayback('${post.id}')" id="play-btn-${post.id}" class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-xs transition active:scale-90">▶</button>
                                <div class="flex-1 h-[2px] bg-gray-200 rounded-full overflow-hidden">
                                    <div id="prog-bar-${post.id}" class="h-full bg-black transition-all duration-300" style="width: 0%"></div>
                                </div>
                                <audio id="audio-node-${post.id}" src="${post.music_url}" ontimeupdate="trackProgress('${post.id}')" onended="finishMusic('${post.id}')"></audio>
                            </div>

                            <div class="flex gap-10 border-t border-gray-50 pt-6 text-[10px] font-bold uppercase tracking-widest text-gray-400">
                                <button onclick="processLike('${post.id}', '${post.sender_id}')" class="flex items-center gap-2 hover:text-black transition">
                                    <span>❤️</span> <span>${post.likes ? post.likes.length : 0}</span>
                                </button>
                                <button onclick="openFocusMode('${post.id}')" class="flex items-center gap-2 hover:text-black transition">
                                    <span>💬</span> Thoughts
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        // --- PHASE 3: iTunes Intelligence ---
        async function searchiTunes(query) {
            const dropdown = document.getElementById('itunes-dropdown');
            if(query.length < 3) { dropdown.classList.add('hidden'); return; }

            clearTimeout(itunesDebounce);
            itunesDebounce = setTimeout(async () => {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=6`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    dropdown.innerHTML = data.results.map(track => `
                        <div class="p-5 hover:bg-gray-50 cursor-pointer flex items-center gap-5 border-b border-gray-50 last:border-0" 
                             onclick="selectTrack('${track.trackName}', '${track.artistName}', '${track.previewUrl}', '${track.artworkUrl100}')">
                            <img src="${track.artworkUrl60}" class="w-12 h-12 rounded-xl object-cover">
                            <div>
                                <p class="text-xs font-bold text-gray-900">${track.trackName}</p>
                                <p class="text-[10px] text-gray-400 uppercase tracking-tighter">${track.artistName}</p>
                            </div>
                        </div>
                    `).join('');
                    dropdown.classList.remove('hidden');
                }
            }, 600);
        }

        function selectTrack(title, artist, url, cover) {
            currentPostData = { url, title: `${title} - ${artist}`, cover: cover.replace('100x100', '600x600') };
            
            document.getElementById('selected-title').innerText = title;
            document.getElementById('selected-artist').innerText = artist;
            document.getElementById('selected-cover').src = cover;
            
            document.getElementById('selected-track-box').classList.remove('hidden');
            document.getElementById('itunes-dropdown').classList.add('hidden');
            document.getElementById('itunes-input').value = "";
            tg.HapticFeedback.impactOccurred('medium');
        }

        function clearSelectedTrack() {
            document.getElementById('selected-track-box').classList.add('hidden');
            currentPostData = { url: '', title: '', cover: '' };
        }

        // --- PHASE 4: Action Handlers (Publish, Like, Comment) ---
        async function executePublish() {
            const cap = document.getElementById('post-caption').value;
            if(!currentPostData.url) return tg.showAlert("Please select a track first.");

            document.getElementById('submit-post-btn').innerText = "PUBLISHING...";
            
            const { error } = await client.from('music_posts').insert({
                sender_id: userSession.id,
                music_url: currentPostData.url,
                music_title: currentPostData.title,
                music_cover: currentPostData.cover,
                caption: cap
            });

            if(!error) location.reload();
            else {
                tg.showAlert("Protocol error. Try again.");
                document.getElementById('submit-post-btn').innerText = "Publish Archive";
            }
        }

        async function processLike(postId, receiverId) {
            const { error } = await client.from('likes').insert({ post_id: postId, user_id: userSession.id });
            if(!error) {
                if(receiverId != userSession.id) {
                    await client.from('notifications').insert({ receiver_id: receiverId, sender_id: userSession.id, type: 'loved' });
                }
                loadTimeline();
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // --- PHASE 5: Focus Layer (Discussion Logic) ---
        async function openFocusMode(postId) {
            const { data: post } = await client.from('music_posts').select('*, profiles(*)').eq('id', postId).single();
            const layer = document.getElementById('focus-layer');
            
            layer.innerHTML = `
                <div class="p-10 pb-44">
                    <div class="flex justify-between items-center mb-16">
                        <button onclick="closeFocusMode()" class="text-[10px] font-bold text-gray-300 uppercase tracking-[0.2em]">Return</button>
                        <div class="h-1 w-12 bg-gray-100 rounded-full"></div>
                    </div>
                    
                    <div class="mb-16">
                        <img src="${post.music_cover}" class="w-full aspect-square rounded-[32px] shadow-2xl mb-10 object-cover">
                        <h1 class="font-serif italic text-4xl mb-4 leading-tight">${post.music_title}</h1>
                        <p class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-12">Shared by @${post.profiles.username}</p>
                        <div class="text-gray-500 italic leading-relaxed text-sm p-6 bg-gray-50 rounded-2xl border border-gray-100">"${post.caption}"</div>
                    </div>

                    <div class="border-t border-gray-50 pt-12">
                        <h4 class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-300 mb-12">The Discussion</h4>
                        <div id="comments-list" class="space-y-12"></div>
                    </div>
                </div>

                <div class="fixed bottom-0 left-0 w-full bg-white/90 backdrop-blur-xl p-8 border-t border-gray-50 flex flex-col gap-4">
                    <div id="reply-info" class="hidden flex justify-between items-center text-[10px] font-bold uppercase text-gray-400 italic">
                        <span>Replying...</span>
                        <button onclick="cancelReply()">✕</button>
                    </div>
                    <div class="flex gap-4">
                        <input id="comment-field" type="text" placeholder="Add perspective..." class="flex-1 bg-gray-100 p-5 rounded-2xl text-sm outline-none border border-transparent focus:border-gray-200">
                        <button onclick="commitComment('${postId}')" class="w-14 h-14 bg-black text-white rounded-2xl flex items-center justify-center">▶</button>
                    </div>
                </div>
            `;
            
            layer.classList.remove('hidden');
            loadComments(postId);
            tg.BackButton.show();
            tg.BackButton.onClick(() => closeFocusMode());
        }

        async function loadComments(postId) {
            const { data: comments } = await client.from('comments').select('*, profiles(*)').eq('post_id', postId).order('created_at', { ascending: true });
            const container = document.getElementById('comments-list');
            
            const mainComments = comments.filter(c => !c.parent_id);
            container.innerHTML = mainComments.map(parent => {
                const subReplies = comments.filter(r => r.parent_id === parent.id);
                return `
                    <div class="comment-block">
                        <div class="flex gap-5">
                            <div class="w-10 h-10 rounded-full bg-gray-100 overflow-hidden shrink-0 shadow-sm"><img src="${parent.profiles.photo_url || ''}" class="object-cover w-full h-full"></div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <p class="text-[11px] font-bold text-gray-800">@${parent.profiles.username}</p>
                                    <span class="text-[8px] text-gray-300">RECENT</span>
                                </div>
                                <p class="text-sm text-gray-600 mt-2 leading-relaxed">${parent.content}</p>
                                <button onclick="setReplyTarget('${parent.id}', '${parent.profiles.username}')" class="text-[9px] font-bold text-gray-400 uppercase mt-4 tracking-widest">Reply</button>
                            </div>
                        </div>
                        <div class="ml-14 mt-8 space-y-8 border-l border-gray-100 pl-8">
                            ${subReplies.map(r => `
                                <div class="flex gap-4">
                                    <div class="w-7 h-7 rounded-full bg-gray-50 overflow-hidden shrink-0"><img src="${r.profiles.photo_url || ''}" class="object-cover w-full h-full"></div>
                                    <div><p class="text-[10px] font-bold text-gray-700">@${r.profiles.username}</p><p class="text-xs text-gray-500 mt-1">${r.content}</p></div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('') || `<p class="text-center text-gray-200 italic text-xs py-10">Archive silence.</p>`;
        }

        function setReplyTarget(id, user) {
            activeReplyTo = id;
            const info = document.getElementById('reply-info');
            info.classList.remove('hidden');
            info.querySelector('span').innerText = `Replying to @${user}`;
            document.getElementById('comment-field').focus();
        }

        function cancelReply() { activeReplyTo = null; document.getElementById('reply-info').classList.add('hidden'); }

        async function commitComment(postId) {
            const val = document.getElementById('comment-field').value;
            if(!val) return;
            const { error } = await client.from('comments').insert({ post_id: postId, user_id: userSession.id, content: val, parent_id: activeReplyTo });
            if(!error) {
                document.getElementById('comment-field').value = '';
                cancelReply();
                loadComments(postId);
            }
        }

        // --- PHASE 6: Navigation & Utilities ---
        function toggleMusicPlayback(id) {
            const node = document.getElementById(`audio-node-${id}`);
            const btn = document.getElementById(`play-btn-${id}`);
            const disk = document.getElementById(`disk-${id}`);

            if (node.paused) {
                if(activeAudio && activeAudio !== node) {
                    activeAudio.pause();
                    document.querySelectorAll('button[id^="play-btn-"]').forEach(b => b.innerText = '▶');
                    document.querySelectorAll('img[id^="disk-"]').forEach(d => d.classList.remove('spinning'));
                }
                node.play();
                btn.innerText = '⏸';
                disk.classList.add('spinning');
                activeAudio = node;
            } else {
                node.pause();
                btn.innerText = '▶';
                disk.classList.remove('spinning');
            }
        }

        function trackProgress(id) {
            const node = document.getElementById(`audio-node-${id}`);
            const bar = document.getElementById(`prog-bar-${id}`);
            bar.style.width = (node.currentTime / node.duration) * 100 + '%';
        }

        function finishMusic(id) {
            document.getElementById(`play-btn-${id}`).innerText = '▶';
            document.getElementById(`disk-${id}`).classList.remove('spinning');
        }

        async function handleRegistration() {
            const name = document.getElementById('reg-name').value;
            const user = document.getElementById('reg-user').value.toLowerCase().trim();
            if(!name || !user) return tg.showAlert("Fields required.");

            const { error } = await client.from('profiles').insert({
                telegram_id: userSession.id,
                display_name: name,
                username: user,
                photo_url: userSession.photo_url || ''
            });

            if(!error) location.reload();
            else tg.showAlert("Username reserved or network failure.");
        }

        async function checkNotifications() {
            const { data } = await client.from('notifications').select('*').eq('receiver_id', userSession.id).eq('is_read', false);
            if(data && data.length > 0) {
                document.getElementById('notif-indicator').classList.remove('hidden');
                renderNotifications(data);
            }
        }

        function renderNotifications(data) {
            const container = document.getElementById('notif-content');
            container.innerHTML = data.map(n => `
                <div class="flex items-center gap-5 p-2">
                    <div class="w-2 h-2 rounded-full bg-black"></div>
                    <p class="text-sm font-medium">Someone loved your archived track.</p>
                </div>
            `).join('');
        }

        function toggleTab(type) {
            const layer = document.getElementById('notif-layer');
            layer.classList.toggle('hidden');
            if(type === 'notifications') {
                client.from('notifications').update({ is_read: true }).eq('receiver_id', userSession.id);
                document.getElementById('notif-indicator').classList.add('hidden');
            }
        }

        function handleGlobalSearch(val) {
            clearTimeout(itunesDebounce);
            itunesDebounce = setTimeout(() => loadTimeline(val), 500);
        }

        function commitCSS() {
            const css = document.getElementById('custom-css-input').value;
            client.from('profiles').update({ custom_css: css }).eq('telegram_id', userSession.id).then(() => {
                tg.showAlert("Styling commit successful.");
                setTimeout(() => location.reload(), 800);
            });
        }

        function toggleModal(id) { document.getElementById(id).classList.toggle('hidden'); }
        function openPostModal() { toggleModal('post-modal'); }
        function closeFocusMode() { document.getElementById('focus-layer').classList.add('hidden'); tg.BackButton.hide(); }
        async function togglePrivacy(val) { await client.from('profiles').update({ is_private: val }).eq('telegram_id', userSession.id); }
        function copyLink() {
            const link = `https://t.me/AmonsPathBot/app?startapp=${userSession.id}`;
            navigator.clipboard.writeText(link).then(() => tg.showAlert("Protocol Handle Copied."));
        }

        // --- PHASE 7: Launch ---
        initializeApp();

    </script>
</body>
</html>
