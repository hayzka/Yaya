<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AmonsPath Music Social</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet">

    <style>
        :root { --theme-color: #ec4899; }
        body { 
            background-color: #fcfcfc; 
            font-family: 'Inter', sans-serif; 
            color: #1a1a1a; 
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }
        
        /* Typography & Aesthetics */
        .font-serif { font-family: 'Playfair Display', serif; }
        .elegant-card { 
            background: white; 
            border-radius: 30px; 
            margin: 15px; 
            border: 1px solid #f0f0f0; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 20px -10px rgba(0,0,0,0.05);
        }
        .elegant-card:hover { transform: translateY(-5px); box-shadow: 0 20px 30px -15px rgba(0,0,0,0.1); }
        
        /* Forms */
        .input-elegant { 
            background: #f8f8f8; 
            border: 1px solid #eee; 
            border-radius: 18px; 
            padding: 14px 20px; 
            outline: none; 
            font-size: 14px; 
            width: 100%; 
            transition: 0.3s;
        }
        .input-elegant:focus { border-color: var(--theme-color); background: white; }
        
        .btn-main { 
            background: var(--theme-color); 
            color: white; 
            border-radius: 18px; 
            padding: 16px; 
            font-weight: 600; 
            width: 100%; 
            transition: 0.3s; 
            box-shadow: 0 10px 20px -10px var(--theme-color);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-size: 12px;
        }
        .btn-main:active { transform: scale(0.95); }

        /* Animations */
        .animate-focus { animation: slideInUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1); }
        @keyframes slideInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .music-disk-anim { animation: spin 4s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* Utilities */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .caption-truncate {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
    <style id="user-custom-css"></style>
</head>
<body class="pb-32 no-scrollbar">

    <nav class="sticky top-0 z-[60] bg-white/70 backdrop-blur-xl border-b border-gray-50 p-5 flex justify-between items-center">
        <div id="profile-trigger" class="flex items-center gap-3 cursor-pointer" onclick="toggleModal('settings-modal')">
            <div class="w-11 h-11 rounded-full bg-gray-100 overflow-hidden border-2 border-white shadow-sm">
                <img id="my-photo" src="" class="w-full h-full object-cover hidden">
            </div>
            <div>
                <h1 id="my-name" class="font-serif italic text-lg leading-tight text-gray-900">Loading...</h1>
                <p id="my-username" class="text-[9px] text-gray-400 uppercase tracking-[0.2em] font-bold">@guest</p>
            </div>
        </div>
        <div class="flex gap-4">
            <button onclick="toggleModal('search-layer')" class="text-xl">🔍</button>
            <button onclick="toggleModal('settings-modal')" class="text-xl">⚙️</button>
        </div>
    </nav>

    <div class="px-5 mt-4">
        <input type="text" id="global-search" oninput="debounceSearch(this.value)" placeholder="Search tracks or users..." class="input-elegant font-serif italic italic text-gray-400">
    </div>

    <main id="timeline" class="min-h-screen"></main>

    <button id="fab-post" onclick="toggleModal('post-modal')" class="fixed bottom-10 right-8 w-16 h-16 rounded-full shadow-2xl flex items-center justify-center text-white text-3xl z-50 hidden transition-transform active:scale-90" style="background: var(--theme-color);">
        <span class="mb-1">+</span>
    </button>

    <div id="post-modal" class="hidden fixed inset-0 z-[100] bg-black/30 backdrop-blur-sm flex items-end">
        <div class="bg-white w-full p-8 rounded-t-[40px] animate-focus shadow-2xl max-h-[95vh] overflow-y-auto no-scrollbar">
            <div class="w-12 h-1 bg-gray-100 rounded-full mx-auto mb-8"></div>
            <h3 class="font-serif italic text-2xl mb-6 text-gray-800 tracking-tight">Post a Track</h3>
            
            <div class="space-y-6">
                <div class="relative">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">Find Song on iTunes</label>
                    <input id="music-search" type="text" oninput="searchiTunes(this.value)" placeholder="Artist or Song Name..." class="input-elegant mt-2">
                    <div id="itunes-results" class="hidden absolute left-0 right-0 mt-3 bg-white border border-gray-100 rounded-2xl shadow-2xl z-[110] max-h-64 overflow-y-auto no-scrollbar"></div>
                </div>

                <div id="music-preview" class="hidden flex items-center gap-5 p-5 bg-gray-50 rounded-[25px] border border-dashed border-gray-200 animate-pulse">
                    <img id="prev-cover" src="" class="w-16 h-16 rounded-2xl object-cover shadow-lg">
                    <div class="flex-1">
                        <p id="prev-title" class="text-sm font-bold text-gray-800 leading-tight"></p>
                        <p id="prev-artist" class="text-[11px] text-gray-400 mt-1 uppercase tracking-tighter"></p>
                    </div>
                    <button onclick="clearMusicSelection()" class="w-8 h-8 rounded-full bg-gray-200 text-gray-500 text-xs">✕</button>
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 ml-1">Add Thoughts</label>
                    <textarea id="post-cap" placeholder="Write something aesthetic..." class="input-elegant h-32 mt-2 resize-none"></textarea>
                </div>

                <input type="hidden" id="post-url">
                <input type="hidden" id="post-title">
                <input type="hidden" id="post-cover">

                <button onclick="submitPost()" class="btn-main mt-4">Broadcast to Universe</button>
                <button onclick="toggleModal('post-modal')" class="w-full text-center text-[10px] font-bold text-gray-300 uppercase py-4">Dismiss</button>
            </div>
        </div>
    </div>

    <div id="settings-modal" class="hidden fixed inset-0 z-[120] bg-black/40 backdrop-blur-sm flex items-end">
        <div class="bg-white w-full rounded-t-[40px] p-10 animate-focus max-h-[90vh] overflow-y-auto">
            <h3 class="font-serif italic text-2xl mb-8">Personalize</h3>
            
            <div class="space-y-8">
                <button onclick="copyMyLink()" class="w-full flex justify-between items-center p-5 bg-pink-50 rounded-2xl border border-pink-100">
                    <span class="text-xs font-bold text-pink-500 uppercase tracking-widest">Copy Profile Link</span>
                    <span class="text-xl">🔗</span>
                </button>

                <div class="flex justify-between items-center p-2">
                    <div class="flex flex-col">
                        <span class="text-sm font-semibold">Private Mode</span>
                        <span class="text-[10px] text-gray-400 uppercase tracking-widest">Hide tracks from strangers</span>
                    </div>
                    <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="privacy-toggle" onchange="updatePrivacy(this.checked)" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-pink-500"></div>
                    </label>
                </div>

                <div>
                    <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Custom CSS Engine</label>
                    <textarea id="css-input" class="w-full mt-3 h-32 bg-gray-50 border border-gray-100 p-5 rounded-2xl font-mono text-[11px] outline-none" placeholder=".elegant-card { border: 2px solid pink; }"></textarea>
                    <button onclick="saveCSS()" class="mt-4 text-[10px] font-bold text-pink-500 uppercase tracking-[0.2em]">Apply Transformations</button>
                </div>

                <button onclick="toggleModal('settings-modal')" class="w-full py-4 text-gray-300 text-[10px] font-bold uppercase">Close</button>
            </div>
        </div>
    </div>

    <div id="focus-layer" class="hidden fixed inset-0 z-[200] bg-white overflow-y-auto no-scrollbar animate-focus"></div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[300] bg-white p-12 flex flex-col justify-center animate-focus">
        <h1 class="font-serif italic text-5xl mb-4">Identity.</h1>
        <p class="text-gray-400 text-sm mb-12 leading-relaxed uppercase tracking-widest">Define yourself before entering the path.</p>
        <div class="space-y-5">
            <input id="reg-name" type="text" placeholder="Full Name" class="input-elegant">
            <input id="reg-user" type="text" placeholder="Username" class="input-elegant">
            <button onclick="createAccount()" class="btn-main py-6">Begin Journey</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();

        // Database Config
        const SUPABASE_URL = 'https://aldzhrtbrjszppseawrz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_h-BSul_X4VDxc-6gwSUa0w_Z_rsJ2xp';
        const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // State
        let telegramUser = tg.initDataUnsafe.user || { id: 123456, first_name: 'Developer' };
        let currentViewedId = null;
        let replyingToId = null;
        let itunesTimeout;

        // --- 1. Initialization ---
        async function init() {
            const startParam = tg.initDataUnsafe.start_param;
            currentViewedId = startParam ? parseInt(startParam) : telegramUser.id;

            const { data: profile, error } = await client.from('profiles').select('*').eq('telegram_id', currentViewedId).single();

            if (!profile && currentViewedId === telegramUser.id) {
                document.getElementById('auth-modal').classList.remove('hidden');
            } else if (profile) {
                // Apply Styles & UI
                if (profile.custom_css) document.getElementById('user-custom-css').innerHTML = profile.custom_css;
                document.getElementById('my-name').innerText = profile.display_name;
                document.getElementById('my-username').innerText = '@' + profile.username;
                
                if (profile.photo_url) {
                    const img = document.getElementById('my-photo');
                    img.src = profile.photo_url; img.classList.remove('hidden');
                }

                // Show/Hide Owner Features
                if (currentViewedId === telegramUser.id) {
                    document.getElementById('fab-post').classList.remove('hidden');
                    document.getElementById('privacy-toggle').checked = profile.is_private;
                    document.getElementById('css-input').value = profile.custom_css || '';
                }

                // Privacy Check
                if (profile.is_private && currentViewedId !== telegramUser.id) {
                    document.getElementById('timeline').innerHTML = `
                        <div class="mt-40 text-center">
                            <span class="text-4xl">🔒</span>
                            <p class="mt-4 font-serif italic text-gray-400">This sanctuary is private.</p>
                        </div>`;
                } else {
                    loadPosts(currentViewedId);
                }
            }
        }

        // --- 2. Post & Timeline Logic ---
        async function loadPosts(targetId, query = '') {
            let queryBuilder = client.from('music_posts').select('*, profiles(*), likes(id)').eq('sender_id', targetId);
            
            if(query) {
                queryBuilder = queryBuilder.or(`caption.ilike.%${query}%, music_title.ilike.%${query}%`);
            }

            const { data: posts, error } = await queryBuilder.order('created_at', {ascending: false});
            const container = document.getElementById('timeline');

            if (!posts || posts.length === 0) {
                container.innerHTML = `<div class="py-32 text-center text-gray-300 italic font-serif">No vibes shared yet...</div>`;
                return;
            }

            container.innerHTML = posts.map(post => `
                <div class="elegant-card animate-focus">
                    <div class="p-7">
                        <div class="flex justify-between items-start mb-6">
                            <div class="flex items-center gap-5">
                                <div class="relative w-16 h-16 group" id="disk-container-${post.id}">
                                    <div class="absolute inset-0 rounded-full border border-pink-100 border-dashed animate-spin-slow opacity-20"></div>
                                    <img src="${post.music_cover || 'https://via.placeholder.com/150'}" id="img-${post.id}" 
                                         class="w-full h-full rounded-full object-cover shadow-lg transition-all duration-700">
                                    <div class="absolute inset-0 flex items-center justify-center">
                                        <div class="w-3 h-3 bg-white rounded-full shadow-inner"></div>
                                    </div>
                                </div>
                                <div>
                                    <p class="text-[8px] font-bold text-pink-500 uppercase tracking-[0.4em] mb-1">${post.profiles.display_name}</p>
                                    <h2 class="font-serif italic text-lg leading-tight text-gray-900">${post.music_title}</h2>
                                </div>
                            </div>
                            <button onclick="showPostOptions('${post.id}')" class="text-gray-300 p-2 italic font-serif">⋮</button>
                        </div>

                        <div class="text-[12px] text-gray-500 italic mb-8 leading-relaxed px-1">
                            <span class="caption-truncate" onclick="openFocus('${post.id}')">"${post.caption}"</span>
                        </div>

                        <div class="bg-gray-50 rounded-[22px] p-4 flex items-center gap-5 border border-gray-100/50 mb-6">
                            <button onclick="toggleAudio('${post.id}')" id="btn-play-${post.id}" 
                                    class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-lg hover:scale-110 active:scale-95 transition">▶️</button>
                            <div class="flex-1">
                                <div class="h-[3px] bg-gray-200 rounded-full overflow-hidden">
                                    <div id="progress-${post.id}" class="h-full bg-pink-400 transition-all duration-200" style="width: 0%"></div>
                                </div>
                            </div>
                            <audio id="audio-${post.id}" src="${post.music_url}" 
                                   ontimeupdate="onTimeUpdate('${post.id}')" 
                                   onended="onAudioEnded('${post.id}')"></audio>
                        </div>

                        <div class="flex gap-8 border-t border-gray-50 pt-5 text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 px-1">
                            <button onclick="handleLike('${post.id}', '${post.sender_id}')" class="flex items-center gap-2 hover:text-pink-500 transition">
                                <span id="like-icon-${post.id}">❤️</span> 
                                <span>${post.likes ? post.likes.length : 0}</span>
                            </button>
                            <button onclick="openFocus('${post.id}')" class="flex items-center gap-2 hover:text-black transition">
                                💬 Thoughts
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. Music Search (iTunes) ---
        async function searchiTunes(query) {
            const resultsDiv = document.getElementById('itunes-results');
            if (query.length < 3) { resultsDiv.classList.add('hidden'); return; }

            clearTimeout(itunesTimeout);
            itunesTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&media=music&limit=6`);
                    const data = await res.json();
                    
                    if (data.results.length > 0) {
                        resultsDiv.innerHTML = data.results.map(track => `
                            <div class="p-5 hover:bg-gray-50 cursor-pointer flex items-center gap-4 border-b border-gray-50 last:border-0" 
                                 onclick="selectTrack('${track.trackName}', '${track.artistName}', '${track.previewUrl}', '${track.artworkUrl100}')">
                                <img src="${track.artworkUrl60}" class="w-10 h-10 rounded-xl">
                                <div>
                                    <p class="text-[11px] font-bold text-gray-800">${track.trackName}</p>
                                    <p class="text-[10px] text-gray-400 uppercase tracking-tighter">${track.artistName}</p>
                                </div>
                            </div>
                        `).join('');
                        resultsDiv.classList.remove('hidden');
                    }
                } catch (e) { console.error(e); }
            }, 500);
        }

        function selectTrack(title, artist, url, cover) {
            document.getElementById('post-title').value = `${title} - ${artist}`;
            document.getElementById('post-url').value = url;
            document.getElementById('post-cover').value = cover.replace('100x100', '400x400'); // Higher Res
            
            document.getElementById('prev-title').innerText = title;
            document.getElementById('prev-artist').innerText = artist;
            document.getElementById('prev-cover').src = cover;
            
            document.getElementById('music-preview').classList.remove('hidden');
            document.getElementById('itunes-results').classList.add('hidden');
            document.getElementById('music-search').value = "";
            tg.HapticFeedback.impactOccurred('medium');
        }

        function clearMusicSelection() {
            document.getElementById('music-preview').classList.add('hidden');
            document.getElementById('post-url').value = "";
            document.getElementById('post-title').value = "";
        }

        // --- 4. Audio Control ---
        function toggleAudio(id) {
            const audio = document.getElementById(`audio-${id}`);
            const btn = document.getElementById(`btn-play-${id}`);
            const img = document.getElementById(`img-${id}`);

            if (audio.paused) {
                // Pause all others
                document.querySelectorAll('audio').forEach(a => {
                    const aid = a.id.split('-')[1];
                    a.pause();
                    document.getElementById(`btn-play-${aid}`).innerText = '▶️';
                    document.getElementById(`img-${aid}`).classList.remove('music-disk-anim');
                });

                audio.play();
                btn.innerText = '⏸️';
                img.classList.add('music-disk-anim');
                tg.HapticFeedback.impactOccurred('light');
            } else {
                audio.pause();
                btn.innerText = '▶️';
                img.classList.remove('music-disk-anim');
            }
        }

        function onTimeUpdate(id) {
            const audio = document.getElementById(`audio-${id}`);
            const prog = document.getElementById(`progress-${id}`);
            const pct = (audio.currentTime / audio.duration) * 100;
            prog.style.width = pct + '%';
        }

        function onAudioEnded(id) {
            document.getElementById(`btn-play-${id}`).innerText = '▶️';
            document.getElementById(`img-${id}`).classList.remove('music-disk-anim');
        }

        // --- 5. Social Interactions (Focus Layer & Comments) ---
        async function openFocus(postId) {
            const { data: post } = await client.from('music_posts').select('*, profiles(*)').eq('id', postId).single();
            const layer = document.getElementById('focus-layer');
            
            layer.innerHTML = `
                <div class="p-10 pb-40">
                    <div class="flex justify-between items-center mb-12">
                        <button onclick="closeFocus()" class="text-[11px] font-bold text-gray-300 uppercase tracking-widest">Back</button>
                        <div class="w-2 h-2 rounded-full bg-pink-500"></div>
                    </div>
                    
                    <div class="mb-12">
                        <img src="${post.music_cover}" class="w-full aspect-square rounded-[40px] shadow-2xl mb-8 object-cover">
                        <h1 class="font-serif italic text-4xl mb-3">${post.music_title}</h1>
                        <p class="text-[10px] font-bold text-pink-500 uppercase tracking-[0.4em] mb-8">Shared by @${post.profiles.username}</p>
                        <div class="text-gray-500 italic leading-relaxed text-sm p-4 bg-gray-50 rounded-2xl">"${post.caption}"</div>
                    </div>

                    <div class="border-t border-gray-100 pt-10">
                        <h4 class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-10">Public Thoughts</h4>
                        <div id="comments-container" class="space-y-10"></div>
                    </div>
                </div>

                <div class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-xl p-6 border-t border-gray-50 shadow-2xl">
                    <div id="reply-label" class="hidden text-[10px] text-pink-500 font-bold uppercase mb-3 flex justify-between italic">
                        <span>Replying...</span>
                        <button onclick="cancelReply()">✕</button>
                    </div>
                    <div class="flex gap-4">
                        <input id="comment-input" type="text" placeholder="Add your perspective..." 
                               class="flex-1 bg-gray-100 p-5 rounded-2xl text-sm outline-none focus:bg-white border border-transparent focus:border-pink-100">
                        <button onclick="postComment('${postId}')" class="w-14 h-14 bg-black text-white rounded-2xl flex items-center justify-center">▶</button>
                    </div>
                </div>
            `;
            
            layer.classList.remove('hidden');
            tg.BackButton.show();
            tg.BackButton.onClick(() => closeFocus());
            loadComments(postId);
        }

        async function loadComments(postId) {
            const { data: comments } = await client.from('comments').select('*, profiles(*)').eq('post_id', postId).order('created_at', { ascending: true });
            const container = document.getElementById('comments-container');
            
            const mainComments = comments.filter(c => !c.parent_id);
            
            container.innerHTML = mainComments.map(parent => {
                const childReplies = comments.filter(r => r.parent_id === parent.id);
                return `
                    <div class="comment-group">
                        <div class="flex gap-5">
                            <div class="w-10 h-10 rounded-full bg-gray-100 overflow-hidden shrink-0"><img src="${parent.profiles.photo_url || ''}" class="object-cover w-full h-full"></div>
                            <div class="flex-1">
                                <div class="flex justify-between items-start">
                                    <p class="text-[11px] font-bold text-gray-800">@${parent.profiles.username}</p>
                                    <span class="text-[8px] text-gray-300">NOW</span>
                                </div>
                                <p class="text-sm text-gray-600 mt-2 leading-relaxed">${parent.content}</p>
                                <button onclick="prepareReply('${parent.id}', '${parent.profiles.username}')" 
                                        class="text-[9px] font-bold text-pink-400 uppercase mt-4 tracking-widest">Reply</button>
                            </div>
                        </div>
                        
                        <div class="ml-12 mt-6 space-y-6 border-l-2 border-gray-50 pl-6">
                            ${childReplies.map(r => `
                                <div class="flex gap-4">
                                    <div class="w-7 h-7 rounded-full bg-gray-50 overflow-hidden shrink-0"><img src="${r.profiles.photo_url || ''}" class="object-cover w-full h-full"></div>
                                    <div>
                                        <p class="text-[10px] font-bold text-gray-800">@${r.profiles.username}</p>
                                        <p class="text-[12px] text-gray-500 mt-1">${r.content}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('') || `<p class="text-center text-gray-300 italic text-xs">Be the first to leave a thought...</p>`;
        }

        function prepareReply(id, username) {
            replyingToId = id;
            const label = document.getElementById('reply-label');
            label.classList.remove('hidden');
            label.querySelector('span').innerText = `Replying to @${username}`;
            document.getElementById('comment-input').focus();
        }

        function cancelReply() { replyingToId = null; document.getElementById('reply-label').classList.add('hidden'); }

        async function postComment(postId) {
            const val = document.getElementById('comment-input').value;
            if(!val) return;

            const { error } = await client.from('comments').insert({
                post_id: postId,
                user_id: telegramUser.id,
                content: val,
                parent_id: replyingToId
            });

            if(!error) {
                document.getElementById('comment-input').value = '';
                cancelReply();
                loadComments(postId);
                tg.HapticFeedback.notificationOccurred('success');
            }
        }

        async function handleLike(postId, receiverId) {
            const { error } = await client.from('likes').insert({ post_id: postId, user_id: telegramUser.id });
            if (!error) {
                if (receiverId != telegramUser.id) {
                    await client.from('notifications').insert({ receiver_id: receiverId, sender_id: telegramUser.id, type: 'loved' });
                }
                loadPosts(currentViewedId);
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // --- 6. Helper & UI Functions ---
        async function submitPost() {
            const url = document.getElementById('post-url').value;
            const title = document.getElementById('post-title').value;
            const cover = document.getElementById('post-cover').value;
            const cap = document.getElementById('post-cap').value;

            if(!url || !title) return tg.showAlert("Select a track first!");

            tg.showConfirm("Share this vibe to your path?", async (ok) => {
                if(ok) {
                    const { error } = await client.from('music_posts').insert({
                        sender_id: telegramUser.id,
                        music_url: url,
                        music_title: title,
                        music_cover: cover,
                        caption: cap
                    });
                    if(!error) location.reload();
                }
            });
        }

        async function createAccount() {
            const name = document.getElementById('reg-name').value;
            const user = document.getElementById('reg-user').value.toLowerCase();
            if(!name || !user) return tg.showAlert("Please fill your identity.");

            const { error } = await client.from('profiles').insert({
                telegram_id: telegramUser.id,
                display_name: name,
                username: user,
                photo_url: telegramUser.photo_url || ''
            });

            if(!error) location.reload();
            else tg.showAlert("Username already taken or server error.");
        }

        function debounceSearch(val) {
            clearTimeout(itunesTimeout);
            itunesTimeout = setTimeout(() => {
                loadPosts(currentViewedId, val);
            }, 600);
        }

        function saveCSS() {
            const css = document.getElementById('css-input').value;
            client.from('profiles').update({ custom_css: css }).eq('telegram_id', telegramUser.id).then(() => {
                tg.showPopup({ message: "CSS Applied. Restarting view...", buttons: [{type: 'close'}] });
                setTimeout(() => location.reload(), 1500);
            });
        }

        async function updatePrivacy(val) {
            await client.from('profiles').update({ is_private: val }).eq('telegram_id', telegramUser.id);
            tg.HapticFeedback.notificationOccurred('success');
        }

        function copyMyLink() {
            const link = `https://t.me/AmonsPathBot/app?startapp=${telegramUser.id}`;
            navigator.clipboard.writeText(link);
            tg.showAlert("Link copied to clipboard! Share it with the world.");
        }

        function toggleModal(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
            if(!el.classList.contains('hidden')) tg.HapticFeedback.impactOccurred('light');
        }

        function closeFocus() {
            document.getElementById('focus-layer').classList.add('hidden');
            tg.BackButton.hide();
        }

        // Run Init
        init();
    </script>
</body>
</html>
